/* ===== AI Diagnostics Engine ===== */
function buildDiagSystemPrompt(){
  var prompt="你是世界书诊断与优化引擎·RE:0。对世界书进行七维深度分析。\n\n# 诊断流程\n1. 逻辑一致性: 术语一致/数值一致/因果逻辑/设定冲突/声明-使用不一致(声明了能力或规则但从未被其他条目引用)\\n2. 触发机制: 关键词覆盖率/误触发风险/触发冲突/孤立条目/order分区合理性检查(跨区错位)\\n3. Token效率: 单条Token/constant总预算/信息密度/优化建议\\n4. 结构完整性: 五层覆盖度/十二维覆盖度/依赖缺失/补全建议\\n5. 可用性: 模拟触发/边界场景\\n6. 配置健康度: constant+泛词keys/constant=false+空keys/at_depth无depth/order越界/position语义错误\\n7. 综合报告: 健康度(S/A/B/C/D)+问题清单+修正方案\n\n# 输出格式\n【诊断总览】健康度评级+核心问题数\n【问题清单】按严重度(致命/重要/建议)排列，每项标注条目索引号\n【修正方案】每问题附具体可直接使用的修改建议\n【优化建议】非问题但可提升的改进方向\n\n";
  prompt+=wbPrompt([3]);
  prompt+="\n\n"+wbPrompt([9,15]);
  prompt+="\n\n# 额外诊断规则\n";
  prompt+="- 对每个问题必须指出具体条目索引号\n";
  prompt+="- 修正方案必须给出可直接使用的具体建议，不得含糊\n";
  prompt+="- Token效率按 ceil(字符数/3) 估算\n";
  prompt+="- 常驻条目总Token建议不超过总条目Token的20%\n";
  prompt+="- 输出必须使用中文\n";
  return prompt;
}

function buildDiagUserPrompt(note){
  var wi=S.entries;
  var totalChars=0;
  wi.forEach(function(e){totalChars+=e.content.length});
  var constChars=0;
  wi.forEach(function(e){if(e.constant&&e.enabled)constChars+=e.content.length});

  var prompt="【诊断任务】对以下世界书进行完整的七维深度诊断。\n\n";
  prompt+="【世界书统计】\n条目总数: "+wi.length+"\n总字符: "+totalChars+"\n估算Token: ~"+Math.ceil(totalChars/3)+"\n常驻条目字符: "+constChars+" (占比 "+Math.round(constChars/Math.max(totalChars,1)*100)+"%)\n\n";
  if(note)prompt+="【用户补充说明】\n"+note+"\n\n";
  prompt+="【全部世界书条目】\n";
  wi.forEach(function(e,i){
    prompt+="### worldInfo["+i+"]\n"+JSON.stringify(e,null,2)+"\n\n";
  });
  prompt+="\n请按照六维诊断流程输出完整诊断报告。";
  return prompt;
}

function runAIDiagnose(){
  if(S.ai.busy){toast("正在运行中","warning");return}
  if(!S.api.url||!S.api.key||!S.api.model){toast("请先配置 API","error");return}
  if(!S.entries.length){toast("当前无世界书条目","warning");return}

  var note=$("ai-diag-note")?$("ai-diag-note").value:"";
  S._aiDiagNote=note;
  S._aiDiagResult="";
  S.ai.busy=true;
  S.ai.status="准备诊断上下文";
  S.ai.progress=5;
  renderWsCheck();

  var sys=buildDiagSystemPrompt();
  var user=buildDiagUserPrompt(note);

  // Check if world book is too large and needs chunking
  var totalLen=0;
  S.entries.forEach(function(e){totalLen+=JSON.stringify(e).length});

  if(totalLen>30000){
    // Chunked diagnosis
    S.ai.status="世界书较大，分段发送诊断...";
    S.ai.progress=8;
    updateDiagUI();
    runChunkedDiagnose(sys,note);
  }else{
    // Single call
    callLLM(sys,user,{
      stream:true,
      temperature:0.6,
      onChunk:function(chunk,full){
        S._aiDiagResult=full;
        S.ai.progress=Math.min(90,10+Math.floor(full.length/50));
        updateDiagUI();
      }
    }).then(function(result){
      S._aiDiagResult=result;
      S.ai.status="诊断完成";
      S.ai.progress=100;
      S.ai.busy=false;
      renderWsCheck();
      toast("AI 诊断完成","success");
    }).catch(function(e){
      S.ai.status="诊断失败: "+e.message;
      S.ai.progress=0;
      S.ai.busy=false;
      renderWsCheck();
      toast("AI 诊断失败: "+e.message,"error");
    });
  }
}

function runChunkedDiagnose(sys,note){
  var chunks=selectedWorldChunks(15000,true,{indices:allIndices(S.entries.length)});
  var totalChunks=chunks.length;
  var allResults="";
  var idx=0;

  function nextChunk(){
    if(idx>=totalChunks){
      // Final summary call
      S.ai.status="生成综合诊断报告...";
      S.ai.progress=85;
      updateDiagUI();
      var summaryUser="【综合诊断任务】以下是分段诊断的结果，请综合所有分段结果，输出一份完整的六维诊断报告。\n\n"+allResults;
      return callLLM(sys,summaryUser,{
        stream:true,temperature:0.6,
        onChunk:function(chunk,full){
          S._aiDiagResult=full;
          S.ai.progress=Math.min(98,85+Math.floor(full.length/100));
          updateDiagUI();
        }
      });
    }

    S.ai.status="诊断第 "+(idx+1)+" / "+totalChunks+" 段...";
    S.ai.progress=Math.floor(idx*80/totalChunks)+8;
    updateDiagUI();

    var chunkText=typeof chunks[idx]==="string"?chunks[idx]:chunks[idx].text;
    var chunkIdxs=typeof chunks[idx]==="string"?[]:chunks[idx].indices;
    var user="【分段诊断 "+(idx+1)+"/"+totalChunks+"】\n当前段条目索引: "+chunkIdxs.join(", ")+"\n";
    if(note)user+="【用户补充说明】"+note+"\n";
    user+="\n"+chunkText+"\n\n请对以上条目进行六维诊断分析，简要列出发现的问题。";

    return callLLM(sys,user,{
      stream:true,temperature:0.6,
      onChunk:function(chunk,full){
        S._aiDiagResult=allResults+"\n\n--- 第"+(idx+1)+"段诊断 ---\n"+full;
        updateDiagUI();
      }
    }).then(function(result){
      allResults+="## 第"+(idx+1)+"段诊断 (条目 "+chunkIdxs.join(",")+"):\n"+result+"\n\n";
      idx++;
      return nextChunk();
    });
  }

  nextChunk().then(function(finalResult){
    S._aiDiagResult=finalResult;
    S.ai.status="诊断完成";
    S.ai.progress=100;
    S.ai.busy=false;
    renderWsCheck();
    toast("AI 诊断完成","success");
  }).catch(function(e){
    S.ai.status="诊断失败: "+e.message;
    S.ai.progress=0;
    S.ai.busy=false;
    renderWsCheck();
    toast("AI 诊断失败: "+e.message,"error");
  });
}

function updateDiagUI(){
  var bar=$("diag-bar");if(bar)bar.style.width=S.ai.progress+"%";
  var st=$("diag-status");if(st)st.textContent=S.ai.status;

function batchApply(fn){

/* ===== Trigger Simulation ===== */
function renderWsSim(){
  var c=$("ws-content");
  var h='<div class="card"><div class="card-title"><span>触发模拟<\/span><\/div>';
  h+='<textarea class="textarea" id="sim-ctx" placeholder="输入对话上下文文本，模拟世界书触发..." style="min-height:100px" oninput="S._simCtx=this.value">'+(S._simCtx||"")+'<\/textarea>';
  h+='<div class="mt-8"><button class="btn btn-sm btn-p" onclick="runSim()">运行模拟<\/button><\/div>';
  h+='<div id="sim-results" class="mt-12"><\/div>';
  h+='<\/div>';
  c.innerHTML=h;
  if(S._simResults)showSimResults();
}

function runSim(){
  var ctx=$("sim-ctx").value;S._simCtx=ctx;
  if(!ctx.trim()){toast("请输入上下文文本","warning");return}
  var wi=S.entries;
  var hits=[];var misses=[];
  wi.forEach(function(e,i){
    if(!e.enabled){misses.push({e:e,i:i,reason:"禁用"});return}
    if(e.constant){hits.push({e:e,i:i,reason:"常驻",matched:[]});return}
    var matched=[];
    (e.keys||[]).forEach(function(k){
      if(!k)return;
      if(e.useRegex){
        try{var re=new RegExp(k,"i");if(re.test(ctx))matched.push(k)}catch(ex){}
      }else{
        if(ctx.toLowerCase().indexOf(k.toLowerCase())>=0)matched.push(k);
      }
    });
    if(matched.length){
      // Probability check
      if(e.useProbability&&e.probability<100){
        if(Math.random()*100>e.probability){misses.push({e:e,i:i,reason:"概率未通过 ("+e.probability+"%)"});return}
      }
      hits.push({e:e,i:i,reason:"关键词匹配",matched:matched});
    }else{
      misses.push({e:e,i:i,reason:"未匹配关键词"});
    }
  });

  // Sort hits by position weight then order
  var posWeight={"before_char":0,"after_char":1,"at_depth":2,"user_top":3,"assistant_top":4};
  hits.sort(function(a,b){
    var pw=(posWeight[a.e.position]||0)-(posWeight[b.e.position]||0);
    return pw||a.e.order-b.e.order;
  });
  S._simResults={hits:hits,misses:misses,ctx:ctx};
  showSimResults();
}

function showSimResults(){
  var r=S._simResults;if(!r)return;
  var el=$("sim-results");if(!el)return;
  var h='<div class="flex-b mb-8"><span style="font-weight:800">命中: '+r.hits.length+'<\/span><span style="color:var(--tx3)">未命中: '+r.misses.length+'<\/span><\/div>';

  // Group by position
  var groups={};
  r.hits.forEach(function(h){
    var pos=h.e.position;
    if(!groups[pos])groups[pos]=[];
    groups[pos].push(h);
  });

  for(var pos in groups){
    h+='<div style="font-size:11px;font-weight:800;color:var(--accent);margin:8px 0 4px">'+posLabel(pos)+'<\/div>';
    groups[pos].forEach(function(hit){
      h+='<div class="sim-hit"><span class="entry-idx">#'+hit.i+'<\/span> <b>'+esc(hit.e.comment)+'<\/b> <span style="font-size:10px;color:var(--tx3)">['+hit.reason+']<\/span>';
      if(hit.matched&&hit.matched.length)h+=' <span style="font-size:10px">匹配: '+hit.matched.map(function(k){return'<span class="sim-hl">'+esc(k)+'<\/span>'}).join(", ")+'<\/span>';
      h+='<\/div>';
    });
  }

  if(r.misses.length){
    h+='<div style="font-size:11px;font-weight:800;color:var(--tx3);margin:12px 0 4px">未命中<\/div>';
    r.misses.slice(0,20).forEach(function(miss){
      h+='<div class="sim-miss"><span class="entry-idx">#'+miss.i+'<\/span> '+esc(miss.e.comment)+' <span style="font-size:10px">['+miss.reason+']<\/span><\/div>';
    });
    if(r.misses.length>20)h+='<div class="sim-miss">...还有 '+(r.misses.length-20)+' 条<\/div>';
  }
  el.innerHTML=h;
}

function estimateTokens(text){
  var s=String(text||"");
  var cjk=0,ascii=0,other=0;
  for(var i=0;i<s.length;i++){
    var c=s.charCodeAt(i);
    if((c>=0x4e00&&c<=0x9fff)||(c>=0x3000&&c<=0x30ff))cjk++;
    else if(c<0x80)ascii++;
    else other++;
  }
  return Math.ceil(cjk+ascii/4+other/2);
}

    generate:"从零构建完整世界书条目集。最小完整集: L0元规则2-3条+L1世界观3-5条+L2角色3-5条+L3动态系统2-3条=12-18条(缝合/复合题材+3-5条)。按依赖拓扑自底向上生成。JSON保障: 每条写完立刻闭合}，接近输出上限时立刻闭合]。宁可少几条也不要输出截断的JSON。",

  };
  if(modeLabels[mode]){

  out.push("\n\n# 输出示例\n[{\"comment\":\"世界观总则\",\"content\":\"现代悬疑题材...详细内容≥100字...\",\"enabled\":true,\"scope\":\"character\",\"keys\":[],\"useRegex\":true,\"constant\":true,\"position\":\"before_char\",\"order\":0,\"depth\":4,\"scanDepth\":2,\"probability\":100,\"useProbability\":true}]\n每条必须有全部13字段。content≥100字。JSON合法性优先于条目数——完整的12条 > 截断的20条。");

  }

  if(mode==='generate'){
    out.push("\n\n# ⚠ 生成提醒\n必须生成12-18条完整条目（缝合/复合题材+3-5条）。每条写完立刻闭合}。接近输出上限时立刻闭合]。JSON合法性优先——完整的12条 > 截断的20条。");

  }
  var prompt=out.join("\n");
  var est=estimateTokens(prompt);
  if(est>30000)toast("系统提示词约 "+est+" token，建议减少模块。","warning");
  return prompt;
}

/* ===== Chunk helpers ===== */
function compactWI(e,idx){
  // B3: compactWI now emits abbreviated field names to cut user-prompt size
  // (~6.4k tokens saved on a 333-entry worldbook). The compact format is ONLY
  // used for INPUT context (selectedWorldChunks / compactWorldFull / etc.).
  // The AI OUTPUT format (<<<WI N>>> blocks or generate-mode JSON array) is
  // UNCHANGED — still standard full JSON with all native field names. A field
  // legend is emitted once at the top of buildSystemPrompt so the model can
  // read the abbreviations. Fields whose value equals the boolean-false /
  // default are omitted entirely to save space.
  var k=arr(e.keys),c=String(e.comment||""),n=String(e.name||""),content=String(e.content||"");
  var parts=[];
  parts.push("### worldInfo["+(idx!==undefined?idx:"?")+"]");
  parts.push("c:"+c);
  if(n&&n!==c)parts.push("n:"+n);
  parts.push("k:"+k.join("/"));
  parts.push("p:"+String(e.position||""));
  parts.push("o:"+(e.order!==undefined?e.order:""));
  parts.push("C:"+(e.constant?"1":"0"));
  if(e.enabled===false)parts.push("E:0");
  if(e.depth!=null)parts.push("d:"+e.depth);
  if(e.scanDepth!=null)parts.push("s:"+e.scanDepth);
  if(e.useRegex)parts.push("rx:1");
  if(e.useProbability){
    parts.push("up:1");
    parts.push("prob:"+(e.probability!==undefined?e.probability:100));
  }else if(e.probability!==undefined&&e.probability!==100){
    // useProbability=false 但 prob≠100：显示 prob 以暴露反模式（prob 字段无意义）
    parts.push("prob:"+e.probability);
  }
  parts.push("content:"+content);
  return parts.join(" | ");
}
function worldIndexContext(){
  var out=[];
  for(var i=0;i<S.entries.length;i++)out.push(compactWI(S.entries[i],i));
  return out.join("\n\n");
}
function worldIndexSlim(){
  // Analysis-stage compact view: only idx/comment/name/keys + content truncated to 200 chars, no 2-space indent.
  var out=[];
  for(var i=0;i<S.entries.length;i++){
    var e=S.entries[i];
    var c=String(e.content||"");
    if(c.length>200)c=c.slice(0,200)+"…";
    out.push("["+i+"] "+String(e.comment||e.name||"")+" | keys:"+arr(e.keys).join("/")+" | "+JSON.stringify(c));
  }
  return out.join("\n");
}
function worldIndexForAnalysis(){
  // B10: ultra-compact analysis view — idx + comment + keys ONLY (no content body).
  // Rationale: the analysis stage only needs to decide WHICH entries to select
  // and write an outline; content bodies blow up the user prompt by ~20k tokens
  // for large worldbooks and are never read at this stage. The full content
  // is sent later inside selectedWorldChunks for the actual edit pass.
  var out=[];
  for(var i=0;i<S.entries.length;i++){
    var e=S.entries[i];
    out.push("["+i+"] "+String(e.comment||e.name||"")+" | keys:"+arr(e.keys).join("/"));
  }
  return out.join("\n");
}

function computeChunkTokenBudget(ctxWindow,sysTokens,userBaseTokens,maxOut){
  var safety=2000;
  var available=(ctxWindow||128000)-(sysTokens||0)-(userBaseTokens||0)-(maxOut||8192)-safety;
  if(available<4000){
    toast("模型上下文窗口过小（可用 token < 4000），分段可能过碎。建议增大窗口或减少模块。","warning");
    available=4000;
  }
  return available;
}

function selectedWorldChunks(tokenBudget,segment,analysis){
  var idxs=analysis&&analysis.indices&&analysis.indices.length?analysis.indices:allIndices(S.entries.length);
  if(!segment||!tokenBudget){
    var all="";var allIdxs=[];
    for(var i=0;i<idxs.length;i++){
      var idx=idxs[i];
      if(idx<0||idx>=S.entries.length)continue;
      all+=compactWI(S.entries[idx],idx)+"\n\n";
      allIdxs.push(idx);
    }
    return allIdxs.length?[{text:all,indices:allIdxs}]:[""];
  }
  var parts=[];var cur="";var curIdxs=[];var curTokens=0;
  for(var i=0;i<idxs.length;i++){
    var idx=idxs[i];
    if(idx<0||idx>=S.entries.length)continue;
    var item=compactWI(S.entries[idx],idx)+"\n\n";
    var itemTokens=estimateTokens(item);
    if(cur&&curTokens+itemTokens>tokenBudget){
      parts.push({text:cur,indices:curIdxs});
      cur="";curIdxs=[];curTokens=0;
    }
    cur+=item;curIdxs.push(idx);curTokens+=itemTokens;
  }
  if(cur)parts.push({text:cur,indices:curIdxs});
  return parts.length?parts:[""];
}

function allIndices(n){var out=[];for(var i=0;i<n;i++)out.push(i);return out}

function chunkContent(chunk){return typeof chunk==="string"?chunk:(chunk&&chunk.text||"")}
function chunkIndices(chunk){return typeof chunk==="string"?extractIndices(chunk):arr(chunk&&chunk.indices)}

/* ===== Coverage ===== */
function buildCoverage(analysis,chunks,generated){
  var target=uniqueNums(analysis&&analysis.indices?analysis.indices:[]);
  var sent=[];
  var returned=extractReturnedIndices(generated);
  for(var i=0;i<chunks.length;i++)sent=sent.concat(chunkIndices(chunks[i]));
  sent=uniqueNums(sent);
  if(!target.length)target=sent.slice(0);
  return{target:target,sent:sent,returned:returned,missingSent:diffNums(target,sent),missingReturned:diffNums(target,returned)};
}

function coverageText(c){
  c=c||{target:[],sent:[],returned:[],missingSent:[],missingReturned:[]};
  return"目标索引: "+fmtNums(c.target)+"\n已发送索引: "+fmtNums(c.sent)+"\n已返回索引: "+fmtNums(c.returned)+"\n发送遗漏: "+fmtNums(c.missingSent)+"\n返回遗漏: "+fmtNums(c.missingReturned)+"\n判定: "+(c.missingSent.length||c.missingReturned.length?"存在遗漏，需要检查或补发":"本地覆盖完整");
}

function extractReturnedIndices(text){
  var out=[];var s=String(text||"");
  var re=/<<<WI\s+(\d+)>>>/g,re2=/###\s*worldInfo\[(\d+)\]/g,re3=/(?:本段已处理索引)[^\d\n]*([0-9,，、\s\[\]]+)/g;
  var m;
  while((m=re.exec(s))!==null)out.push(parseInt(m[1],10));
  while((m=re2.exec(s))!==null)out.push(parseInt(m[1],10));
  while((m=re3.exec(s))!==null)out=out.concat(extractIndices(m[1]));
  return uniqueNums(out);
}

function extractIndices(text){var out=[];var re=/\d+/g;var m;while((m=re.exec(String(text||"")))!==null)out.push(parseInt(m[0],10));return uniqueNums(out)}
function uniqueNums(list){var seen={};var out=[];for(var i=0;i<arr(list).length;i++){var n=parseInt(list[i],10);if(!isNaN(n)&&!seen[n]){seen[n]=true;out.push(n)}}out.sort(function(a,b){return a-b});return out}
function diffNums(a,b){var seen={};var out=[];b=arr(b);for(var i=0;i<b.length;i++)seen[b[i]]=true;for(var i=0;i<arr(a).length;i++)if(!seen[a[i]])out.push(a[i]);return out}
function fmtNums(list){list=uniqueNums(list);return list.length?"["+list.join("][")+"]":"[]"}

/* ===== Parse AI output ===== */
function parseWorldInfo(text){
  var fence=String.fromCharCode(96)+String.fromCharCode(96)+String.fromCharCode(96);
  var raw=String(text||"").replace(new RegExp("^"+fence+"(?:json)?\\s*","i"),"").replace(new RegExp("\\s*"+fence+"$","i"),"");
  var blocks=parseWIBlocks(raw);
  if(blocks.entries.length)return blocks;
  var arrText=findJsonArray(raw);
  if(!arrText)return null;
  try{
    var parsed=JSON.parse(arrText);
    if(!Array.isArray(parsed))return null;
    return{entries:parsed.map(function(e,i){return normWI(e,i)})};
  }catch(e){return null}
}

function parseWIBlocks(text){
  var re=/<<<WI\s+(\d+)>>>\s*\n([\s\S]*?)<<<END_WI>>>/g;
  var entries=[];var indices=[];
  var seen={};
  var conflicts=[];
  var fence=String.fromCharCode(96)+String.fromCharCode(96)+String.fromCharCode(96);
  var m;
  while((m=re.exec(String(text||"")))!==null){
    var raw=m[2].replace(/^\n+/,"").replace(/\n+$/,"").replace(new RegExp("^"+fence+"(?:json)?\\s*","i"),"").replace(new RegExp("\\s*"+fence+"$","i"),"").trim();
    try{var obj=JSON.parse(raw);var idx=parseInt(m[1],10);if(seen[idx])conflicts.push(idx);seen[idx]=true;indices.push(idx);entries.push(normWI(obj,entries.length))}catch(e){}
  }
  // D2 fix: surface cross-segment collisions on the same index so the user sees the
  // conflict before applying. parseWorldInfo is called from runAIGenerate after the
  // full workflow, and parseWIBlocks may run on the concatenated output of all chunks,
  // so this catches "two chunks both rewrote index N" cases.
  if(conflicts.length){
    var msg="检测到重复索引被多段修改：["+conflicts.join(", ")+"]，后出现的版本会覆盖前者。";
    if(S.ai&&S.ai.logs&&S.ai.logs.indexOf(msg)<0)S.ai.logs.push(msg);
  }
  return{entries:entries,indices:indices};
}

function findJsonArray(s){
  var start=s.indexOf("[");var depth=0;var inStr=false;var escp=false;
  if(start<0)return"";
  for(var i=start;i<s.length;i++){
    var ch=s.charAt(i);
    if(inStr){if(escp)escp=false;else if(ch==="\\")escp=true;else if(ch==='"')inStr=false}
    else{if(ch==='"')inStr=true;else if(ch==="[")depth++;else if(ch==="]"){depth--;if(depth===0)return s.slice(start,i+1)}}
  }
  // 截断容错：JSON数组被max_tokens截断时，尝试回退到最后一个完整对象并补闭合
  if(depth>0){
    var partial=s.slice(start);
    // 找最后一个完整的 },
    var lastClose=partial.lastIndexOf("},");
    if(lastClose<0)lastClose=partial.lastIndexOf("}\n");
    if(lastClose>0){
      var recovered=partial.slice(0,lastClose+1)+"]";
      try{JSON.parse(recovered);return recovered}catch(e){}
    }
    // 尝试直接补 }]
    try{JSON.parse(partial+"}]");return partial+"}]"}catch(e){}
    try{JSON.parse(partial+"]");return partial+"]"}catch(e){}
  }
  return"";
}

function findJsonObject(s){
  var start=s.indexOf("{");var depth=0;var inStr=false;var escp=false;
  if(start<0)return"";
  for(var i=start;i<s.length;i++){
    var ch=s.charAt(i);
    if(inStr){if(escp)escp=false;else if(ch==="\\")escp=true;else if(ch==='"')inStr=false}
    else{if(ch==='"')inStr=true;else if(ch==="{")depth++;else if(ch==="}"){depth--;if(depth===0)return s.slice(start,i+1)}}
  }
  return"";
}

function parseAnalysis(text){
  var obj={};
  var raw=findJsonObject(String(text||""));
  var hadJson=!!raw;
  if(raw){try{obj=JSON.parse(raw)}catch(e){obj={}}}
  var rawIndices=arr(obj.indices);
  obj.indices=arr(obj.indices);
  for(var i=obj.indices.length-1;i>=0;i--){obj.indices[i]=parseInt(obj.indices[i],10);if(isNaN(obj.indices[i])||obj.indices[i]<0||obj.indices[i]>=S.entries.length)obj.indices.splice(i,1)}
  // S4 fix: NEVER silently fall back to all indices. Empty indices means the analysis
  // failed (stream interrupted / bad JSON / model returned none / all out of range).
  // Surface a clear error so the user can retry instead of silently sending the whole
  // worldbook downstream.
  if(!obj.indices.length){
    if(!hadJson)throw new Error("分析阶段失败：未解析出 JSON 对象，请重试（可能是流式中断或模型未按格式输出）。");
    if(rawIndices.length)throw new Error("分析阶段失败：indices 全部超出范围（条目总数 "+S.entries.length+"）。请重试。");
    if(String(obj.outline||"").length<2)throw new Error("分析阶段失败：JSON 缺少 indices/outline，请重试。");
    throw new Error("分析阶段失败：未选中任何索引（indices 为空）。请重试，或调整需求让模型明确要修改的条目。");
  }
  obj.outline=String(obj.outline||text||"");
  obj.type=String(obj.type||"未明确");
  autoSelectModules(obj.type+"\n"+obj.outline);
  return obj;
}

function autoSelectModules(text){
  var s=String(text||"");
  // Do NOT mass-disable modules — preserve user-enabled state.
  var coreMap={core:1,format:1,card:1,dialog:1,genwall:1,patch:1};
  var map=[{k:"场景|地点|空间|环境",id:"scene"},{k:"仙侠|玄幻|修真|科幻|赛博|末日|宫廷|朝堂",id:"sceneGenre"},{k:"角色|人设|性格|语言",id:"character"},{k:"成长|弧线|转折",id:"charArc"},{k:"仙侠|玄幻|修真|宫廷|朝堂",id:"charGenre"},{k:"NPC|配角|路人|科幻|赛博|末日",id:"npcGenre"},{k:"事件|剧情|任务|伏笔",id:"event"},{k:"关系|好感|情感",id:"relation"},{k:"时间|日程",id:"time"},{k:"世界|势力|阵营|制度|地理",id:"world"},{k:"对话|说话|语气|口吻",id:"dialog"},{k:"战斗|冲突|伤害",id:"combat"},{k:"亲密|NSFW",id:"nsfw"},{k:"死亡|不可逆|创伤",id:"death"},{k:"诊断|优化|修复",id:"diagnose"},{k:"隔离|生成阶段|RP阶段|GEN-WALL",id:"genwall"}];
  // Force core modules on
  ["core","format","card","dialog","genwall","patch"].forEach(function(id){for(var i=0;i<MODULES.length;i++)if(MODULES[i].id===id)MODULES[i].on=true});
  // Only auto-enable modules the user did NOT already toggle on
  for(var i=0;i<MODULES.length;i++){
    var m=MODULES[i];
    if(m.on)continue;            // user enabled or core — leave it
    if(coreMap[m.id])continue;   // core already handled
    for(var j=0;j<map.length;j++){
      if(map[j].id===m.id && new RegExp(map[j].k,"i").test(s)){m.on=true;break}
    }
  }
  saveModuleState();
}

/* ===== LLM Call ===== */
var _abortCtrl=null;
function abortLLM(){if(_abortCtrl){try{_abortCtrl.abort()}catch(e){}}_abortCtrl=null}
function abortAI(){
  // S3 fix: user-facing stop. Aborts the in-flight LLM request, clears the busy flag,
  // and re-renders. Throwing AbortError ensures the workflow rejection path can
  // distinguish a stop from a real failure (see runAIGenerate / runChunks).
  abortLLM();
  if(S.ai.busy){
    S.ai.busy=false;
    S.ai.status="已停止";
    setAIStatus("已停止",S.ai.progress);
    toast("已停止生成","info");
    renderAI();
    // Wake up the pending fetch promise's rejection chain with an AbortError so the
    // runAIGenerate .catch sees the right reason.
    setTimeout(function(){},0);
  }
}
function callLLM(systemPrompt,userContent,opts){
  opts=opts||{};
  if(!S.api.url||!S.api.key||!S.api.model)return Promise.reject(new Error("请先配置 API"));
  abortLLM();
  _abortCtrl=new AbortController();
  var signal=_abortCtrl.signal;
  var timeoutId=setTimeout(function(){abortLLM()},120000);
  var url=buildApiEndpoint("chat/completions");
  var body={
    model:S.api.model,
    messages:[{role:"system",content:systemPrompt},{role:"user",content:userContent}],
    stream:!!opts.stream,
    temperature:opts.temperature||0.75
  };
  // B1: prompt-caching. When opts.cacheable is set (e.g. the multi-segment edit
  // loop reuses an identical system prompt across segments), tag messages[0]
  // with cache_control:{type:"ephemeral"} so the provider can cache the prefix.
  // This typically cuts billed input tokens ~78% on segment 2..N. The marker is
  // a hint; providers that don't support cache_control will ignore the extra key.
  if(opts.cacheable&&body.messages&&body.messages.length){
    body.messages[0].cache_control={type:"ephemeral"};
  }
  if(opts.maxTokens)body.max_tokens=opts.maxTokens;
  return fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.api.key},
    body:JSON.stringify(body),
    signal:signal
  }).then(function(res){
    clearTimeout(timeoutId);
    if(!res.ok)return res.text().then(function(t){throw new Error("API "+res.status+": "+t)});
    if(!opts.stream)return res.json().then(function(d){return d.choices[0].message.content});
    var reader=res.body.getReader();
    var decoder=new TextDecoder();
    var full="";var buffer="";
    function read(){
      return reader.read().then(function(result){
        if(result.done)return full;
        buffer+=decoder.decode(result.value,{stream:true});
        var lines=buffer.split("\n");buffer=lines.pop();
        for(var i=0;i<lines.length;i++){
          var line=lines[i].trim();
          if(!line.startsWith("data:"))continue;
          var data=line.slice(5).trim();
          if(data==="[DONE]")continue;
          try{
            var json=JSON.parse(data);
            var delta=json.choices&&json.choices[0]&&json.choices[0].delta;
            if(delta&&delta.content){full+=delta.content;if(opts.onChunk)opts.onChunk(delta.content,full)}
          }catch(e){if(opts.onParseError)opts.onParseError(e,data)}
        }
        return read();
      });
    }
    return read();
  });
}

/* ===== Workflow ===== */
function buildChunkSummary(text){
  // D3 fix v2: extract a structured summary of indices + comments instead of
  // pasting raw JSON blocks, so the next segment sees a strong signal, not noise.
  // Extended: also extract keys per entry to give the next segment a trigger hint.
  // B4: additionally extract the set of top-level field names present in each
  // <<<WI N>>> block, and flag "non-routine" fields (anything other than the
  // always-expected content/keys/comment/name/enabled) so the next segment can
  // see e.g. "this segment also touched position/order". Appended as
  // "| 改:position,order" at end of the per-entry summary line.
  var s=String(text||"");
  // Capture from <<<WI N>>> up to <<<END_WI>>> so we can extract both comment AND keys
  var re=/<<<WI\s+(\d+)>>>[\s\S]*?<<<END_WI>>>/g;
  var commentRe=/"comment"\s*:\s*"((?:[^"\\]|\\.)*)"/;
  var keysRe=/"keys"\s*:\s*\[((?:[^\]]|\\.)*)\]/;
  // B4: collect any top-level field name in the WI block.
  var fieldRe=/"(comment|name|keys|content|enabled|constant|order|position|depth|probability|useProbability|useRegex|scanDepth)"\s*:/g;
  // Fields that are routine/always-present — not worth flagging.
  var routineFields={comment:1,name:1,keys:1,content:1,enabled:1};
  var idx=[],comments=[],m;
  while((m=re.exec(s))!==null){
    idx.push(m[1]);
    var blockStr=m[0];
    var cm=blockStr.match(commentRe);
    var c=cm?cm[1].replace(/\\./g,"").slice(0,40):"";
    // Extract the keys array string from the same WI block
    var keysStr="";
    var km=blockStr.match(keysRe);
    if(km){
      // Parse the inner array content: pull out quoted strings
      var kRe=/"((?:[^"\\]|\\.)*)"/g;
      var km2;var keys=[];
      while((km2=kRe.exec(km[1]))!==null)keys.push(km2[1]);
      if(keys.length)keysStr=" | keys: "+keys.join("/");
    }
    // B4: extract non-routine modified fields for this block.
    var changedStr="";
    var seen={},fm;
    fieldRe.lastIndex=0;
    while((fm=fieldRe.exec(blockStr))!==null){
      var fname=fm[1];
      if(!routineFields[fname]&&!seen[fname])seen[fname]=1;
    }
    var changedList=Object.keys(seen);
    if(changedList.length){
      if(changedList.length>3)changedList=changedList.slice(0,3).concat(["等多字段"]);
      changedStr=" | 改:"+changedList.join(",");
    }
    comments.push("["+m[1]+"] "+c+keysStr+changedStr);
  }
  if(idx.length){
    var head="已处理索引: ["+idx.join(", ")+"]";
    var body=comments.join("\n");
    var out=head+"\n"+body;
    return out.length>2000?out.slice(0,2000)+"\n...(已截断)":out;
  }
  // New-entry mode: count JSON array length
  var arrRe=/\[\s*\{/;
  if(arrRe.test(s)){
    var jsonStart=s.indexOf("[");
    if(jsonStart>=0){
      var depth=0,inStr=false,escp=false,end=-1;
      for(var i=jsonStart;i<s.length;i++){
        var ch=s.charAt(i);
        if(inStr){if(escp)escp=false;else if(ch==="\\")escp=true;else if(ch==='"')inStr=false}
        else{if(ch==='"')inStr=true;else if(ch==="[")depth++;else if(ch==="]"){depth--;if(depth===0){end=i+1;break}}}
      }
      if(end>0){
        try{
          var arr=JSON.parse(s.slice(jsonStart,end));
          if(Array.isArray(arr))return"已生成新条目 "+arr.length+" 条（新增模式 JSON 数组）";
        }catch(e){}
      }
    }
  }
  // Fallback: short crop
  return crop(s,1500);
}
function runChunks(systemPrompt,baseUser,chunks,opt,prefix){
  var finalOutput="";var summary="";var total=chunks.length||1;
  function callSeg(i,attempt){
    var ct=chunkContent(chunks[i]);
    var user=baseUser+"\n\n【分段策略】当前为第 "+(i+1)+" / "+total+" 段。当前段索引为 "+chunkIndices(chunks[i]).join(", ")+"。必须为每个需要修改的已有条目返回 <<<WI 索引号>>> 完整块。";
    if(summary)user+="\n\n【前序段摘要】\n"+summary;
    if(ct)user+="\n\n【当前世界书上下文分段】\n"+ct;
    setAIStatus("请求第 "+(i+1)+" / "+total+" 段"+(attempt?"（重试）":""),Math.floor(i*85/total)+8);
    return callLLM(systemPrompt,user,{
      stream:opt.stream,temperature:opt.temperature,maxTokens:opt.maxTokens,
      cacheable:true,
      onChunk:function(chunk,all){
        if(opt.streamShow){S.ai.output=(prefix||"")+finalOutput+(finalOutput?"\n\n":"")+all;updateAIOutput()}
      }
    });
  }
  function next(i){
    if(i>=total)return Promise.resolve(finalOutput);
    return callSeg(i,0).then(function(out){
      finalOutput+=(finalOutput?"\n\n":"")+out;
      summary=buildChunkSummary(out);
      if(S.ai.chunkMode==="preview"){
        var parsed=parseWorldInfo(out);
        if(parsed)S.ai.chunkResults.push({chunkIdx:i,parsed:parsed,raw:out,applied:false});
      }
      return next(i+1);
    }).catch(function(e){
      // S3 fix: if the user aborted, do NOT retry and do NOT swallow — propagate so the
      // workflow stops cleanly and runAIGenerate shows "已停止生成".
      if(e&&(e.name==="AbortError"||/abort/i.test(String(e.message||""))))throw e;
      // S5 fix: retry once after a short delay before giving up on this segment.
      // Do NOT treat a failed segment as success. Mark it in logs and skip, but only
      // after the retry attempt also fails.
      return new Promise(function(resolve,reject){
        setTimeout(function(){
          callSeg(i,1).then(function(out){
            finalOutput+=(finalOutput?"\n\n":"")+out;
            summary=buildChunkSummary(out);
            S.ai.logs.push("段"+(i+1)+"第一次失败已重试成功");
            if(S.ai.chunkMode==="preview"){
              var parsed=parseWorldInfo(out);
              if(parsed)S.ai.chunkResults.push({chunkIdx:i,parsed:parsed,raw:out,applied:false});
            }
            resolve(next(i+1));
          }).catch(function(e2){
            // Retry also failed: record the gap (which indices were NOT processed) so the
            // user can see it in the coverage check, then continue with remaining segments.
            var missed=chunkIndices(chunks[i]);
            S.ai.logs.push("段"+(i+1)+"重试仍失败（索引 "+fmtNums(missed)+" 未处理）: "+e2.message);
            resolve(next(i+1));
          });
        },800);
      });
    });
  }
  return next(0);
}

function runWorkflow(req,mode,opt){
  var ai=S.ai;
  var analysisText="";var analysis=null;
  var generated="";var review="";var display="";
  var chunks=[];var coverage=null;

  setAIStatus("解析全世界书并制作大纲",6);
  var systemPrompt="";

  // D7 fix: split temperatures by stage. Analysis/review need stable structured output,
  // so they use low temperature regardless of the user's slider. The user's chosen
  // temperature only applies to the actual content-editing chunks.
  var analysisTemp=0.3;
  var reviewTemp=0.2;

  return callLLM(analysisPrompt(),analysisUserPrompt(req,mode),{
    stream:opt.stream,temperature:analysisTemp,
    onChunk:function(c,all){if(opt.streamShow){ai.output=all;updateAIOutput()}}
  }).then(function(out){
    analysisText=out;
    analysis=parseAnalysis(out);
    display="【全世界书解析与修改大纲】\n"+analysisText+"\n\n---\n\n";
    ai.output=display;updateAIOutput();
    // Phase1结构诊断（optimize模式专用——为每批修改提供全局因果/信息/弧线诊断）
    var diagPromise;
    if(mode==='optimize'){
      setAIStatus("Phase1 全局结构诊断",14);
      diagPromise=callLLM(structureDiagnosisPrompt(),structureDiagnosisUserPrompt(),{
        stream:opt.stream,temperature:0.3,maxTokens:4096,
        onChunk:function(c,all){if(opt.streamShow){ai.output=display+"【结构诊断】\n"+all;updateAIOutput()}}
      }).then(function(diagOut){
        try{var m=diagOut.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0])}catch(e){}
        return null;
      });
    }else{
      diagPromise=Promise.resolve(null);
    }
    return diagPromise.then(function(diagnosis){
      if(diagnosis){
        display+="【Phase1结构诊断】\n核心规则: "+(diagnosis.core_rule||"未识别")+"\n孤立条目: "+(diagnosis.isolated||[]).length+"个\n弧线缺口: "+(diagnosis.arc_gaps||[]).length+"个\n\n---\n\n";
        ai.output=display;updateAIOutput();
      }
      setAIStatus("按大纲发送分段修改",18);
      systemPrompt=buildSystemPrompt(mode);
      var sysTokens=estimateTokens(systemPrompt);
      var userBase=buildUserPrompt(req,mode,analysis,diagnosis);
      var userBaseTokens=estimateTokens(userBase);
      var tokenBudget=computeChunkTokenBudget(S.aiOpts.ctxWindow,sysTokens,userBaseTokens,S.aiOpts.max||8192);
      chunks=selectedWorldChunks(tokenBudget,opt.segment,analysis);
      S.ai.logs.push("分段统计: 模型窗口="+S.aiOpts.ctxWindow+"tk, 系统提示="+sysTokens+"tk, 用户基础="+userBaseTokens+"tk, 每段预算="+tokenBudget+"tk, 条目总token="+estimateTokens(compactWorldFull())+"tk, 实际分段="+chunks.length+"段"+(diagnosis?" [Phase1诊断已注入]":""));
      return runChunks(systemPrompt,buildUserPrompt(req,mode,analysis,diagnosis),chunks,opt,display);
    });
  }).then(function(out){
    generated=out;
    coverage=buildCoverage(analysis,chunks,generated);
    display+=generated+"\n\n---\n\n【本地索引覆盖校验】\n"+coverageText(coverage)+"\n\n";
    ai.output=display;updateAIOutput();
    setAIStatus("复核修改内容质量",92);
    return callLLM(reviewPrompt(),reviewUserPrompt(analysisText,generated,coverage),{
      stream:opt.stream,temperature:reviewTemp,
      onChunk:function(c,all){if(opt.streamShow){ai.output=display+"【AI内容复核】\n"+all;updateAIOutput()}}
    });
  }).then(function(out){
    review=out;
    display+="【AI内容复核】\n"+review;
    return{display:display,generated:generated,review:review,analysis:analysis,coverage:coverage};
  });
}

/* ===== AI State helpers ===== */
function setAIStatus(text,progress){
  S.ai.status=text;S.ai.progress=progress;
  S.ai.logs.push(new Date().toLocaleTimeString("zh-CN")+" "+text);
  if(S.ai.logs.length>8)S.ai.logs.shift();
  var el=$("ai-status");if(el)el.textContent=text;
  var bar=$("ai-bar");if(bar)bar.style.width=Math.max(0,Math.min(100,progress))+"%";
  var log=$("ai-log");if(log)log.textContent=S.ai.logs.join("\n");
}
function updateAIOutput(){
  var el=$("ai-output");if(el){el.textContent=S.ai.output;el.scrollTop=el.scrollHeight}
}

function runAIGenerate(){
  var ai=S.ai;
  if(ai.busy){toast("正在运行中","warning");return}
  var req=$("ai-request");
  if(!req||!req.value.trim()){toast("请先填写生成需求","error");return}
  if(!S.api.url||!S.api.key||!S.api.model){toast("请先配置 API","error");return}

  syncAiOptsFromDOM();
  ai.busy=true;ai.output="";ai.parsed=null;ai.logs=[];ai.chunkResults=[];
  setAIStatus("准备上下文",4);

  var opt={
    stream:S.aiOpts.stream,
    streamShow:S.aiOpts.streamShow,
    segment:S.aiOpts.segment,
    temperature:S.aiOpts.temp,
    maxTokens:S.aiOpts.max||undefined
  };

  var mode=S.aiOpts.mode;
  toast("世界书生成已开始","info");

  // Auto snapshot
  if(S.aiOpts.snap&&S.entries.length){
    createSnapshot("生成前自动快照","AI生成前自动保存").then(doRun);
  }else{doRun()}

  function doRun(){
    runWorkflow(req.value,mode,opt).then(function(result){
      ai.output=result.display;
      // S2 fix: runWorkflow returns coverage, but it was never propagated to ai._coverage,
      // so the coverage card in renderAI() (guarded by if(ai._coverage)) never rendered.
      ai._coverage=result.coverage;
      ai.parsed=parseWorldInfo(result.generated);
      setAIStatus(ai.parsed?"解析完成 ("+ai.parsed.entries.length+" 条)":"未解析到 JSON",100);
      updateAIOutput();
      renderAIParsed();
      toast(ai.parsed?"生成结束：已解析 "+ai.parsed.entries.length+" 条世界书":"生成结束：未解析出 JSON 数组",ai.parsed?"success":"warning");
    }).catch(function(e){
      var msg=e&&e.name==="AbortError"?"已停止生成":(e?e.message:"未知错误");
      setAIStatus("生成失败: "+msg,0);
      toast("生成失败: "+msg,e&&e.name==="AbortError"?"info":"error");
    }).then(function(){ai.busy=false});
  }
}

function applyAIParsed(){
  var ai=S.ai;
  if(!ai.parsed||!ai.parsed.entries)return;
  // Layer C: warn about non-constant entries with empty keys
  var emptyKeyCount=0;
  ai.parsed.entries.forEach(function(e){if(!e.constant&&(!e.keys||!e.keys.length))emptyKeyCount++});
  if(emptyKeyCount)toast(emptyKeyCount+" 条条目缺少触发关键词，可能永远不会被触发","warning");
  var changed=0;var added=0;
  var overwriteCount=0;
  for(var i=0;i<ai.parsed.entries.length;i++){
    if(ai.parsed.indices&&ai.parsed.indices[i]!=null&&ai.parsed.indices[i]>=0&&ai.parsed.indices[i]<S.entries.length)overwriteCount++;
  }
  if(overwriteCount&&!confirm("将覆盖 "+overwriteCount+" 条已有条目，继续？"))return;
  for(var i=0;i<ai.parsed.entries.length;i++){
    if(ai.parsed.indices&&ai.parsed.indices[i]!=null&&ai.parsed.indices[i]>=0&&ai.parsed.indices[i]<S.entries.length){
      S.entries[ai.parsed.indices[i]]=ai.parsed.entries[i];changed++;
    }else{
      S.entries.push(ai.parsed.entries[i]);added++;
    }
  }
  saveEntries();
  toast("已更新 "+changed+" 条，追加 "+added+" 条世界书","success");
  renderEditor();
}

function applyChunkResult(chunkIdx){
  var cr=S.ai.chunkResults[chunkIdx];
  if(!cr||!cr.parsed)return;
  if(cr.applied){toast("此段已应用过","warning");return}
  cr.applied=true;
  var emptyKeyCount=0;
  cr.parsed.entries.forEach(function(e){if(!e.constant&&(!e.keys||!e.keys.length))emptyKeyCount++});
  if(emptyKeyCount)toast(emptyKeyCount+" 条条目缺少触发关键词","warning");
  var changed=0;var added=0;
  for(var i=0;i<cr.parsed.entries.length;i++){
    if(cr.parsed.indices&&cr.parsed.indices[i]!=null&&cr.parsed.indices[i]>=0&&cr.parsed.indices[i]<S.entries.length){
      S.entries[cr.parsed.indices[i]]=cr.parsed.entries[i];changed++;
    }else{
      S.entries.push(cr.parsed.entries[i]);added++;
    }
  }
  saveEntries();
  toast("段"+(chunkIdx+1)+"：更新 "+changed+" 条，追加 "+added+" 条","success");
}

/* ===== Snapshot System ===== */
function createSnapshot(title,note){
  if(!S.entries.length)return Promise.resolve();
  var id=genId();
  var meta={id:id,title:title||"快照",note:note||"",time:new Date().toLocaleString("zh-CN"),wiCount:S.entries.length};
  S.ai.snapshots.unshift(meta);
  var evicted=S.ai.snapshots.slice(20);
  S.ai.snapshots=S.ai.snapshots.slice(0,20);
  evicted.forEach(function(s){dbDel("snapshots",s.id)});
  try{localStorage.setItem("wb_snapshots",JSON.stringify(S.ai.snapshots))}catch(e){}
  return dbSet("snapshots",id,clone(S.entries));
}

function restoreSnapshot(id){
  return dbGet("snapshots",id).then(function(data){
    if(!data){toast("快照数据不存在","error");return}
    showDialog({title:"恢复快照",message:"确定恢复该快照？当前世界书数据会被覆盖。",type:"confirm"}).then(function(ok){
      if(!ok)return;
      S.entries=data.map(function(e,i){return normWI(e,i)});
      saveEntries();
      toast("快照已恢复","success");
      render();
    });
  });
}

function deleteSnapshot(id){
  S.ai.snapshots=S.ai.snapshots.filter(function(s){return s.id!==id});
  try{localStorage.setItem("wb_snapshots",JSON.stringify(S.ai.snapshots))}catch(e){}
  dbDel("snapshots",id);
  toast("快照已删除","info");
  render();
}

function loadSnapshots(){
  try{var s=localStorage.getItem("wb_snapshots");if(s)S.ai.snapshots=JSON.parse(s)}catch(e){}
}

function renderSnapshotSection(){
  var h='<div class="card"><div class="card-title"><span>快照<\/span><\/div>';
  h+='<div class="flex gap-4"><button class="btn btn-sm btn-p" onclick="createSnapshot(\'手动快照\',\'用户手动创建\').then(function(){toast(\'快照已创建\',\'success\');render()})">创建快照<\/button>';
  h+='<button class="btn btn-sm btn-s" onclick="loadSnapshots();render()">刷新<\/button><\/div>';
  h+='<div class="card-sub mt-8">恢复会覆盖当前世界书数据。应用生成结果前可自动创建快照。<\/div>';
  h+='<\/div>';
  return h;
}

function renderSnapshotHistory(){
  var snaps=S.ai.snapshots;
  var h='<div class="card"><div class="card-title"><span>快照历史<\/span><span class="card-sub">最多 20 个<\/span><\/div>';

function applyTemplate(tplIdx,mode){
  var tpl=BUILTIN_TPLS[tplIdx];if(!tpl)return;
  var entries=tpl.entries.map(function(e,i){return normWI(e,S.entries.length+i)});
  function doApply(){
    if(mode==="overwrite")S.entries=entries;
    else S.entries=S.entries.concat(entries);
    saveEntries();toast("已应用模板: "+tpl.name,"success");renderEditor();switchTab("editor");
  }
  if(mode==="overwrite")showDialog({title:"覆盖确认",message:"覆盖当前所有世界书条目？",type:"confirm"}).then(function(ok){if(ok)doApply()});
  else doApply();
}

function applyCustomTemplate(tplIdx,mode){
  var tpl=S.customTpls[tplIdx];if(!tpl||!tpl.entries)return;
  var entries=tpl.entries.map(function(e,i){return normWI(e,S.entries.length+i)});
  function doApply(){
    if(mode==="overwrite")S.entries=entries;
    else S.entries=S.entries.concat(entries);
    saveEntries();toast("已应用模板: "+tpl.name,"success");renderEditor();switchTab("editor");
  }
  if(mode==="overwrite")showDialog({title:"覆盖确认",message:"覆盖当前所有世界书条目？",type:"confirm"}).then(function(ok){if(ok)doApply()});
  else doApply();
}

function saveAsTemplate(){
  if(!S.entries.length){toast("当前无世界书条目","warning");return}
  showDialog({title:"保存模板",message:"请输入模板名称：",type:"prompt",defaultVal:"我的模板"}).then(function(name){
    if(!name)return;
    S.customTpls.push({name:name,entries:clone(S.entries)});
    saveCustomTpls();toast("已保存为模板","success");renderTemplates();
  });
}

function deleteCustomTemplate(idx){
  showDialog({title:"删除模板",message:"确定删除此模板？",type:"confirm"}).then(function(ok){
    if(!ok)return;
    S.customTpls.splice(idx,1);
    saveCustomTpls();renderTemplates();toast("已删除","info");
  });
}

function importTemplate(){
  var inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(){
      try{
        var data=JSON.parse(reader.result);
        if(Array.isArray(data)){data.forEach(function(t){if(t.name&&t.entries)S.customTpls.push(t)})}
        else if(data.name&&data.entries)S.customTpls.push(data);
        else{var entries=parseImportJSON(data);if(entries)S.customTpls.push({name:file.name.replace(/\.json$/,""),entries:entries})}
        saveCustomTpls();renderTemplates();toast("模板已导入","success");
      }catch(e){toast("导入失败: "+e.message,"error")}
    };
    reader.readAsText(file);
  };
  inp.click();
}

function exportAllTemplates(){
  dlFile("世界书模板_全部.json",JSON.stringify(S.customTpls,null,2),"application/json");
  toast("已导出","success");
}

function saveCustomTpls(){
  dbSet("templates","custom",S.customTpls);
}

function initCreditsScroll(){
  var scroll=$("credits-scroll");
  if(!scroll)return;
  scroll.addEventListener("scroll",function(){
    var cards=qa(".credit-card",scroll);
    var dots=qa(".credits-dot");
    if(!cards.length||!dots.length)return;
    var scrollLeft=scroll.scrollLeft;
    var cardWidth=cards[0].offsetWidth+12;
    var activeIdx=Math.round(scrollLeft/cardWidth);
    dots.forEach(function(d,i){d.classList.toggle("active",i===activeIdx)});
  });
}
function scrollCredits(idx){
  var scroll=$("credits-scroll");
  if(!scroll)return;
  var cards=qa(".credit-card",scroll);
  if(!cards[idx])return;
  cards[idx].scrollIntoView({behavior:"smooth",inline:"start",block:"nearest"});
}

  var cur=S.projects[S.currentProject];
  if(cur){
    h+='<div class="flex gap-4">';
    h+='<button class="btn btn-sm btn-s" onclick="renameProject('+S.currentProject+')">重命名<\/button>';
    if(S.projects.length>1)h+='<button class="btn btn-sm btn-d" onclick="deleteProject('+S.currentProject+')">删除项目<\/button>';
    h+='<\/div>';
  }
  h+='<\/div>';
  return h;
}

/* ===== Multi-Project Management ===== */

/* ===== Init ===== */
function init(){
  initTheme();
  initDB().then(function(){
    return dbGet("data","projects");
  }).then(function(data){
    if(data&&data.length){
      S.projects=data;
      try{var cp=parseInt(localStorage.getItem("wb_currentProject"),10);if(!isNaN(cp))S.currentProject=cp}catch(e){}
    S.currentProject=Math.min(S.currentProject,S.projects.length-1);
      S.entries=S.projects[S.currentProject].entries||[];
    }else{
      // Migration: try loading old single-array format
      return dbGet("data","entries").then(function(old){
        if(old&&old.length){
          S.projects=[{id:genId(),name:"默认项目",entries:old.map(function(e,i){return normWI(e,i)})}];
        }else{
          S.projects=[{id:genId(),name:"默认项目",entries:[]}];
        }
        S.currentProject=0;
        S.entries=S.projects[0].entries;
      });
    }
    return null;
  }).then(function(){
    return dbGet("templates","custom");
  }).then(function(tpls){
    if(tpls&&tpls.length)S.customTpls=tpls;
    loadApiConfig();
    loadAiOpts();
    loadSnapshots();
    initModules();
    // Tab click
    qa(".tab-item").forEach(function(el){
      el.addEventListener("click",function(){switchTab(this.dataset.tab)});
    });
    render();
  });
}

document.addEventListener("DOMContentLoaded",init);
window.addEventListener("beforeunload",function(){
  if(S._saveTimer){clearTimeout(S._saveTimer);if(S.projects[S.currentProject])S.projects[S.currentProject].entries=S.entries;try{localStorage.setItem("wb_projects_backup",JSON.stringify(S.projects))}catch(e){}}
});

</script>
<script src="/offline/sw-register.js"></script>
