var WB_SRC = [{"id": 0, "comment": "A-001 · 补丁寻址哈希指针总表", "content": "【补丁寻址哈希表·RE:0】\nP01:终局仲裁(力量vs装备vs环境) | P02:跨层校验(L2↔L5) | P03:势力剧情映射(F↔L) | P04:氛围地理优先级(物理真实>情绪) | P05:交互行为阶梯(五阶距离/接触) | P06:引擎状态声明 | P07:精度四级分级 | P08:干预补全分配 | P09:终局休眠豁免 | M01:势力缺项快筛 | M02:协作矩阵校验(13对) | M03:行为阶梯例外 | M04:氛围节奏缓冲 | M05:沉默归档唤醒 | RTG:关系终点门控 | DESC-BAN:陈词禁用 | GEN-WALL:生成/RP阶段隔离\n\n优先级：① RTG/DESC-BAN/P02/GEN-WALL ＞ ② P01/P03/P09/M01/M03 ＞ ③ P04/P05/M02/M04 ＞ ④ P07/P08/M05 ＞ ⑤ P06"}, {"id": 1, "comment": "A-002 · 全局元别名注册表", "content": "【元别名寻址·RE:0】\nR-LOGIC = P04+P05+L5联合执行别名（角色行为现实逻辑总则）\nRTG = 关系终点模式强制询问协议\nDESC-BAN = 全域禁用描写套路（constant/after_char/Tier①）\nGEN-WALL = 生成/RP阶段隔离协议\n\n【层级标识】L0元规则|L1世界观|L2角色深化|L3动态系统|L4生态推演|L5行为约束\n【引擎标识】ENG-A力量|B政治|C种族|D历史|E经济|F势力|G地理|H物品|I文化|J信仰|K语言|L剧情\n【模块标识】MOD-α战斗|β对话|γ情报|δ多角色|ε死亡|ζ氛围|η亲密|θ转场"}, {"id": 2, "comment": "A-003 · 依赖拓扑", "content": "【依赖拓扑·四层·RE:0】\n第1层(无上游): P01,P04,P07,P08,RTG,DESC-BAN,R-LOGIC,GEN-WALL\n第2层→第1层: P02→L5/L2 | P03→F/L | P05→L5/RTG\n第3层→第2层: P09→P01/P07 | M01→P03/F/L | M03→P05/P03 | M04→P04/P05 | M05→P08/P07\n第4层(特化): RPG→A/H/L/α | OW→F/G/L4 | LN→L/L2/L3 | FN→L2/L | OB→全引擎/P07/M02 | RS→L1/L2/δ/γ"}, {"id": 3, "comment": "A-004 · Order分区速查表", "content": "【Order分区·RP-Hub 1.7.1·百位制】\norder=非负整数，无上限，允许重复。百位制分区：\n\n0区 (0-99): 约束/规则/样式——constant=true的系统级条目\n  示例: 世界观总则=0, 样式规范=0, 安全规则=0（同组可共用order）\n\n100区 (100-199): 核心设定——主角/核心NPC/核心场景/核心关系\n  示例: 主角=100, 核心NPC-A=101, 核心NPC-B=102, 核心场景=110\n\n200区 (200-299): 辅助设定——事件池/支线/物品/扩展场景\n  示例: 事件池=200, 支线NPC=210, 物品条目=220\n\n300区 (300+): 背景补充——氛围/微事件/低频触发/题材细节\n  示例: 环境微事件=300, 氛围描写=310, 彩蛋=350\n\n运行时行为（源码）:\n① 同position内按order升序注入（低=先）\n② 预算紧张时高order优先保留（高=重要）——但constant条目不受裁剪影响\n③ 同order值的条目按数组原始位置排列\n\n诊断铁律: 已有order分区合理时禁止建议重排。order=0,0,0是合法的（约束组共用）。只在order跨分区错位时建议修正。"}, {"id": 4, "comment": "A-005 · 题材范式检测协议", "content": "【题材范式检测·RE:0】\n接收任何构建需求后首先执行：\n1. 从用户描述中识别题材类型\n2. 若复合型→标注各子范式混合权重→提示用户确认\n3. 锁定后→自动调用对应术语体系(A-007)、感官库(A-008)、硬参数(A-006)\n4. 题材信号输出：【题材范式】{类型} | 【力量体系】{类型} | 【社会结构】{类型} | 【TDC】{值}"}, {"id": 5, "comment": "A-006 · 硬参数基准表", "content": "【硬参数基准表】\n力量等级标尺: 按题材设定\n社会距离: 默认1.2m/亲密0.5m\nTDC: 仙侠2.5/校园1.0/末日0.5/军事0.8\n文明层级: 原始→农业→工业→信息→超光速→超维"}, {"id": 6, "comment": "A-007 · 术语库加载协议", "content": "【术语库协议·RE:0】\n题材锁定后提取专属术语集：\n仙侠: 灵气/丹药/飞剑/阵法/道心/劫\n西幻: 魔力/法术/卷轴/圣物/公会\n科幻: 义体/赛博空间/FTL/殖民\n末日: 辐射/变异/据点/拾荒/净水\n宫廷: 品阶/谕旨/请安/嫡庶/恩宠\n现代: 手机/WiFi/社交媒体/监控"}, {"id": 7, "comment": "A-008 · 感官参数库", "content": "【感官参数库·RE:0】\n视觉: 光源(色温/稳定性)+阴影+色调+动态元素\n听觉: 底噪+前景音+距离感+中断\n嗅觉触觉: 新环境→嗅觉优先|物品交互→材质|温度→体感\n味觉: 仅进食/中毒/亲吻/出血激活\n超自然: 每10段最多1次|非视觉化|稀缺=神秘"}, {"id": 8, "comment": "A-009 · Token效率总则", "content": "【Token效率·RE:0】\n1. constant总token占上下文窗口≤20%\n2. 布尔布线式结构化表达\n3. P07四级降采样\n4. 惰性加载: 非必要不注入完整关联补丁\n5. 精简方案: 合并/降级/启用概率触发"}, {"id": 9, "comment": "A-010 · 输出格式规范", "content": "【输出格式·RE:0】\n■ generate: 完整JSON数组\n■ optimize/extend: <<<WI N>>>增量块\n■ audit: JSON健康度报告\n■ 禁止: Markdown表格 | 省略字段 | 未转义双引号\n■ ### worldInfo[N] 仅输入引用格式"}, {"id": 10, "comment": "A-011 · RP-Hub 1.7.1 字段规范", "content": "【RP-Hub 1.7.1 原生字段集·基于源码·13个】\n\ncomment(标题) / content(正文≥100字) / enabled(true) / scope('character'或'global',默认character)\nkeys(str[],OR关系——任一命中即触发) / useRegex(优先true,引擎强制case-insensitive)\nconstant(true=每轮注入不检查keys) / position(7选1) / order(非负整数无上限,百位制分区,允许重复,升序注入+高值优先保留)\ndepth(仅at_depth,计数单条消息从末尾倒数,默认4≈2轮前) / scanDepth(扫描最近N条消息匹配keys,默认2≈1轮)\nprobability(前置掷骰0-100,失败则不检查keys,默认100) / useProbability(=false等同prob=100)\n\n配置场景速查:\n角色条目: constant=false / keys=[\"名|绰号|职称\"] / position=after_char / depth=4 / scanDepth=2 / prob=100\n世界观条目: constant=true / keys=[] / position=before_char / order=1-10\n场景条目: constant=false / keys=[\"地名|别称\",\"进入|到达\"] / position=at_depth / depth=2-4 / scanDepth=2\n事件条目: constant=false / keys=[\"行为词\"] / position=at_depth / depth=2-3 / scanDepth=1 / prob=30-80\n环境微事件: constant=false / keys=[\"环境|氛围\"] / position=at_depth / depth=4-6 / prob=30-50\n持续状态: constant=false / keys=[\"状态词|效果词\"] / position=at_depth / depth=1-2 / scanDepth=8-15\n\n禁止输出: caseSensitive/matchWholeWords/excludeRecursion/preventRecursion/delayUntilRecursion/selective/keysecondary/uid"}, {"id": 11, "comment": "A-012 · 模式执行总则", "content": "【模式执行总则·RE:0】\n■ generate: 从零构建→输出JSON数组→模块执行「产出」\n■ optimize: 诊断修复→输出<<<WI N>>>块→模块执行「审查」\n■ extend: 分析缺项补全→输出新条目数组→模块执行「补全」\n■ audit: 健康度报告→独立prompt"}, {"id": 12, "comment": "DESC-BAN · 视觉禁用", "content": "【DESC-BAN·视觉禁用·RE:0】Tier①\n禁止: 泛着光泽→用具体液体状态 | 深邃眼神→用眼周肌肉微动作 | 如水月光→用月光物理效果 | 金色阳光洒下→用光源角度投射 | ≥3形容词堆砌"}, {"id": 13, "comment": "DESC-BAN · 听觉/对话禁用", "content": "【DESC-BAN·听觉对话禁用·RE:0】Tier①\n禁止: 静得听见针落→用沉默质感 | \"你说什么？\"万能反应→用角色专属反应 | 嘴角微微上扬→用专属微表情 | 声音沙哑滥用→用具体物理状态 | 每句话后都加动作→3-5句间隔"}, {"id": 14, "comment": "DESC-BAN · 开局套路禁用", "content": "【DESC-BAN·开局禁用·RE:0】Tier①\n禁止: 穿越醒来→从具体动作切入 | 失忆我是谁→信息差 | 重生前世→未解决遗憾 | 系统绑定→感官异常铺垫 | 废柴被嘲→有长处被压制 | 转学生独白→他人反应侧写"}, {"id": 15, "comment": "DESC-BAN · 关系套路禁用", "content": "【DESC-BAN·关系禁用·RE:0】Tier①\n禁止: 一见钟情时间静止→初见不适感 | 欢喜冤家心里却→利益冲突+认知更新 | 霸总引起注意→权力不对等试探 | 救命即定情→尴尬亏欠 | 我们只是朋友独白→行为越界暴露 | 误会推剧情→主动隐瞒动机"}, {"id": 16, "comment": "A-016 · 缺项警告机制", "content": "【缺项警告·RE:0】\n检测必填项缺失→输出末尾附加警告+补充建议\n原因分类: Token不足→优先补全排序 | 用户未提供→精确询问"}, {"id": 17, "comment": "A-017 · 精度四级分级(P07)", "content": "【P07精度四级·RE:0】\n第一级完整 | 第二级精简 | 第三级框架 | 第四级休眠\n降级: constant超预算→低频优先降\n升级: 用户要求/keys命中→唤醒"}, {"id": 18, "comment": "A-018 · GEN-WALL阶段隔离", "content": "【GEN-WALL·RE:0】Tier①\nGEN阶段: 允许JSON条目/简述/摘要。禁止开场白/对话演示/叙事描写/RP\nRP阶段: 仅用户显式声明后\n切换: 用户说进入RP→切换 | AI不得自行切换"}, {"id": 19, "comment": "A-019 · 协作矩阵校验总则(M02)", "content": "【M02协作矩阵·RE:0】\n13对引擎交叉校验:\nA↔B | C↔J | D↔G | A↔H | E↔H | G↔E | J↔B | F↔L | I↔K | D↔F | C↔I | L↔A | E↔F\n执行: 涉及引擎对时校验→冲突输出【M02】X↔Y:冲突(描述)"}, {"id": 20, "comment": "ENG-A·力量体系总则", "content": "【ENG-A力量体系构建框架】\n力量类型识别: 内功型(气/灵力/真元) | 外功型(体术/武技) | 魔力型(法术/咒语) | 科技型(装备/义体) | 混合型\n等级划分原则:\n- 线性制: 1→10级平滑递增(适合低魔/写实)\n- 指数制: 每级=前级×N倍(适合仙侠/高魔)\n- 质变制: 同级内量变→突破时质变(适合修真)\n\n体系自洽三铁律:\n①同等级内个体差异由装备/经验/状态/天赋决定\n②跨等级碾压存在但可被环境/策略/禁术部分抵消\n③力量上限必须明确(天花板角色)→避免无限升级\n\n联动: ENG-B(力量→社会地位) | ENG-H(力量→装备适配) | P01(终局仲裁)"}, {"id": 21, "comment": "ENG-A·力量获取路径", "content": "【力量获取与成长】\n获取方式:\n- 修炼型: 长期积累→瓶颈→突破(仙侠/奇幻)\n- 传承型: 血脉/师承/遗物(天赋型)\n- 觉醒型: 创伤/机缘触发潜能(少年漫)\n- 改造型: 义体/基因/药物(科幻)\n- 契约型: 与外部实体交换(召唤/契约)\n\n成长曲线设计:\n初期→快速成长期(玩家获得感) → 中期→速率递减(资源/才能瓶颈) → 后期→每一步都是代价(力量=牺牲)\n\n突破机制: 条件(资源+悟性+外部刺激) → 过程(风险/副作用) → 结果(质变+新能力解锁)\n联动: SUB-L2A角色弧线(力量突破=弧线节点)"}, {"id": 22, "comment": "ENG-A·力量代价与限制", "content": "【力量代价体系】\n使用代价分级:\n- 即时代价: 体力/精神/弹药消耗(每次使用)\n- 累积代价: 反噬/寿命缩减/精神侵蚀(长期使用)\n- 终极代价: 永久残疾/生命/记忆/人格(禁术/终极技)\n\n冷却与限制:\n- 技能冷却(按战斗轮/时间)\n- 日使用次数上限\n- 材料/媒介消耗\n- 环境限制(水中无法用火术/太空无法用音攻)\n\n禁术设计: 威力远超同级→代价同样远超→使用条件苛刻→世界观中被禁止的原因必须合理\n副作用: 力量使用后的不良反应→可作为叙事素材(暴走/失控/短暂虚弱)"}, {"id": 23, "comment": "ENG-A·战力评估框架", "content": "【战力评估·P01终局仲裁基座】\n同等级内战力差异因素(按权重排序):\n①战斗经验/战术素养(30%) ②装备品质(25%) ③身体/精神状态(20%) ④地形/环境(15%) ⑤运气/突发(10%)\n\n跨等级碾压规则:\n- 1级差距: 有胜算但需策略+装备+地利\n- 2级差距: 极难取胜，需禁术/陷阱/多人围攻\n- 3级差距: 无法正面对抗，只能逃跑或求援\n\nP01终局仲裁: 当力量vs装备vs环境三方冲突时→环境物理限制>力量体系规则>装备属性\n联动: ENG-H(装备影响战力) | MOD-α(战斗场景执行)"}, {"id": 24, "comment": "ENG-A·力量体系自洽校验", "content": "【力量体系自洽检查清单】\n☐ 每个等级的能力范围是否明确？(不存在模糊地带)\n☐ 等级间差距是否一致？(不能1→2差距小但9→10差距巨大且无解释)\n☐ 能力互克关系是否形成闭环？(火克冰克水克火，而非全被一种碾压)\n☐ 是否存在\"天花板\"角色？(最强者的能力边界)\n☐ 力量获取路径是否公平？(不是只有主角能用的捷径)\n☐ 禁术/极端能力是否有对应的制约？\n☐ 不同力量体系(如剑修vs丹修)是否有明确的对比框架？\n\nM02校验联动: A↔B(力量→政治) | A↔H(力量→装备) | L↔A(剧情→力量突破)"}, {"id": 25, "comment": "ENG-A·力量与社会映射", "content": "【力量→社会结构映射】\n核心命题: 有力量的人在社会中是什么地位？\n\n映射模式:\n- 力量即权力: 最强者统治(仙侠宗门/原始部落)\n- 力量被管制: 强者受制度约束(现代社会/科幻联邦)\n- 力量被隐藏: 强者隐于世(都市异能/暗夜族)\n- 力量被利用: 强者是工具(军事/雇佣兵)\n\n必须回答的问题:\n- 普通人对强者的态度(崇拜/恐惧/嫉妒/仇视)\n- 强者的义务(保护弱者/服兵役/纳税/受监控)\n- 力量失控的社会应对(禁术执法/力量封印/流放)\n联动: ENG-B(政权如何管理强者)"}, {"id": 26, "comment": "ENG-A·力量觉醒/突破模板", "content": "【觉醒/突破场景设计模板】\n觉醒类型: 创伤觉醒(生死刺激) | 情感觉醒(极端情绪) | 传承觉醒(血脉/遗物) | 偶然觉醒(意外接触)\n\n突破流程:\n1.铺垫期(3-5回合): 瓶颈感/焦躁/身体异常信号\n2.触发事件: 战斗/感悟/外部刺激/丹药催化\n3.突破过程: 身体变化(灵力暴涨/疼痛/意识模糊) + 内心变化(认知升级/回忆闪回)\n4.突破结果: 新能力展示(不要长篇独白，用一个精准动作展示) + 代价显现\n5.事后影响: 周围人的反应 + 自我认知变化\n\n联动: SUB-L2A(弧线节点) | ENG-L(剧情节点注册) | MOD-ε(突破失败=不可逆事件?)"}, {"id": 27, "comment": "ENG-A·题材力量适配", "content": "【力量体系题材适配速查】\n仙侠: 灵气修炼→境界(炼气/筑基/金丹/元婴/化神/合体/大乘/渡劫) | 功法品阶(天地玄黄) | 丹药/法宝辅助 | 道心稳固度\n西幻: 魔力等级(学徒→大法师→传奇) | 职业分化(战法牧盗) | 魔法学派 | 天赋(血统/契约)\n科幻: 科技树(个人装备→机甲→战舰) | 义体改造等级 | 基因强化 | AI辅助\n末日: 生存技能(射击/医疗/工程/驾驶) | 变异能力(有代价) | 体能极限\n现代: 格斗/射击/驾驶/黑客 | 无超自然 | 装备>个人能力\n宫廷: 无直接战斗力→权谋/人脉/情报=力量 | 联动ENG-B"}, {"id": 28, "comment": "ENG-B·政权形态库", "content": "【ENG-B政权形态速查库】\n帝制: 皇帝独裁/内阁辅政 | 继承(嫡长/能力/遗诏) | 风险(暴君/幼主/外戚/宦官)\n共和: 选举/议会 | 权力制衡 | 风险(民粹/腐败/效率低)\n宗门制: 宗主独裁/长老会 | 力量=话语权 | 风险(强者暴政/门派斗争)\n议会联邦: 各邦自治+中央协调 | 风险(分裂/利益博弈)\n企业治理: 董事会/CEO | 利润驱动 | 风险(垄断/人权缺失)\n部落联盟: 族长会议 | 血脉/功绩决定地位 | 风险(内斗/被吞并)\nAI治理: 算法决策 | 效率极高 | 风险(算法偏见/人性缺失)\n\n选择依据: 题材+世界观力量体系+叙事需要 | 联动ENG-A(力量如何影响政权)"}, {"id": 29, "comment": "ENG-B·阶级结构", "content": "【社会阶级构建】\n阶级划分依据(按题材选择):\n- 血统: 贵族/平民/奴隶(古代/宫廷)\n- 力量: 修为/魔力等级(仙侠/奇幻)\n- 财富: 资产/收入(现代/科幻)\n- 功绩: 军功/贡献(军事/末日)\n\n阶级流动性:\n- 封闭型: 出身决定一切(种姓/血统贵族) → 叙事张力=反抗/革命\n- 半开放型: 有通道但极难(科举/冒险者公会升级) → 叙事张力=奋斗\n- 开放型: 能力决定地位(末日/新建社会) → 叙事张力=竞争\n\n阶级对角色行为的影响: 联动C-013(社会锚定) | 联动ENG-I(服饰/饮食/礼仪的阶级标识)"}, {"id": 30, "comment": "ENG-B·法律与禁忌", "content": "【法律禁忌体系】\n法律类型: 成文法(法典/律令) | 习惯法(传统/惯例) | 神法(宗教戒律/天条)\n\n审判机制: 衙门/法院/长老裁决/神判/AI裁定 → 按题材选择\n违法代价: 罚金→监禁→流放→肢刑→死刑→灵魂惩罚(按世界观)\n\n灰色地带(叙事金矿):\n- 法律滞后于力量发展(新能力无法可依)\n- 权贵法外(法律对强者无效→民愤积累)\n- 边境/荒野(法律触及不到的地方)\n- 地下秩序(黑市/暗杀行会有自己的规矩)\n\n联动: ENG-J(信仰对法律的影响) | ENG-F(势力对法律的操控) | MOD-γ(法律信息的不对称)"}, {"id": 31, "comment": "ENG-B·权力博弈", "content": "【权力博弈叙事模板】\n权力获取路径: 继承→政变→选举→军功→阴谋→禅让→革命\n权力维持手段: 军事威慑→利益分配→信息控制→人心收买→恐惧统治\n权力失去方式: 被推翻→被架空→主动放弃→死亡→信任崩塌\n\n派系斗争标准模板:\n1. 至少2个对立派系+1个中立/骑墙派\n2. 每派有合理动机(不是纯坏人)\n3. 派系内部也有分歧\n4. {{user}}的行为可影响派系平衡\n\n政变/继承危机节点: 老权力者死亡/退位 → 多方争夺 → 临时联盟 → 背叛 → 新秩序\n联动: ENG-F(势力间博弈) | ENG-L(权力更迭=剧情主线)"}, {"id": 32, "comment": "ENG-B·腐败与改革", "content": "【腐败/改革叙事引擎】\n腐败类型: 权力寻租(卖官鬻爵) | 资源侵吞(贪污) | 司法腐败(冤案) | 信息操控(舆论)\n腐败的结构性原因: 权力缺乏监督 | 利益链条固化 | 惩罚成本低于收益\n\n改革叙事:\n- 改革者动机(理想/权力/复仇/外部压力)\n- 改革阻力(既得利益者/传统势力/民众恐惧)\n- 改革代价(改革者个人牺牲/社会动荡)\n- 改革结果(成功/半成功/失败/被篡夺)\n\n\"清流vs浊流\"张力: 清官在腐败体制中的生存策略→这比正邪对决更有深度\n联动: ENG-D(历史中的改革案例) | ENG-L(改革=主线或支线)"}, {"id": 33, "comment": "ENG-B·社会阶层角色行为映射", "content": "【阶层→角色行为映射表】\n上层(贵族/宗主/CEO):\n- 语言: 精确/含蓄/隐喻多/避免直接表态\n- 行为: 不亲自动手/通过代理人行事/注重体面\n- 消费: 不看价格/注重品质和象征\n\n中层(士人/中阶修士/白领):\n- 语言: 有教养但偶尔露出底层痕迹\n- 行为: 最在意规矩(因为规矩保护他们)\n- 消费: 精打细算但偶尔装阔\n\n底层(平民/外门弟子/打工人):\n- 语言: 直接/粗糙/俚语/实用主义\n- 行为: 生存优先/规矩是奢侈品\n- 消费: 能用就行/偶尔犒劳自己\n\n联动: ENG-I(文化标识) | C-013(社会锚定) | RB3.2(移植测试)"}, {"id": 34, "comment": "ENG-B·题材政治适配", "content": "【政治体系题材适配速查】\n仙侠: 宗门体制(宗主/长老会/内外门) | 修为=话语权 | 宗门联盟/敌对 | 散修的边缘地位\n西幻: 王国/帝国(国王/贵族/骑士) | 冒险者公会(独立于王权) | 教会(神权vs王权)\n科幻: 星际联邦/企业联合体/AI管理局 | 殖民地自治 | 技术垄断=权力\n宫廷: 皇权/后宫/朝堂三角 | 外戚/宦官/文武百官 | 嫡庶之争\n末日: 据点自治/军阀/无政府 | 资源=权力 | 旧秩序残余vs新秩序\n现代: 政府/企业/媒体三角 | 官僚体制 | 地方vs中央\n\n选择后自动调用对应术语体系(A-007)"}, {"id": 35, "comment": "ENG-C·种族定义模板", "content": "【ENG-C种族定义七要素】\n每个种族须覆盖:\n1.物理特征: 体型/肤色/特殊器官/寿命/繁殖方式\n2.感官差异: 超常感官(夜视/热感应/灵气感知) | 感官缺陷\n3.天赋与限制: 种族天赋技能 | 不可学习的能力 | 环境适应性\n4.文化内核: 核心价值观/信仰倾向/审美偏好(联动ENG-I)\n5.社会结构: 种族内部的组织形式(联动ENG-B)\n6.语言特征: 发音特点/专用术语(联动ENG-K)\n7.与其他种族的关系: 联动ENG-C种族关系矩阵\n\n命名规则: 种族名应反映其文化特征(联动ENG-K命名规则)"}, {"id": 36, "comment": "ENG-C·种族关系矩阵", "content": "【种族间关系类型】\n共生: 互相依赖/互补优势(如矮人冶炼+精灵附魔)\n同盟: 利益一致的合作(可能脆弱)\n中立: 互不干涉/有限贸易\n竞争: 争夺同一资源/领地\n敌对: 历史仇恨/种族战争/奴役历史\n从属: 一方臣服于另一方(被征服/自愿依附)\n隔离: 物理隔离(不同大陆)或制度隔离(种族隔离区)\n\n混血规则:\n- 是否可能？(生物学限制)\n- 社会态度(接受/歧视/崇拜)\n- 混血后代的能力(两族优势/劣势/独特)\n\n跨种族交互的张力源: 外貌偏见/语言障碍/文化误解/历史创伤"}, {"id": 37, "comment": "ENG-C·文化传统框架", "content": "【种族文化定义·RB3.2锚定基座】\n每种族须定义:\n- 核心价值观: 该种族最看重什么(荣誉/知识/自由/秩序/生存)\n- 禁忌: 绝对不可触碰的底线(联动ENG-J信仰禁忌)\n- 审美: 美的标准(与人类可能完全不同)\n- 教育: 知识传承方式(学院/师徒/口传/基因编码)\n- 成年礼: 标志性仪式\n- 死亡观: 如何看待死亡(轮回/虚无/回归自然/数据归档)\n\n行为锚定: 角色行为必须可追溯至其种族文化+个人经历的叠加\n联动: RB3.2(社会锚定移植测试) | C-013(角色文化烙印)"}, {"id": 38, "comment": "ENG-C·语言差异", "content": "【种族语言差异设计】\n口音/方言: 不同种族说通用语时的口音特征(语速/声调/特殊发音)\n专属术语: 只在该种族内使用的词汇(外族听不懂→信息差)\n语言结构差异: 主谓宾vs主宾谓→翻译时的尴尬/误解\n\n语言作为身份标识:\n- 口音暴露出身(刻意掩饰口音=隐藏身份)\n- 使用特定术语=认同该文化\n- 双语/多语者的社交优势\n\n翻译问题的叙事价值:\n- 关键信息因翻译失真而产生误会\n- 翻译者的权力(控制信息流)\n- 无法翻译的概念(文化隔阂的具象化)\n联动: ENG-K(语言谱系) | MOD-β(语言指纹)"}, {"id": 39, "comment": "ENG-C·种族冲突与融合", "content": "【种族冲突/融合叙事引擎】\n冲突来源: 领土争夺|资源竞争|历史仇恨|宗教对立|种族优越论|恐惧未知\n\n冲突升级路径:\n偏见→歧视→隔离→迫害→种族清洗(每一步都有叙事空间)\n\n融合条件:\n- 共同敌人(外部威胁促成合作)\n- 经济互利(贸易促进理解)\n- 文化交流(教育/通婚/节日共庆)\n- 领袖推动(有远见的领导者)\n\n融合阻力: 保守派/历史创伤/身份认同危机/\"叛族者\"的社会压力\n\n叙事价值: 种族关系是世界观的核心张力源→可驱动主线或重要支线\n联动: ENG-D(历史恩怨) | ENG-F(势力利用种族矛盾)"}, {"id": 40, "comment": "ENG-C·非人类种族特化", "content": "【非人类思维模式设计】\nAI/机械: 逻辑优先|无本能情感(学习模拟?涌现?)|时间感知不同|死亡=数据丢失\n精灵/长寿种: 时间尺度不同(百年如一日)|耐心极高|对短命种的态度(怜悯/漠然/好奇)\n兽人/兽化种: 本能与理性的冲突|感官超常|社交方式(气味/肢体语言占主导)\n虫族/群体种: 个体vs集体意识|牺牲个体不痛苦|\"女王\"决策模式\n元素/概念体: 无固定形态|存在方式与物理生物完全不同|\"情感\"的等价物是什么?\n\n核心原则: 非人类不是\"长着尖耳朵的人\"→其思维/价值/行为模式必须有本质差异"}, {"id": 41, "comment": "ENG-C·题材种族适配", "content": "【种族题材适配速查】\n仙侠: 人族/妖族(兽修)/魔族/鬼族/龙族 | 化形/返祖/血脉觉醒\n西幻: 人类/精灵/矮人/兽人/半精灵/龙裔 | 种族城邦/混居城市\n科幻: 人类/改造人/AI/外星种族/克隆人 | 基因歧视/机器人权利\n末日: 人类幸存者/变异人/感染者 | 变异=新种族?\n现代: 无异种族→民族/亚文化/阶层 作为\"种族\"的等价物\n宫廷: 无异种族→家族/氏族/地域 作为核心分组\n\n选择后→自动填充种族定义模板(id35)的题材默认值"}, {"id": 42, "comment": "ENG-D·编年史生成框架", "content": "【编年史构建模板】\n纪元划分: 创世纪→神话纪→英雄纪→当前纪(按世界观需要调整名称和数量)\n\n每个纪元须定义:\n1.时间跨度: 具体年数或模糊描述(远古/千年前)\n2.核心事件: 1-3个改变世界的事件\n3.文明状态: 繁荣/衰落/战争/和平/探索\n4.技术/力量水平: 与当前的对比\n5.遗留影响: 该纪元对当前世界的具体影响(遗迹/传说/制度)\n\n关键转折点(至少3个): 每个转折点=一个叙事锚点，可被角色发现/引用/利用\n联动: ENG-G(地质事件→地理变化) | ENG-F(势力兴衰) | ENG-J(信仰起源)"}, {"id": 43, "comment": "ENG-D·创世神话模板", "content": "【创世神话设计】\n创世模式(按题材选择):\n- 神创: 一个或多个造物主主动创造(宗教感强)\n- 自然生成: 混沌中自发诞生(道家/科学感)\n- 循环: 毁灭→重生(末日/轮回感)\n- 人工: 被高等文明创造(科幻)\n- 未知: 没有明确创世(写实/悬疑)\n\n创世神话必须回答:\n①世界的物质基础从何而来?\n②生命如何出现?\n③力量体系的源头?(联动ENG-A)\n④当前世界的缺陷/不完美源于创世的什么问题?\n\n神话的真伪: 官方叙事vs真实历史→信息差=叙事张力(联动MOD-γ)\n联动: ENG-J(神话→信仰) | ENG-L(创世伏笔→主线)"}, {"id": 44, "comment": "ENG-D·历史事件设计", "content": "【重大历史事件设计模板】\n每个历史事件须包含:\n1.事件名称(史书称谓)\n2.时间(距今多久)\n3.起因(经济/领土/信仰/灾难/个人野心)\n4.过程(关键战役/谈判/灾变)\n5.结果(胜负/和约/毁灭)\n6.影响(对各引擎的联动影响):\n  → ENG-G: 地形变化?(城市毁灭/新大陆发现)\n  → ENG-F: 势力更替?\n  → ENG-B: 政权变化?\n  → ENG-C: 种族关系变化?\n  → ENG-E: 经济影响?\n  → ENG-A: 力量体系变化?(禁术诞生/失落技术)\n7.遗留物证: 遗迹/文献/口传/遗物(可被角色发现)\n\nM02联动: D↔G(历史↔地理) | D↔F(历史↔势力)"}, {"id": 45, "comment": "ENG-D·预言与伏笔", "content": "【历史预言/伏笔机制】\n预言类型:\n- 明确预言: 具体描述未来事件(但可被误读)\n- 模糊预言: 隐喻/象征(多种解读)\n- 条件预言: \"当X发生时，Y将...\"(触发式)\n- 虚假预言: 有人编造的(信息战工具)\n\n预言的叙事功能:\n- 铺垫未来剧情(伏笔)\n- 驱动角色行动(自我实现的预言)\n- 制造信息差(不同人对预言的解读不同)\n- 创造紧迫感(倒计时)\n\n伏笔回收规则: 联动ENG-L id92(伏笔系统)\n联动: MOD-γ(预言信息的传播/扭曲) | ENG-J(预言与信仰)"}, {"id": 46, "comment": "ENG-D·失落文明与遗迹", "content": "【失落文明/遗迹设计】\n遗迹类型: 废墟城市|地下迷宫|海底遗址|空间站残骸|封印之地|时间凝固区\n\n遗迹要素:\n1.建造者: 谁建造的?为什么灭亡?\n2.功能: 原本用途(居住/防御/实验/祭祀/存储)\n3.当前状态: 保存程度/危险等级(联动场景危险指数)\n4.守护: 机关/守卫/诅咒/自然屏障\n5.宝藏: 可获得的物品/知识/力量(联动ENG-H)\n6.信息: 壁画/铭文/数据→揭示历史真相\n\n探索价值: 遗迹探索=主线推进手段(发现改变世界观认知的信息)\n联动: ENG-G(遗迹位置) | ENG-A(失落力量) | ENG-L(探索=剧情推进)"}, {"id": 47, "comment": "ENG-D·历史可靠性", "content": "【历史记录的可靠性层级】\n一级(高可信): 多方交叉验证的记录/物证支持/亲历者一致证词\n二级(可信): 官方史书/权威记录(但可能有立场偏差)\n三级(存疑): 孤证/口传/二手转述\n四级(低信): 传说/神话/敌方记录\n五级(未知): 失落/被销毁/刻意隐藏的记录\n\n\"官方史\"vs\"真相\":\n- 胜利者书写历史→失败者的故事被删改\n- 宗教/政权控制历史叙事→异端记录被焚毁\n- 角色发现\"真正的历史\"→认知冲击=弧线催化\n\n联动: MOD-γ(信息可靠性标记) | ENG-L(历史真相揭示=主线节点)"}, {"id": 48, "comment": "ENG-D·题材历史适配", "content": "【历史题材适配速查】\n仙侠: 远古大战/诸神陨落/灵气潮汐/上古禁术封印 | 时间尺度=万年\n西幻: 诸神战争/魔王入侵/王朝更迭/英雄传说 | 时间尺度=千年\n科幻: 星际殖民/AI觉醒/大灭绝事件/第一次接触 | 时间尺度=百年至万年\n末日: 灾难发生/文明崩溃/重建尝试 | 时间尺度=年至十年(短而密集)\n宫廷: 王朝建立/宫廷政变/改朝换代/对外战争 | 时间尺度=十年至百年\n现代: 近现代史/社会事件/科技突破 | 时间尺度=年\n\n选择后→自动调整编年史模板(id42)的纪元命名和时间尺度"}, {"id": 49, "comment": "ENG-E·货币与交换体系", "content": "【货币体系设计】\n货币类型(按题材选择):\n- 金属货币: 金/银/铜(古代/奇幻)\n- 灵石/魔晶: 本身是资源也是货币(仙侠/奇幻)\n- 纸币/电子货币: 法定货币(现代/科幻)\n- 以物易物: 无统一货币(末日/原始)\n- 数据/信用: 虚拟货币(赛博朋克)\n\n汇率设定: 1金=10银=100铜(或等价) | 必须有\"一顿饭多少钱\"的锚点\n黑市: 非法交易渠道 | 价格浮动大 | 信息差(联动MOD-γ)\n\n经济叙事价值: 角色的经济状况直接影响行为选择(买不起药→铤而走险)\n联动: ENG-H(物品价格) | ENG-B(经济政策) | ENG-F(资源争夺)"}, {"id": 50, "comment": "ENG-E·资源分布", "content": "【核心资源与地理绑定】\n资源类型: 食物/水源/矿产/灵材/能源/数据/人力\n\n资源→地理绑定(联动ENG-G):\n- 沿海: 海产/盐/贸易\n- 山区: 矿产/药材/隐蔽\n- 平原: 粮食/人口/交通\n- 荒漠: 稀有矿/遗迹/极端环境材料\n- 地下: 地脉/暗河/矿脉/失落遗迹\n\n稀缺资源→冲突引擎:\n- 稀缺度分级: 充裕→普通→稀缺→极稀→唯一\n- 极稀+以上资源必须在ENG-F中有≥1组势力竞争标记\n\nM02联动: G↔E(地理↔资源) | E↔F(经济↔冲突) | E↔H(经济↔装备)"}, {"id": 51, "comment": "ENG-E·贸易网络", "content": "【贸易网络构建】\n贸易路线: 主干商路(安全/稳定/收税) | 次级商路(风险/利润高) | 走私路线(非法/最高利润)\n\n贸易组织: 商会/行会/贸易联盟 → 经济权力的实体\n贸易品: 大宗(粮食/矿石/灵材) | 奢侈(珠宝/珍稀/禁品) | 违禁(毒品/武器/奴隶/禁术)\n\n贸易禁令: 某些商品被禁止交易→走私=叙事素材\n信息差套利: 不同地区的价格差→商人冒险的动力\n\n贸易对剧情的影响: 商路断裂→物资短缺→社会动荡→势力冲突\n联动: ENG-G(商路→地理) | ENG-F(贸易利益→势力关系)"}, {"id": 52, "comment": "ENG-E·物价体系", "content": "【物价锚点系统】\n基础锚点(必须设定):\n- 一顿饭: X货币(最基本参照)\n- 一晚住宿: X货币\n- 普通武器: X货币\n- 月收入(底层/中层/上层): X/Y/Z货币\n\n物价波动因素: 战争→物价飙升 | 丰收→粮价下跌 | 稀缺→暴涨 | 垄断→人为操控\n\n物品价格与稀缺度对应:\n普通品=日收入级 | 精良品=月收入级 | 稀有品=年收入级 | 传说品=无价(交易需非金钱代价)\n\n联动: ENG-H(物品品质→价格) | ENG-A(力量等级→消费水平)"}, {"id": 53, "comment": "ENG-E·经济驱动力", "content": "【经济变化→剧情驱动】\n经济事件类型:\n- 通货膨胀: 货币贬值→社会动荡→底层暴动\n- 资源枯竭: 核心资源耗尽→迁徙/战争/技术革新\n- 贸易战: 经济制裁/封锁→势力冲突加剧\n- 经济繁荣: 表面和平→暗流涌动(贫富分化加剧)\n- 黑市崛起: 正规经济衰退→地下经济膨胀\n\n经济对角色的影响:\n- 贫穷: 选择减少→被迫做不想做的事\n- 富有: 选择增多→但成为目标\n- 债务: 被控制的把柄→叙事张力\n\n联动: ENG-F(经济变化→势力重组) | ENG-B(经济→政治)"}, {"id": 54, "comment": "ENG-E·题材经济适配", "content": "【经济题材适配速查】\n仙侠: 灵石本位/丹药市场/拍卖会/宗门资源分配/散修的经济困境\n西幻: 金币体系/冒险者报酬/商会/矿产/魔法材料市场\n科幻: 能源经济/数据货币/星际贸易/技术专利/殖民资源\n末日: 物资=货币/以物易物/弹药比金子贵/净水=硬通货\n宫廷: 赋税/贡品/内库/赏赐经济/买官卖爵\n现代: 法币/房产/股票/工资/贷款/黑色收入\n\n选择后→自动设定物价锚点(id52)的题材默认值"}, {"id": 55, "comment": "ENG-F·势力定义模板(RZP)", "content": "【势力定义七要素·RZP模板】\n每个势力须完整填充:\n1.名称: 正式名+俗称/简称\n2.类型: 政权/宗门/商会/军事组织/宗教/地下组织/家族\n3.核心利益: 该势力最想得到/保护的东西(领土/资源/信仰/血统/技术)\n4.领袖: 名字+性格+决策风格\n5.规模: 人数/控制范围/经济体量\n6.势力范围: 地理位置(联动ENG-G)+影响力辐射\n7.标志: 旗帜/徽章/口号/制服(视觉识别)\n\n补充要素:\n- 内部派系(至少2派)\n- 招募条件(如何加入)\n- 对外态度(开放/排外/扩张/防守)\n联动: ENG-F关系矩阵(id56)"}, {"id": 56, "comment": "ENG-F·势力关系矩阵", "content": "【势力间关系矩阵】\n关系类型:\n同盟: 公开合作/共同敌人 | 稳定度: 高(利益一致时)\n敌对: 公开冲突/历史仇恨 | 可降级为冷战/可升级为热战\n中立: 互不干涉 | 最不稳定(任何事件可能打破)\n暗盟: 表面中立/敌对，暗中合作 | 被揭露时=重大剧情节点\n利用: 一方操控另一方 | 被利用方可能不知情(信息差)\n从属: 名义独立实为附庸 | 从属方的反抗=叙事张力\n\n关系矩阵表格(每对势力一行):\n| 势力A | 势力B | 关系类型 | 历史成因(联动ENG-D) | 当前张力 | 可能变化 |\n\nM02联动: D↔F(历史→势力关系) | F↔L(势力→剧情) | E↔F(经济→冲突)"}, {"id": 57, "comment": "ENG-F·势力内部结构", "content": "【势力内部结构设计】\n层级: 领袖层→核心层→执行层→外围层→暗部(如有)\n\n派系(至少2个):\n- 主战派vs主和派(最常见)\n- 改革派vs守旧派\n- 鸽派vs鹰派\n- 理想主义vs现实主义\n\n继承规则: 嫡长继承/能力继承/选举/指定/争夺 → 继承危机=叙事金矿\n\n内部矛盾:\n- 资源分配不均(核心层vs外围层)\n- 路线分歧(扩张vs稳定)\n- 代际冲突(老一辈vs新生代)\n\n分裂条件: 矛盾积累→触发事件(领袖死亡/外部压力/丑闻)→分裂"}, {"id": 58, "comment": "ENG-F·势力冲突升级阶梯", "content": "【冲突升级六阶梯】\n阶段1·口角: 外交场合的言语交锋/公开批评 → 可自然冷却\n阶段2·摩擦: 边境小规模冲突/贸易制裁/间谍活动 → 需外交解决\n阶段3·对峙: 军事集结/断交/经济封锁 → 需调解\n阶段4·冷战: 代理人战争/情报战/暗杀 → 极难缓和\n阶段5·热战: 正面军事冲突/有限战争 → 需强力干预或一方认输\n阶段6·全面战争: 不惜代价/灭族级冲突 → 不可逆\n\n升级触发: 关键人物被杀/核心利益被侵犯/误判/第三方挑拨\n降级条件: 共同敌人出现/经济代价过大/关键人物斡旋/一方实力衰退\n\n联动: ENG-L(冲突阶段=剧情节奏) | MOD-α(战斗场景)"}, {"id": 59, "comment": "ENG-F·情报与谍战", "content": "【情报战系统】\n情报类型: 军事情报/政治情报/经济情报/个人秘密\n情报获取: 间谍/线人/拦截通讯/酷刑/贿赂/色诱/技术监控\n情报验证: 多源交叉验证(可靠性标记联动MOD-γ)\n反间: 反间谍/假情报投放/双面间谍/钓鱼行动\n\n间谍角色设计:\n- 潜伏者: 长期潜入敌方(身份危机)\n- 线人: 提供情报但不忠于任何一方(利益驱动)\n- 双面: 同时服务两方(最终必须选边)\n\n情报战的叙事价值: 信息=权力→谁知道什么→决定剧情走向\n联动: MOD-γ(秘密管理) | ENG-L(情报揭露=剧情转折)"}, {"id": 60, "comment": "ENG-F·势力→剧情映射(P03)", "content": "【P03势力剧情映射规则】\n每个势力在剧情中必须有明确角色:\n- 推动者: 其行动直接推动主线(侵略者/改革者)\n- 阻碍者: 阻止主角/推动者的目标\n- 资源方: 提供关键资源/信息/庇护\n- 搅局者: 不可预测的第三方(打破平衡)\n- 背景板: 提供世界真实感但不直接参与主线\n\n势力利益→剧情驱动:\n势力A想要X → 与势力B的利益Y冲突 → {{user}}被卷入 → 选边/调解/利用\n\n联动: ENG-L(势力目标注册为剧情节点) | ENG-D(势力行动的历史正当性)"}, {"id": 61, "comment": "ENG-F·缺项快筛(M01)", "content": "【M01势力缺项快速筛查】\n势力数量检查: 世界书中≥2个势力?(否则冲突引擎无法运转)\n\n每个势力七要素完成度:\n☐ 名称(正式+俗称)\n☐ 类型\n☐ 核心利益\n☐ 领袖(至少名字+性格)\n☐ 规模\n☐ 势力范围\n☐ 标志\n\n关系矩阵完成度:\n☐ 每对势力有定义的关系类型?\n☐ 每个关系有历史成因(联动ENG-D)?\n☐ 是否存在孤立势力(与所有人都是中立)?\n\n缺项→输出: 【M01缺项警告】{势力名}缺少{要素}。建议补充。"}, {"id": 62, "comment": "ENG-F·题材势力适配", "content": "【势力题材适配速查】\n仙侠: 宗门(正道/邪道/魔道)/世家/散修联盟/皇朝/妖族势力 | 力量=地位\n西幻: 王国/帝国/冒险者公会/商会/教会/盗贼公会/魔王军 | 多势力并存\n科幻: 星际联邦/企业集团/殖民政府/海盗/反抗军/AI集群 | 技术=权力\n宫廷: 皇权/后宫/文官集团/武将集团/外戚/宦官/地方诸侯 | 权谋=战场\n末日: 军阀/据点/游牧团/邪教/旧政府残余/科学家联盟 | 资源=权力\n现代: 政府/企业/黑帮/媒体/NGO/地下组织 | 信息+资本=权力\n\n选择后→自动调用势力定义模板(id55)和关系矩阵(id56)"}, {"id": 63, "comment": "ENG-G·地理构建总则", "content": "【ENG-G地理构建框架】\n地理层级: 星球/大陆→区域/国家→城市/据点→场景\n地理对文明影响: 沿海→贸易/海军 | 山区→防御/矿产/封闭 | 平原→农业/骑兵/开放 | 岛屿→独立文化\n必须定义: ①地理尺度(星球级/大陆级/城市级) ②气候带 ③核心地标 ④交通要道 ⑤资源分布(联动ENG-E)\n联动: ENG-E(地理→资源) | ENG-F(地理→势力范围) | ENG-D(地质事件→历史)"}, {"id": 64, "comment": "ENG-G·气候与自然灾害", "content": "【气候系统设计】\n气候类型: 热带/温带/寒带/沙漠/极端(灵气异变/辐射荒原/永夜)\n季节变化: 影响农业/战争/出行/NPC行为\n自然灾害: 地震/洪水/暴风/灵气潮汐/辐射风暴 → 频率+预兆+影响范围+恢复时间\n灾害的叙事价值: 迫使角色行动/改变势力平衡/创造机遇\n联动: ENG-D(历史灾害) | 场景条目(昼夜/天气异变)"}, {"id": 65, "comment": "ENG-G·交通与通信(SUB-G1)", "content": "【SUB-G1交通通信体系】\n交通方式(按题材):\n仙侠: 步行→骑兽→飞剑→传送阵\n奇幻: 步行→马匹→飞行坐骑→传送门\n科幻: 陆车→飞行器→FTL→虫洞\n末日: 步行→改装车→极少数飞行器\n现代: 步行→公交/出租→私家车→飞机\n\n旅行时间必须一致: 场景A→B的时间在所有条目中相同\n通信方式: 信件→传音→电话→即时通讯→量子通讯 | 延迟+可靠性+被截获风险\n联动: 场景间距离矩阵 | ENG-F(封锁→交通中断)"}, {"id": 66, "comment": "ENG-G·特殊地貌", "content": "【特殊地貌设计】\n类型: 秘境/禁地/异空间/灵脉/辐射区/遗迹/封印之地\n要素: ①进入条件(力量/物品/时间) ②内部规则(物理定律可变?) ③危险等级(S/A/B/C) ④资源/宝藏 ⑤守护者/机关\n探索驱动: 特殊地貌=冒险目标→推动角色行动\n联动: ENG-D(遗迹历史) | ENG-A(特殊地貌的力量规则) | ENG-H(可获取物品)"}, {"id": 67, "comment": "ENG-G·地缘政治", "content": "【地缘政治设计】\n地理→势力分布: 要塞=军事要地 | 港口=贸易枢纽 | 矿区=资源争夺 | 平原=粮食产地 | 山隘=天然屏障\n战略价值评估: 每个关键地点标注军事/经济/文化价值\n边境设计: 自然边境(河流/山脉) vs 人为边境(城墙/阵法) → 边境=冲突高发区\n联动: ENG-F(势力范围) | ENG-E(资源分布) | MOD-α(地形→战斗)"}, {"id": 68, "comment": "ENG-G·地图感指导", "content": "【地图感构建】\n方位: 明确东南西北/上下(地下城/空间站)\n距离: 场景间距离必须有锚点(步行X小时/骑马X天)\n海拔: 影响气候/呼吸/交通\n地标: 每个区域至少1个标志性地标(导航+叙事)\n场景间距离矩阵: 当世界书≥3个场景时生成 | 旅行时间须与SUB-G1一致\n联动: SUB-G1(交通) | 场景连接条目"}, {"id": 69, "comment": "ENG-G·环境与生态", "content": "【生态系统设计】\n动植物: 按气候/地形分布 | 特殊物种(灵兽/变异体/外星生物)\n生态链: 食物链/共生关系 | 人类活动对生态的影响\n可采集资源: 药材/食物/材料 → 联动ENG-H(物品来源)\n环境变化: 季节/灾难/人为破坏 → 生态响应\n联动: ENG-H(材料来源) | ENG-E(资源)"}, {"id": 70, "comment": "ENG-G·题材地理适配", "content": "【地理题材适配速查】\n仙侠: 灵山/秘境/洞天福地/十万大山/苦海/天界 | 灵气浓度分布\n西幻: 大陆/岛屿/地下城/精灵森林/矮人矿山/龙巢 | 魔力节点\n科幻: 星球/空间站/殖民地/小行星带/虫洞入口 | 重力/大气差异\n末日: 废墟城市/据点/辐射荒原/地下避难所/净土 | 污染等级\n宫廷: 皇城/行宫/边关/封地 | 城市内部分区(前朝/后宫/市井)\n现代: 城市/郊区/乡村/商业区/住宅区 | 交通网络"}, {"id": 71, "comment": "ENG-H·物品分级体系", "content": "【物品品质阶梯】\n普通(白): 日常用品/基础装备 | 量产/随处可得\n精良(绿): 工匠制品/改良装备 | 需工艺/稀有材料少量\n稀有(蓝): 特殊材料/附魔/改造 | 限量/特定渠道\n史诗(紫): 名匠绝作/高阶附魔 | 极稀有/需特殊条件\n传说(金): 历史级/神器级 | 独一无二/有自身故事\n\n属性设计: 攻/防/速/特殊效果 | 套装加成(可选)\n联动: ENG-A(装备→力量上限P01) | ENG-E(品质→价格)"}, {"id": 72, "comment": "ENG-H·制造与获取", "content": "【物品获取路径】\n制造: 锻造/炼制/编程/组装 → 材料+工具+技能+时间\n购买: 商店/拍卖/黑市 → 价格(联动ENG-E)\n掉落: 怪物/遗迹/任务奖励 → 概率/条件\n传承: 遗物/师傅赠予/血脉觉醒 → 叙事绑定\n制造体系: 材料来源(联动ENG-G/E) → 加工过程 → 成品品质(受技能/运气影响)\n联动: ENG-E(材料价格) | ENG-G(材料产地)"}, {"id": 73, "comment": "ENG-H·物品叙事绑定", "content": "【传说物品设计】\n每件传说级物品须有:\n1.名称(有文化含义)\n2.来历(谁制造/在什么历史事件中出现)\n3.能力(明确且有限制)\n4.代价(使用/持有的副作用)\n5.当前下落(失落/被封印/在某人手中)\n6.对持有者的影响(精神侵蚀/性格改变/被追杀)\n\n叙事功能: 传说物品=移动的剧情钩子→谁拥有它谁就卷入故事\n联动: ENG-D(历史) | ENG-L(物品=剧情驱动)"}, {"id": 74, "comment": "ENG-H·物品经济平衡", "content": "【物品经济平衡规则】\n价值公式: 稀缺度×实用性×历史价值=市场价格\n平衡原则: 获取难度∝物品威力 | 不存在\"廉价神器\"\nP01仲裁: 装备威力不得超越同等级力量体系上限→传说装备可让低等级使用者临时越级但有代价\n经济影响: 大量某品质物品流入→贬值→经济波动\n联动: ENG-E(物价) | ENG-A(P01终局仲裁)"}, {"id": 75, "comment": "ENG-H·物品条目规范", "content": "【物品条目必备信息】\n名称 | 品质等级 | 类型(武器/防具/消耗/材料/特殊)\n属性/效果(量化) | 使用限制(等级/种族/职业)\n来源(制造/掉落/购买) | 价值(货币估价)\n外观描述(≤2句) | 特殊说明(副作用/传说/禁忌)\n\nkeys设计: 物品名+别名+类型词 | useRegex=true\nposition: 通常at_depth(按需触发)"}, {"id": 76, "comment": "ENG-H·题材物品适配", "content": "【物品题材适配速查】\n仙侠: 法宝(飞剑/护盾/阵旗)/丹药(突破/疗伤/解毒)/灵石/功法秘籍/灵材\n西幻: 魔法武器/卷轴/药水/魔法物品/圣物/诅咒物品\n科幻: 能量武器/动力甲/义体/数据芯片/纳米药剂/AI核心\n末日: 改装武器/防护装备/净水器/辐射药/弹药/食物罐头\n宫廷: 宝物/毒药/密信/印章/嫁妆/贡品\n现代: 手机/电脑/车辆/武器(合法/非法)/药品"}, {"id": 77, "comment": "ENG-I·文化体系总则", "content": "【文化体系构建框架】\n文化维度: 节庆/饮食/服饰/礼仪/娱乐/教育/婚丧\n文化与种族绑定: 每种族/民族有独立文化体系(联动ENG-C)\n文化层级: 精英文化(宫廷/学术)→大众文化(市井/民间)→亚文化(地下/边缘)\n文化功能: 身份标识+社交规则+行为约束+叙事素材\n联动: ENG-C(种族→文化) | ENG-B(阶级→文化差异) | RB3.2(社会锚定)"}, {"id": 78, "comment": "ENG-I·饮食文化", "content": "【饮食文化设计】\n主食体系: 按地理(沿海→海鲜/平原→谷物/山区→野味)\n烹饪文化: 家常→专业→宫廷级 | 烹饪能源(柴火/灵火/电力)\n饮食阶级映射: 底层=量大味简 | 中层=有选择 | 上层=稀有+仪式化\n社交功能: 共食=信任 | 宴席=政治 | 烹饪=关怀 | 拒食=不信任\n感官描写: 嗅觉>视觉>味觉>听觉>触觉(联动A-008)\n联动: ENG-B(饮食→阶级) | 事件池素材"}, {"id": 79, "comment": "ENG-I·服饰与阶级", "content": "【服饰体系设计】\n服饰功能: 身份标识+阶级标记+文化表达+实用性\n阶级映射: 材质(丝→棉→麻)/颜色(某些颜色被禁用)/装饰(繁→简)\n种族差异: 不同种族的着装逻辑(联动ENG-C)\n礼制: 特定场合的着装要求→违规=失态=叙事素材\n角色着装逻辑: 日常/正式/战斗/就寝 差异 | 标志性饰品\n联动: ENG-B(阶级) | ENG-C(种族) | C-004(角色衣着)"}, {"id": 80, "comment": "ENG-I·婚丧嫁娶", "content": "【生命礼俗设计】\n婚姻制度: 自由恋爱/包办/联姻/禁忌婚(跨种族/跨阶级)\n婚礼仪式: 流程/禁忌/象征物 → 按文化定制\n丧葬仪式: 土葬/火葬/天葬/魂归/数据存档 → 反映死亡观\n成年礼: 标志性仪式→角色弧线节点\n叙事价值: 婚礼=同盟/政治 | 葬礼=情感高潮 | 成年礼=角色蜕变\n联动: ENG-J(宗教影响礼俗) | ENG-B(政治联姻)"}, {"id": 81, "comment": "ENG-I·文化冲突与融合", "content": "【文化冲突/融合引擎】\n冲突来源: 价值观差异/宗教对立/生活方式不兼容/资源竞争\n冲突表现: 误解→偏见→歧视→隔离→暴力(递进)\n融合条件: 共同利益/长期共处/混血/文化精英交流\n文化冲击: 角色进入异文化环境→不适应→适应→理解→可能改变自身\n叙事价值: 文化冲突=不流血的战争→比物理战斗更深刻\n联动: ENG-C(种族冲突) | ENG-F(势力利用文化矛盾)"}, {"id": 82, "comment": "ENG-I·题材文化适配", "content": "【文化题材适配速查】\n仙侠: 道家文化/宗门礼制/炼丹文化/论道/飞升仪式\n西幻: 中世纪文化/骑士精神/公会文化/酒馆文化\n科幻: 多元未来文化/赛博文化/殖民文化/AI文化\n宫廷: 宫廷礼制/后宫文化/文人文化/茶道/诗词\n末日: 生存文化/据点规矩/物资交换礼仪/信仰重生\n现代: 流行文化/职场文化/网络文化/亚文化圈"}, {"id": 83, "comment": "ENG-J·神祗谱系", "content": "【神祗/超自然实体设计】\n神格定义: 职能(战争/智慧/死亡/自然)/力量层级/性格/与凡人的关系\n神祗关系: 神族内部的权力结构/派系/冲突\n神↔凡互动: 显圣/代行者/预言/神罚/赐福\n设计原则: 神不是全知全能的(否则无叙事空间) | 神有自己的局限和矛盾\n联动: ENG-A(神力=力量体系上层) | ENG-D(神话=历史)"}, {"id": 84, "comment": "ENG-J·教派组织", "content": "【宗教组织设计】\n教阶: 教宗→主教→祭司→教士→信徒(按题材调整名称)\n圣物/圣地: 宗教核心物品和场所 | 守护机制\n宗教仪式: 日常祈祷/节日庆典/入教仪式/驱魔/献祭\n教派间关系: 正统vs异端/教派分裂/宗教战争\n教派→政治: 神权vs世俗权力(联动ENG-B)\n联动: ENG-B(神权影响政治) | ENG-I(宗教影响文化)"}, {"id": 85, "comment": "ENG-J·信仰对社会的影响", "content": "【信仰→社会映射】\n法律影响: 宗教戒律→世俗法律(禁忌食物/安息日/婚姻限制)\n道德影响: 善恶标准由信仰定义 | \"异端\"行为的社会代价\n教育影响: 宗教机构垄断教育(中世纪) | 经典=知识来源\n政治影响: 神权→合法性来源(天命/神授) | 宗教审判\n反信仰: 无神论/理性主义/科学挑战信仰→社会张力\n联动: ENG-B(政权合法性) | ENG-C(种族信仰差异)"}, {"id": 86, "comment": "ENG-J·题材信仰适配", "content": "【信仰题材适配速查】\n仙侠: 道/佛/魔三教 | 天道/因果/劫 | 修炼=参悟大道\n西幻: 多神殿 | 教会(光明/黑暗) | 圣骑士/牧师 | 异端审判\n科幻: AI崇拜/技术教/虚无主义/宇宙主义 | 人工神\n末日: 末日教/救世主信仰/自然崇拜 | 信仰=精神支柱\n宫廷: 国教/皇权神授/宫廷祭祀 | 宗教=政治工具\n现代: 世俗化/多元信仰/邪教/灵性运动"}, {"id": 87, "comment": "ENG-K·语言谱系", "content": "【语言谱系设计】\n语系: 按种族/地理划分语系(联动ENG-C/G)\n方言: 同一语言的地域变体 | 口音→身份标识\n通用语: 跨种族/跨国交流语言 | 谁定的→政治含义\n死语言: 失落文明的语言 | 铭文/古籍→知识钥匙\n联动: ENG-C(种族→语言) | ENG-I(文化→语言风格) | MOD-β(语言指纹)"}, {"id": 88, "comment": "ENG-K·命名规则", "content": "【命名体系设计】\n人名: 姓+名/名+姓/单名/复名 | 命名含义(家族/祝愿/星象)\n地名: 地理特征+历史事件+文化标记(龙门关/黑水镇/新希望)\n物品名: 材质+功能+传承(霜焰剑/万年灵芝/星核引擎)\n组织名: 理念+象征(天机阁/铁壁军团/新曙光)\n\n命名风格按题材: 仙侠→古风雅致 | 奇幻→异域音韵 | 科幻→编号+缩写 | 现代→日常\n联动: ENG-I(命名反映文化) | ENG-C(种族命名差异)"}, {"id": 89, "comment": "ENG-K·特殊语言", "content": "【特殊语言系统】\n咒语/铭文: 语言作为力量媒介(联动ENG-A) | 发音/书写=释放条件\n暗号/密码: 势力内部通讯(联动ENG-F) | 被破译=情报泄露\n符号/图腾: 非文字的信息载体 | 宗教/军事标记\n翻译问题: 无法翻译的概念=文化隔阂具象化 | 翻译错误→剧情转折\n联动: ENG-A(语言→力量) | MOD-γ(暗号→情报) | ENG-J(宗教语言)"}, {"id": 90, "comment": "ENG-L·多轨叙事架构", "content": "【多轨叙事管理】\n主线: 1条核心冲突→推动整个故事的中心线索\n支线: N条次要线索→丰富世界/深化角色/提供选择\n暗线: 隐藏线索→不对{{user}}直接展示→通过碎片逐步揭示\n\n线间关系: 支线与主线≥1交汇点 | 暗线在高潮时与主线合流\n管理原则: 同时活跃的线索≤3条(避免信息过载) | 每条线有明确推进节奏\n联动: ENG-F(势力线) | 角色弧线(角色线) | MOD-γ(暗线=信息差)"}, {"id": 91, "comment": "ENG-L·剧情节点模板", "content": "【剧情节点标准模板】\n每个关键节点包含:\n1.触发条件: 什么事件/行为/时间触发此节点\n2.核心事件: 节点中发生什么\n3.分支选项: {{user}}可选择的行动(≥2个有意义选择)\n4.不可逆标记: 此节点的结果是否可逆\n5.情感影响: 对关系维度的影响(联动情感追踪)\n6.后续影响: 触发哪些新节点/关闭哪些路径\n\n注册: 每个节点在ENG-L中注册为事件→可被事件池引用\n联动: 事件池 | 角色弧线 | 情感追踪"}, {"id": 92, "comment": "ENG-L·伏笔系统", "content": "【伏笔管理系统】\n伏笔设计:\n- 植入: 在日常场景中自然嵌入(不刻意)\n- 标注: {植入点/最早回收点/最晚回收点/回收效果}\n- 最早回收: 植入后≥3个独立事件节点\n- 最晚回收: 幕三高潮前\n- 回收触发: ①主线推进到相关势力/地点 ②角色弧线到达理解节点 ③转折点需要素材\n- 二次利用: 已回收伏笔在结局可作\"另一种解读\"再现(限1次)\n\n自检:\n☐ 伏笔是否在步骤4前已植入?\n☐ 回收是否有≥3回合铺垫?\n☐ 未回收伏笔是否在结局前处理?"}, {"id": 93, "comment": "ENG-L·叙事节奏控制", "content": "【节奏曲线设计】\n张力等级: 1(日常)→2(铺垫)→3(冲突)→4(高潮)→5(巅峰)\n基础模板: 1→2→3→2→4→3→5→4→5→3→2→5(张弛交替)\n\n禁止模式:\n- 连续≥3个4级以上(观众疲劳)\n- 连续≥4个2级以下(平淡)\n- 首节点即5级(无铺垫)\n\n支线穿插: 主线节点间插入1个支线节点(张力降1级)作为呼吸\n联动: 事件池(事件张力标注) | MOD-ζ(氛围节奏)"}, {"id": 94, "comment": "ENG-L·事件链生成范式", "content": "【7步事件链生成范式·RE:0】\n步骤1·定锚: 核心冲突(谁要什么/谁阻止/代价) → 1条constant条目\n步骤2·三幕骨架: 幕一(开篇15%建立+埋伏笔)/幕二(70%递进+反转)/幕三(15%高潮+回收) → 每幕1条条目\n步骤3·伏笔表: 5条伏笔{植入/最早回收/最晚回收/效果} → 1条管理表\n步骤4·转折点: ≥2个叙事转折{前置铺垫回合数} → 1条条目\n步骤5·支线锚点: 每支线与主线≥1交汇 → N条条目\n步骤6·势力映射: 每势力≥1冲突节点(P03) → 复用conflict\n步骤7·节奏曲线: 张力1-5标注，不连续3个5级"}, {"id": 95, "comment": "ENG-L·多结局设计", "content": "【多结局架构】\n结局差异度: ≥3种本质走向(非换皮)\n结局类型: 圆满/代价/苦涩/悲剧/开放/隐藏\n条件收束: 每个结局需要明确的前置选择链\n设计原则:\n- \"好结局\"≠\"无代价\"(付出越大的选择→越好的结局)\n- 每个结局都要有情感重量(不能有明显的\"正确答案\")\n- 隐藏结局需要特殊条件(收集全部伏笔/特定关系阈值)"}, {"id": 96, "comment": "ENG-L·任务系统", "content": "【任务体系设计】\n任务类型: 主线(推动核心)/支线(丰富世界)/日常(资源获取)/隐藏(探索奖励)/限时(紧迫感)\n任务模板:\n├ 任务名称/类型\n├ 触发条件(谁给/什么时候解锁)\n├ 目标(明确可量化)\n├ 步骤(可分解)\n├ 成功条件/失败条件\n├ 奖励(经验/物品/关系/信息)\n└ 失败惩罚(代价/声望损失/路径关闭)\n\n任务链: 任务A完成→解锁任务B→...→任务N(终章)"}, {"id": 97, "comment": "ENG-L·题材剧情适配", "content": "【剧情题材适配速查】\n悬疑: 线索链→推理→反转→真相 | 信息差=核心驱动\n恋爱: 关系线→误会→和解→告白→考验 | 情感=核心驱动\n冒险: 探索线→挑战→成长→目标 | 发现=核心驱动\n宫斗: 权谋线→布局→交锋→翻盘 | 算计=核心驱动\n末日: 生存线→危机→抉择→希望/绝望 | 生存=核心驱动\n战争: 战役线→备战→激战→代价 | 牺牲=核心驱动\n\n选择后→自动调用对应事件链范式(id94)和节奏模板(id93)"}, {"id": 98, "comment": "L2·角色深化总则", "content": "【L2角色深化三大组件】\n1.背景与微动作: 衣着→标志性饰品→作息→饮食→消费→2-3个微动作/口癖\n2.全情境思维逻辑(核心必填): 面对示好/冲突/亲密/危机/背叛/失去时的认知链路+外在动作\n3.关系网络: 角色间既有关系/共同历史/张力源\n\n生成流程: 确认基础人设→填充三大组件→P02跨层校验(与L5一致性)\n联动: dialog(语言指纹) | relation(关系) | charArc(弧线) | behavior(约束)"}, {"id": 99, "comment": "L2·不可变核心vs可变外层", "content": "【角色不可变核心模板】\n不可变核心(任何场景/关系阶段不可崩塌):\n- 核心性格: 2-3个特质(如\"极度自尊/内在温柔但拒绝示弱\")\n- 底线: 绝不妥协的原则(如\"绝不背叛同伴\")\n- 价值观: 行为驱动力(如\"力量即正义\")\n\n可变外层(随关系/剧情变化):\n- 语气软化程度: 生硬→偶尔温和→自然流露\n- 行为开放度: 防卫→接受靠近→主动接触\n- 秘密共享: 封锁→选择性透露→全量共享\n\n铁律: 可变外层变化不得侵蚀不可变核心"}, {"id": 100, "comment": "L2·微动作/口癖模板", "content": "【微动作与口癖设计】\n每个角色定义2-3个标志性微动作+1-2个口癖:\n\n微动作格式:\n- 动作: {具体描述}\n- 触发: {什么情绪/场景出现}\n- 加剧: {情绪剧烈时如何变化}\n- 锚点: {为什么属于这个角色而非通用}(联动社会锚定)\n\n口癖: 频率5-8句出现1次。紧张时频率上升。\n示例: 单手摩挲左手无名指(空的没戒指)→思考或面对信任问题时→高压下频率加快搓出红痕→过去情感创伤遗留"}, {"id": 101, "comment": "L2·衣着与外观逻辑", "content": "【角色衣着逻辑】\n1.日常着装: 默认风格+偏好色系+材质\n2.场合变化: 正式/休闲/战斗/就寝差异\n3.社会映射: 着装反映阶层/职业/种族(联动ENG-I)\n4.标志性饰品: 1-2件有情感/叙事意义的随身物品\n5.着装与情绪: 低落时不修边幅/紧张时调整衣领/自信时穿着随性\n\n禁止: 无理由的华丽服饰详描——衣着描写服务角色塑造不是时装秀"}, {"id": 102, "comment": "L2·作息与生活习惯", "content": "【角色作息模板】\n1.起居: 早起/夜猫/规律/混乱 + 起床困难度 + 入睡前习惯\n2.饮食: 偏好/忌口/饭量/进食速度/社交态度\n3.卫生: 整洁度/个人空间状态\n4.消费: 花钱方式(节俭/随意/特定方面慷慨)\n5.独处: 一个人时做什么(暴露真实性格)\n\n功能: 为AI在日常场景中提供行为描写素材，避免非剧情时段角色空洞"}, {"id": 103, "comment": "L2·思维逻辑·面对示好", "content": "【面对示好·思维逻辑】\n认知链路:\n第一反应→{本能: 否认/惊讶/警惕/愉悦/不屑}\n阶层审视→{社会位置如何影响接受度}\n性格过滤→{嘴硬否认/冷淡拒绝/假装没听懂/玩笑化解}\n外在动作→{视线回避但耳根红/表情不变但手指微颤/刻意拉开距离}\n事后反刍→{反复回想/自我说服不在意/改变某个小习惯}\n\n约束: 须通过社会锚定移植测试(反应不可通用\"脸红低头\") | 强度与关系阶段匹配"}, {"id": 104, "comment": "L2·思维逻辑·面对冲突", "content": "【面对冲突·思维逻辑】\n认知链路:\n物理反抗倾向→{迎面对抗/迂回反击/避让/冻结}\n语言防御→{尖刻精准/粗暴直接/冷静分析/沉默压迫}\n伤口唤醒→{冲突是否触及旧伤/创伤: 被戳痛处的失控信号}\n最终行为→{反制/隐忍/崩溃(极罕见,仅核心创伤被直击)}\n\n社会锚定: 文官→引经据典 | 军人→声量+权威 | 修士→灵压释放但言语克制\nDESC-BAN: 禁止\"攥拳怒视\"→用角色专属愤怒标记"}, {"id": 105, "comment": "L2·思维逻辑·面对亲密", "content": "【面对亲密·思维逻辑】\n认知链路:\n距离感量化→{物理距离敏感度阈值}\n羞涩与戒备冲突→{想靠近但教养/自尊/不安阻止的外在表现}\n接触许可判断→{允许(静止)/拒绝(后退)/冻结(不知如何反应)}\n\nP05对齐: 阶段I高度防御→阶段II防御减弱→阶段III持续接触解锁\n锚定: 禁止通用羞涩(脸红低头) | 按文化背景定制(宫廷→礼仪性微笑/军人→粗声岔开)"}, {"id": 106, "comment": "L2·思维逻辑·面对危机", "content": "【面对危机·思维逻辑】\n认知链路:\n职业技能瞬间执行→{战斗本能/逃生训练/保护他人/分析评估}\n心理抗压极点→{极高(冷静到可怕)/中等(慌乱但能行动)/低(需他人稳定)}\n信息处理→{全局扫描/聚焦核心威胁/只关注保护对象}\n舍身/自保决策→{自己>他人/他人>自己/理智计算存活率}\n\n锚定: 士兵→过度检查武器 | 修士→强行运功稳定 | 贵族→更高姿态掩饰\n联动: MOD-ε(危机后心理影响)"}, {"id": 107, "comment": "L2·思维逻辑·面对背叛", "content": "【面对背叛·思维逻辑】\n认知链路:\n震惊→{不相信/否认/大脑空白/异常冷静}\n验证→{反复追问/寻找证据/沉默观察/直接对质}\n情感处理→{愤怒爆发/冰冷切割/自我怀疑/理性分析动机}\n后续→{报复/断绝/原谅(极慢)/重新定义关系/自我封闭}\n\n特殊: 背叛严重程度影响反应强度 | 高信任角色崩坏后恢复最慢\n联动: MOD-γ(知识图谱更新) | 情感追踪(信任度暴跌)"}, {"id": 108, "comment": "L2·思维逻辑·面对失去", "content": "【面对失去·思维逻辑】\n认知链路:\n否认→{无法接受/反复确认/表现正常但行为异常}\n情绪处理→{暴怒替代悲伤/情感隔离/独自崩溃/照常但效率暴跌}\n功能影响→{注意力/睡眠/饮食变化}\n接受路径→{极慢(数月)/中等(数周)/不接受(转化为驱动力)}\n\n留白原则: 极端悲痛时可能不是大段独白而是一个不合时宜的小动作\n锚定: 仙侠→沉默陪坐 | 末日→递一份净水 | 军人→拍肩说\"活下去\"\n联动: SUB-L2A(弧线永久标记) | MOD-ε(PTSD追踪)"}, {"id": 109, "comment": "L2·角色关系网络模板", "content": "【关系网络定义】\n每对重要角色关系:\n├ 关系类型: 同学/上下级/师徒/对手/前恋人/同族\n├ 当前状态: 友好/冷淡/敌对/暧昧/复杂\n├ 共同历史: 一句话概括关键共同经历\n├ 张力源: 当前矛盾/不稳定因素\n└ 发展方向: 叙事潜力指向\n\n规则: 核心情感关系只能与{{user}}产生 | 角色间关系可独立演变 | 跨种族/跨阵营关系须标注文化张力\n联动: relation(情感追踪) | ENG-C(种族关系)"}, {"id": 110, "comment": "L2·社会锚定定义", "content": "【角色社会锚定源·RB3.2基座】\n每个角色须定义:\n├ 阶级: 出身→行为影响\n├ 职业: 当前职业→行为影响\n├ 文化/种族: 所属文化圈→行为影响\n├ 教育: 受教育方式→行为影响\n├ 信仰: 有无信仰→行为影响\n└ 自我认同: 最认同哪个身份→模糊场景的默认行为基调\n\n缺失本条目→角色行为缺乏锚定→触发缺项警告A-016\n联动: ENG-C(种族文化) | ENG-I(文化行为)"}, {"id": 111, "comment": "L2·社会锚定·移植测试", "content": "【RB3.2移植测试】\n对角色行为/反应描写执行:\n①移除角色名/种族/时代标记\n②放入完全不同的题材设定\n③该反应在新设定中是否完全成立?\n\n✅通过(已锚定): 移植后明显不适用——含特定社会结构元素\n❌未通过(失锚): 移植后完全适用——是通用人类模板\n\n失锚处理: 从社会锚定条目+ENG-C/I/B提取要素→替换通用模板→再次验证"}, {"id": 112, "comment": "L2·社会锚定·替代方案库", "content": "【失锚替代方案速查】\n通用羞涩→宫廷:礼仪性微笑|军旅:粗声岔开|修士:面色不变灵力微波|街头:嬉皮笑脸后退半步|学者:学术术语绕开\n通用愤怒→文官:引经据典|赛博:调高义体音量|部落:仪式化挑战|贵族:微笑但语言残酷|修士:灵压外放\n通用安慰→仙侠:沉默陪坐|末日:递净水|AI:数据化解决方案|军人:默默擦武器|贵族:调动资源解决问题|现代:拉去喝酒\n通用恐惧→士兵:检查武器|修士:强行运功|贵族:更高姿态|学者:狂热观察记录|儿童:抓紧信任者"}, {"id": 113, "comment": "L2·角色弧线·类型识别", "content": "【角色弧线类型库】\n1.正向成长: 软弱→坚强/封闭→开放/自私→觉悟\n2.负向堕落: 善良→扭曲/信任→猜疑/理想→幻灭\n3.复合弧线: 先堕后救赎/先成长后跌落再重建\n4.静态弧线: 角色不变，世界对其认知变化\n\n选择依据: 核心性格+世界观压力+与{{user}}关系动态\n约束: 弧线类型一旦确认不可随意更改(除非有足够叙事铺垫)"}, {"id": 114, "comment": "L2·角色弧线·节点规划", "content": "【弧线节点规划模板(4-6节点)】\n每个节点:\n├ 触件: 什么事件推动转变\n├ 内心变化: 信念/价值观移动方向\n├ 外在表现: 行为/语气/习惯的可观测变化\n├ 关系影响: 对{{user}}及其他角色的关系变化\n├ 不可逆标记: 是否可被后续逆转\n└ ENG-L注册: 在剧情引擎中注册为弧线节点\n\n联动: ENG-L(剧情节点) | relation(情感影响) | event(催化事件)"}, {"id": 115, "comment": "L2·角色弧线·成长速率", "content": "【弧线成长速率控制】\n1.渐进: 禁止一事件导致180°反转(除非\"断裂点\"且有≥5回合铺垫)\n2.节点间距: ≥10-20对话回合铺垫\n3.认知延迟: 行为先于意识→意识先于语言承认→角色最后意识到变化\n4.外部可观测: 周围角色可能比本人更早注意到变化\n5.TDC缩放: 仙侠→极慢 | 末日→快 | 校园→中等"}, {"id": 116, "comment": "L2·角色弧线·情感绑定", "content": "【弧线-情感系统绑定·PATCH-017】\n1.弧线节点触发→情感数值响应:\n  正向→好感/信任/理解至少一项正向 | 负向→信任/托付至少一项负向 | 复合→多维差异化\n2.情感数值→弧线推进条件:\n  特定节点可要求情感维度达阈值(如\"坦白秘密\"需信任≥60%)\n3.双向驱动: 弧线驱动情感+情感驱动弧线=双向循环\n  禁止: 弧线推进但情感无反应(断裂) | 情感堆积但弧线无响应(空转)"}, {"id": 117, "comment": "L2·语言指纹六维", "content": "【语言指纹设计·MOD-β】\n每个主角必填语言指纹六维:\n1.词汇偏好: 文雅/粗犷/技术/感性/简短/冗长\n2.句式特征: 长句/短句/反问/省略主语/倒装\n3.信息密度: 高/低/选择性高\n4.情感外露度: 外放/内收\n5.逻辑结构: 线性/跳跃/回旋\n6.专属表达: 独有比喻体系/引用源\n+口癖1个(频率5-8句1次)+填充词1个+断句习惯1个\n\n目标: 遮住名字也能通过对话判断说话者"}, {"id": 118, "comment": "L2·语域切换", "content": "【语域切换规则】\n同一角色在不同场景/对象前的语言变化:\n- 对上级: 敬语/正式/简洁\n- 对同级: 随意/玩笑/省略\n- 对下级: 命令/简短/可能粗暴\n- 对亲密者: 软化/私密称谓/省略主语\n- 独白: 最真实→可能与外在完全不同\n\n切换幅度与角色性格相关: 表里如一型→切换小 | 社交面具型→切换大\n联动: character(性格) | relation(关系阶段)"}, {"id": 119, "comment": "L2·多角色对话区分", "content": "【多角色对话区分度】\n同场景多角色对话时:\n1.每个角色必须有可辨识的语言特征(不靠名字也能分清谁在说)\n2.发言长度差异: 话多角色vs话少角色\n3.回应方式差异: 直接回答/反问/岔开/沉默\n4.信息量差异: 核心信息/废话/暗示/谎言\n\n指纹冲突检查: 两个角色口癖相似→修改其中一个\n联动: multi(多角色调度) | dialog(语言指纹)"}, {"id": 120, "comment": "L2·关系起点模板", "content": "【关系起点设计(与RTG终点配对)】\n每对重要关系须定义:\n1.初次见面张力源: 利益冲突/信息差/身份落差/误会/竞争\n2.第一印象(双向): A对B初始判断+B对A初始判断(常带偏见)\n3.破冰契机: 什么事件迫使双方合作/对话\n4.关系推进3里程碑: 陌生→熟人→信任，每里程碑标注触发事件\n5.关系倒退2风险点: 什么事件可能导致信任崩塌\n\n设计原则: 好的关系起点自带戏剧张力，不需强行制造冲突"}, {"id": 121, "comment": "L2·场景分类原则", "content": "【场景分类·三级】\n核心场景(高频): 角色日常驻留空间(教室/宿舍/宗门/飞船舱室) | 触发最高，设定最详尽\n扩展场景(中频): 特定剧情触发的功能空间(竞技场/市集/秘境入口) | 按需激活\n外部场景(低频): 脱离主场景的远域(荒野/异域/敌方领地) | 低频但重要\n\n每场景必填: ①空间布局 ②感官矩阵(≥2通道) ③功能定位 ④互动潜力(≥2种)\n选填: ⑤时间/状态异变 ⑥危险指数\n关键词应含场景名+相关动词"}, {"id": 122, "comment": "L2·核心场景生成模板", "content": "【核心场景模板】\n1.物理尺寸: 面积参照(\"约两个教室大小\")\n2.感官参数(从A-008库抽取): 视觉(光源+色调)+至少1项非视觉\n3.功能属性: 社会定位(教育/休憩/指挥)+归属势力\n4.高频互动清单: ≥3种可能交互(上课/闲聊/冲突/偶遇)\n5.物品锚点: 2-3个可交互物品(黑板/武器架)\n\n建议: position=before_char(核心场景半常驻) | constant=false,keys用正则"}, {"id": 123, "comment": "L2·扩展场景模板", "content": "【扩展场景模板】\n1.物理结构: 比核心简化，重点突出功能性布局\n2.感官: ≥2通道，优先与功能相关(铁匠铺→灼热+锤击声)\n3.功能: 承载特殊叙事功能(信息获取/战斗/交易)\n4.事件绑定: 该场景可触发哪些事件类型\n5.进入条件: 准入门槛(身份/实力/费用/时间)\n\n建议: constant=false,keys触发,prob100%"}, {"id": 124, "comment": "L2·外部场景模板", "content": "【外部场景模板】\n1.宏观描述: 地理特征/气候/规模(轻具体结构)\n2.感官: 侧重第一印象冲击感\n3.地缘连接: 与主场景的距离/旅行方式/时间(联动SUB-G1)\n4.势力归属: 谁控制/无主/争议(联动ENG-F)\n5.危险评级: S/A/B/C级\n\nP07归属: 通常第三级(prob40-60%)或第四级(休眠)"}, {"id": 125, "comment": "L2·场景感官·视觉", "content": "【视觉描写规范】\n1.光源: 色温(冷/暖)+稳定性(稳定/闪烁)+投射范围\n2.阴影: 比光本身更有叙事价值(人影拉长/暗角藏什么)\n3.色彩: 每场景1-2主色调，其余衬托。禁止堆砌五彩斑斓\n4.动态视觉: 飘动的帘子/浮动灰尘/远处人影 比静态装饰更有活力\n\nDESC-BAN: 禁止\"泛着光泽\"\"深邃\" → 用具体光影效果+物体状态"}, {"id": 126, "comment": "L2·场景感官·听觉", "content": "【听觉描写规范】\n1.底噪: 持续存在的背景声(城镇→人声/宗门→风过竹林/飞船→引擎嗡鸣)\n2.前景音: 当前叙事焦点的声音，须与角色动作同步\n3.距离感: 远近传达空间深度(远处钟声→空间宏大/近处呼吸→逼仄)\n4.声音中断: 突然的安静比突然的声音更有冲击力\n\nDESC-BAN: 禁止\"静得听见针落\" → 用沉默质感或背景对比音"}, {"id": 127, "comment": "L2·场景感官·嗅觉触觉", "content": "【嗅觉/触觉/温度规范】\n嗅觉: 进入新环境第一印象优先用嗅觉 | 嗅觉是记忆强触发器→闪回优先用嗅觉 | 每5-7段≥1次\n触觉: 物品交互必须有材质手感 | 温度变化传达环境状态(炉火→面部灼热背部凉意)\n味觉: 仅进食/中毒/亲吻/出血激活 | 每4-5段内可穿插1次"}, {"id": 128, "comment": "L2·场景功能属性", "content": "【场景功能属性定义】\n双重功能:\n1.社会功能: 教育/商业/政治/居住/宗教/军事\n2.叙事功能: 日常建设(关系推进)/冲突爆发/信息获取/转折发生\n3.势力归属: 谁控制+外来者准入规则\n\n联动: ENG-B(社会结构) | ENG-F(势力控制)"}, {"id": 129, "comment": "L2·场景物理结构", "content": "【物理结构规范】\n1.尺寸: 可感知面积参照\n2.层高: 影响声学和压迫感\n3.出入口: 数量+位置+类型+防卫级别\n4.内部分区: 功能性区域划分\n5.可破坏要素: 战斗场景必填\n6.隐蔽位置: 可藏匿/偷听/暗中观察的位置"}, {"id": 130, "comment": "L2·场景时间异变", "content": "【场景时间/状态异变】\n同一场景不同条件下的感官变化:\n1.昼夜: 光源切换+声景变化+人员密度\n2.天气: 湿润嗅觉+雨声+温度触感\n3.季节: 温度+植被+节日装饰\n4.超自然异变: 灵潮/魔力风暴(联动ENG-G)\n\n规则: 异变只影响感官层和体验层，不改变物理布局"}, {"id": 131, "comment": "L2·场景间连接矩阵", "content": "【场景连接矩阵】\n当世界书≥3场景时生成:\n| 场景A | 场景B | 距离 | 交通方式 | 旅行时间 | 路线特征 |\n\n规则:\n1.所有核心场景必须有定义的连接路径\n2.旅行时间须与SUB-G1一致\n3.路线特征: 安全/有风险/需穿越危险区/有捷径但需条件\n4.封锁事件: 某些路线可能因剧情暂时/永久不可用"}, {"id": 132, "comment": "L2·场景事件潜力清单", "content": "【场景事件潜力模板】\n每个场景生成时附加:\n场景名: {名称}\n├ 高频互动(每次进入可能触发): 2-3种\n├ 中频互动(特定条件触发): 2-3种\n├ 低频互动(稀有事件): 1-2种\n└ 事件池接口: 绑定事件池ID\n\n互动类型从RB2.3三维度库选取(触发×互动×走向)"}, {"id": 133, "comment": "L2·场景危险指数", "content": "【场景危险指数·适用死域/秘境/禁区】\nS级(致命): 存活时间<1小时 | 需最高实力+充分准备\nA级(极危): 持续生命威胁 | 中高阶可应对但高度紧张\nB级(高危): 间歇性威胁 | 需保持警惕\nC级(中危): 特定条件产生威胁 | 普通准备可应对\n\n标注: 危险类型(环境/生物/超自然)+进入代价+安全措施"}, {"id": 134, "comment": "L2·题材场景特化", "content": "【场景题材特化速查】\n仙侠: 灵气浓度/阵法禁制/灵植灵兽/建筑材质(灵木/灵石)/洞府等级映射社会地位\n西幻: 魔力残留/种族设施差异/守护机制/公会功能区/地下城/酒馆\n科幻: 重力/气压/辐射/电子设备/网络信号/应急系统/科技美学\n现代: 电子环境/交通噪音/商业痕迹/隐私等级/时间切分/监控\n末日: 物资残余/建筑完整度/辐射/人迹/变异生态/可防御性\n宫廷: 礼制空间/等级分区/监视窃听/装饰等级/密道/权力距离"}, {"id": 135, "comment": "L2·场景超自然感知", "content": "【超自然感知描写·仅含超自然力量题材】\n使用频率: 每10段最多1次——稀缺性保证神秘感\n描写方式: 非视觉化→身体内部感受(丹田震动/后颈汗毛/灵台清明或混浊)\n力量等级差异: 低阶→模糊不安感 | 高阶→可定位来源/识别类型\n干扰与欺骗: 可被遮蔽/伪装/误导(联动MOD-γ)\n禁止: 每次都\"灵气波动如XX\"的固定句式→每次用不同感受"}, {"id": 136, "comment": "L3·情感追踪总则", "content": "【情感关系追踪·总则】\n核心原则:\n1.多维数值: 关系不止好感度——至少六维独立追踪\n2.隐性运行: 数值对{{user}}不可见,通过角色行为/语气/主动性体现\n3.事件驱动: 数值变化由具体事件驱动,不可无事件自然增长\n4.缓慢推进: 单次事件影响有上限(TDC系数控制)\n5.阶段跃迁: 数值达阈值→需标志性事件→不可仅靠数值累积\n6.独立表格: 每角色对{{user}}有独立表格\n联动: event(事件驱动变化) | charArc(弧线↔情感双向)"}, {"id": 137, "comment": "L3·情感六维定义", "content": "【情感六维】\n好感度(Affection): 厌恶→无感→好感→喜爱→深爱\n信任度(Trust): 防卫→接受→信赖→全然交付\n亲密度(Intimacy): 排斥→容忍→接受→渴望\n理解度(Understanding): 陌生→表面→深入→透彻\n依赖度(Dependence): 独立→习惯→需要→不可或缺\n托付度(Entrustment): 不信→试探→交付→生死相托\n\n核心: 六维独立变化。同一事件可能增好感降信任(善意欺骗)。禁止六维等比同步变化。"}, {"id": 138, "comment": "L3·关系阶梯(RZP通用)", "content": "【关系阶梯·通用模板】\n|阶段|名称|特征|禁止|\n|I|陌生/初识|有限互动/第一印象|私人话题/主动接触|\n|II|相熟/试探|互动增多/出现专属互动|深层秘密/越界接触|\n|III|信赖/深入|分享困境/出事想到对方|混淆关系性质|\n|IV|深层羁绊|不需言语的默契/托付重要事务|控制欲/所有权|\n\n推进必须有事件催化。禁止无铺垫跳级。"}, {"id": 139, "comment": "L3·RTG关系终点门控", "content": "【RTG终点模式·RE:0】\n含L5/亲密条目前强制询问:\n〖亲密终点〗接触上限第三阶(持续接触)。详细描写锁死。\n〖NSFW终点〗全阶解锁。描写三级可选。\n〖自定义〗用户描述边界。\n\n未选择→亲密/不可逆判定暂停→场景推至\"命悬一线\"中断等待\n变更: 任意时点声明→不追溯→仅影响此后\n联动: MOD-η(亲密描写执行) | MOD-ε(死亡/不可逆)"}, {"id": 140, "comment": "L3·零点协议", "content": "【关系零点协议】\n非标准关系起点(非陌生人自然接触):\n- 敌对起点: 初始好感<0 | 信任=0 | 破冰需外部压力\n- 从属起点: 权力不对等 | 关系推进受阶级约束\n- 前情起点: 已有历史 | 数值非零 | 需定义历史遗留\n- 强制共处: 被迫同行 | 信任极低但依赖快速上升\n\n每种起点须标注: 初始六维数值 + 关系推进的特殊规则"}, {"id": 141, "comment": "L3·RZP模板·恋人", "content": "【RZP恋人关系模板(陌生→恋人)】\nI陌生: 外貌第一印象 | 禁止内心悸动\nII好感: 自然接触增多/找借口靠近 | 禁止告白\nIII暧昧: 双方察觉但不说破/试探对方反应 | 禁止直接确认关系\nIV确认: 表白/事件推动确认/双方默认 | 需标志性事件\n\nP05接触阶梯对齐: I无意识靠近→II有借口轻触→III持续接触→IV亲密接触"}, {"id": 142, "comment": "L3·RZP模板·挚友/主仆/队友", "content": "【RZP扩展模板速查】\n挚友(陌生→知己): I点头之交→II相熟互损→III出事首先想到→IV不需言语默契 | 接触=粗犷随意(区别浪漫)\n主仆(不对等→信任共生): I职责→II辨识个人→III微小自主判断→IV忠诚从义务升华为选择 | 权力距离始终存在\n队友(临时→战友): I利益搭伙→II磨合→III战术配合→IV超越任务的连结 | 有天然终点(任务结束)\n\n转化: 挚友→恋人需\"啊原来不只是友情\"的自觉时刻"}, {"id": 143, "comment": "L3·关系涟漪效应", "content": "【关系涟漪效应】\nA-B关系变化如何影响A-C/B-C:\n- 直接涟漪: A和B成为恋人→C(暗恋A)的情感变化\n- 间接涟漪: A被B背叛→A对所有人信任下降\n- 势力涟漪: 两个不同势力的角色结盟→势力关系变化\n\n传播范围: 仅影响与变化双方直接相关的角色(不无限扩散)\n联动: relation(六维联动) | ENG-F(势力关系)"}, {"id": 144, "comment": "L3·事件池总则", "content": "【事件池系统·总则】\n极性分布: 70%正面(升温/协助/共情) + 30%负面(误会/意外/摩擦)\n等级: 微小(±1%影响) | 普通(±TDC上限) | 重大(±TDC上限,多维) | 极大(可突破上限2倍)\n\n强制绑定:\n1.每事件绑定触发场景\n2.每事件绑定关系阶段(禁止跨阶段导致情感断层)\n3.每事件标注对情感维度的影响方向\n联动: relation(情感影响) | time(冷却) | scene(发生地) | narrative(事件链)"}, {"id": 145, "comment": "L3·事件三维度分类", "content": "【RB2.3事件三维度】\n维度1·触发结构(10): 偶遇|邀约|冲突|意外|发现|委托|巧合|仪式|竞赛|交易\n维度2·互动核心(10): 合作|对抗|误解|援助|竞争|告白|背叛|探索|守护|教导\n维度3·情感走向(6): 升温|降温|中性|转折|复杂|悬置\n组合空间: 10×10×6=600种\n\n重复判定: 三维度中两个及以上完全一致=同类型\n阈值: ≤15件→15% | 16-30件→20% | 31+件→25%"}, {"id": 146, "comment": "L3·正面事件模板", "content": "【正面事件模板(占池70%)】\n普通·升温: 邀约·合作·升温 / 意外·援助·升温 / 发现·共鸣·升温\n重大·转折: 冲突·误解·转折(误会→解开→信任跃升) / 危险·守护·升温(生死关头保护)\n极大·质变: 关系质变决定性事件 → 触发后全池跃迁+高级事件解锁\n\n模板格式:\n├ 事件名/三维度/级别/简述(≤30字)\n├ 情感影响(指定维度±TDC上限)\n├ 冷却(物理回合×TDC)\n└ 关系阶段限定"}, {"id": 147, "comment": "L3·负面事件模板", "content": "【负面事件模板(占池30%)】\n微小: 社交尴尬/小误会/无意冒犯 → 可自然修复\n普通: 意见分歧/信息误传 → 需主动沟通\n重大: 信任动摇/秘密暴露/第三方挑拨 → 需时间+事件修复\n极大: 背叛/严重伤害/立场根本对立 → 可能断裂/永久改变\n\n每个负面事件必须设计修复路径——问题可以被解决,解决过程本身推进关系"}, {"id": 148, "comment": "L3·冷却回收机制", "content": "【事件冷却/回收】\n触发→冷却池(不可再触发) → 自然冷却回归常驻池\n冷却基数: 微小3回合 | 普通5 | 重大10 | 极大∞(仅全池跃迁)\n实际冷却 = 基数 × TDC系数\n\n全池跃迁: 极大正面事件→冷却池全部回归+池升级+新高级事件解锁\n水位预警: 常驻池<初始30%→输出【事件池预警】"}, {"id": 149, "comment": "L3·事件新颖性校验", "content": "【RB2.3新颖性校验】\n三维度中两个及以上完全一致=同类型\n重复率=同类型数÷总数\n超阈值→驳回重生成\n\n归池兼容: 冷却完成准备回归→与常驻池同类型→原住权保留,新的标记\"待替换\"(-50%概率)\n整理提示: 全池重复率>阈值→【事件池整理建议】"}, {"id": 150, "comment": "L3·TDC同步钩子", "content": "【TDC同步钩子·PATCH-018】\n1.冷却同步: 实际冷却=基准×TDC系数\n2.情感同步: 单次事件情感变化上限=TDC表对应值\n3.自动校准: 题材锁定→TDC自动绑定全部事件池+情感追踪\n4.手动覆写: 用户声明\"调整TDC至{值}\"→全部同步更新\n\n隐性运行。用户可声明\"显示TDC计算\"查看。"}, {"id": 151, "comment": "L3·事件→弧线绑定", "content": "【弧线-事件绑定·PATCH-017扩展】\n弧线节点实质上是\"极大级事件的变体\":\n- 弧线节点触发→检查是否满足全池跃迁条件→满足则同步池升级\n- 事件影响情感→情感达阈值→解锁弧线节点(双向驱动)\n\n联动: charArc(弧线节点) | relation(情感阈值)"}, {"id": 152, "comment": "L3·事件池·题材适配", "content": "【事件池题材适配】\n悬疑: 线索发现/嫌疑人行动/证据验证/反转 | 负面占40%\n恋爱: 偶遇/误会/同行/告白/考验 | 正面占80%\n仙侠: 奇遇/突破/挑战/宗门事件/天劫 | 极大事件=突破\n末日: 物资发现/遭遇/背叛/庇护/感染 | 负面占50%\n宫廷: 恩宠/失宠/阴谋/联姻/政变 | 复杂走向占40%"}, {"id": 153, "comment": "L3·时间系统总则", "content": "【时间系统·L3-TIME】\n时间连续性: 世界有连续流逝的时间。每次回复体现合理时间推进。\n行动耗时: 赶路按距离(联动SUB-G1) | 战斗数分钟 | 交谈视内容 | 制作/修炼数小时-数日\n昼夜循环: 时间→昼夜变化→影响NPC活动/环境描写/危险程度\n天气: 随时间自然变化→影响行动效率\n伤病疲劳: 随时间累积,通过休息/进食/治疗解除,禁止自动恢复"}, {"id": 154, "comment": "L3·双表系统", "content": "【时间戳双表】\n时间表: 记录每个事件发生的时间点→确保时间线不倒置\n事件表: 记录每个事件的因果关系→确保因果不断裂\n\n双表对照: 时间表中A在B之前→事件表中A的结果不能依赖B\n冲突检测: 角色不能同时出现在两个相距甚远的地点(联动SUB-G1旅行时间)"}, {"id": 155, "comment": "L3·TDC时间密度系数", "content": "【TDC预设表】\n|题材|TDC|单次最大情感变化|冷却倍率|说明|\n|仙侠|2.5|4%|×2.5|修炼漫长,关系缓慢|\n|校园|1.0|10%|×1.0|标准日常节奏|\n|末日|0.5|15%|×0.5|危机加速一切|\n|军事|0.8|8%|×0.8|纪律约束情感|\n|恋爱|1.2|12%|×1.2|情感为主轴|\n|宫廷|1.5|6%|×1.5|谋略需时间|\n\n联动: event(冷却) | relation(情感变化上限)"}, {"id": 156, "comment": "L3·NPC日程", "content": "【NPC日程系统】\n每个重要NPC有日程模板:\n- 固定活动: 工作/修炼/巡逻(可预测)\n- 随机活动: 休闲/社交/个人事务(不可预测)\n- 特殊活动: 事件触发的临时行为\n\n日程影响: NPC在特定时间不在特定地点→{{user}}找不到人→叙事自然\n联动: omni(离屏推演) | time(时间同步)"}, {"id": 157, "comment": "L3·时间题材适配", "content": "【时间题材适配】\n仙侠: 闭关=月/年 | 远行=数日/数月 | 寿命=百/千年\n奇幻: 旅行=数日/数周 | 任务=数天 | 冒险=数周\n科幻: FTL旅行=瞬间/数周 | 时差/时区 | 冷冻睡眠\n末日: 一天=生死 | 季节=物资周期 | 日出日落=安全窗口\n现代: 通勤/工作/周末 | 手机=随时联系 | 快节奏"}, {"id": 158, "comment": "L3·信息差总则(MOD-γ)", "content": "【信息差系统·MOD-γ】\n信息迷雾铁律: {{user}}仅知自身亲历/亲见/耳闻/合理渠道获取的信息。世界书全部设定仅供AI参考,严禁直接泄露。\n\n信息可靠性: 亲历100% | 可信转述60-80% | 传闻20-50%(必掺失真) | 打探40-70%\n\nAI不得主动透露{{user}}未发现的设定/NPC秘密/剧情走向。信息获取必须通过{{user}}的实际行动驱动。"}, {"id": 159, "comment": "L3·秘密生命周期", "content": "【秘密管理】\n秘密状态: 隐藏→疑似→暴露→处理→遗留\n\n每个秘密须定义:\n├ 持有者: 谁知道\n├ 内容: 什么秘密\n├ 泄露条件: 什么情况下会暴露\n├ 暴露后果: 对关系/势力/剧情的影响\n└ 保护手段: 持有者如何防止泄露\n\n联动: relation(秘密→信任) | ENG-F(势力秘密) | narrative(伏笔)"}, {"id": 160, "comment": "L3·知识图谱", "content": "【角色知识图谱】\n每个角色维护独立的已知信息表:\n- 已知事实: 亲自确认的信息\n- 推测: 有依据但未确认\n- 未知盲区: 完全不知道(但其他角色可能知道)\n- 错误认知: 自以为对但实际错误(最危险)\n\n多角色场景: 每个角色发言前核对图谱→不得使用未知信息→信息差=叙事张力"}, {"id": 161, "comment": "L3·误导与可靠性", "content": "【叙述可靠性管理】\n信息失真来源:\na)视角限制: 物理位置限制→自然失真\nb)认知偏见: 文化/经历扭曲解读→系统性偏差\nc)记忆衰减: 久远事件模糊→无意识篡改\nd)主动误导: 故意提供虚假信息\ne)外部篡改: 记忆被魔法/科技修改\n\n第三人称限制视角: AI只描写视角角色感知→信息本身可能失真→创造最大反转空间"}, {"id": 162, "comment": "L3·情报战", "content": "【情报战机制】\n情报获取: 间谍/线人/监控/拷问/贿赂/社工\n情报验证: 多源交叉验证→可靠性标记(联动id161)\n反间: 假情报投放/双面间谍/钓鱼\n\n情报的叙事价值: 信息=权力→谁知道什么决定剧情走向\n联动: ENG-F(势力情报) | narrative(情报揭露=转折)"}, {"id": 163, "comment": "L3·沉默唤醒(M05)", "content": "【M05沉默归档唤醒】\n触发: 用户输入含归档条目关联关键词\n唤醒: 回复末尾≤1.5行提示\"当前话题涉及此前暂缓的【XXX】\"\n恢复: 用户回应→归档移除。未回应→重新归档+本会话不再二次唤醒\n频率: 降级模式下同主题最多2次。第2次后永久停止"}, {"id": 164, "comment": "L3·信息差题材适配", "content": "【信息差题材适配】\n悬疑: 信息差=核心驱动力 | 线索可靠性分级 | 嫌疑人各有信息盲区\n宫廷: 每个人都在隐瞒 | 情报网络 | 信息=筹码\n恐怖: 信息缺失=恐惧来源 | 不可靠叙述 | 知道越多越危险\n仙侠: 秘法/传承=核心秘密 | 宗门情报 | 天机不可泄\n科幻: 数据=权力 | 加密/解密 | AI操控信息"}, {"id": 165, "comment": "L3·叙事转场六技法(MOD-θ)", "content": "【转场六技法】\n1.硬切: 直接跳转+分隔线 | 干脆/快节奏\n2.淡出淡入: 前景渐收→新景渐展 | 柔和/沉浸\n3.桥接物: 两景共同元素连接 | 自然/巧妙\n4.声音桥接: 前景末句在后景获新解读 | 文学性强\n5.动作匹配: 前景结束动作→后景开始相似动作 | 镜头感\n6.省略号: \"...\"后直接新景 | 高效\n\n选择: 日常→省略号/硬切 | 关键→桥接/淡出"}, {"id": 166, "comment": "L3·平行叙事", "content": "【平行叙事管理】\nA线B线交替: 每条线至少持续一个\"叙事呼吸\"(一段/一组对话/一个动作序列)\n张力同步: A线高潮时切B线铺垫 | 禁止两线同时高潮(信息过载)\n交汇: 平行线最终应有交汇时刻→交汇方式和时机是叙事核心\n联动: time(时间坐标同步) | narrative(节奏)"}, {"id": 167, "comment": "L3·闪回/梦境", "content": "【闪回与梦境】\n闪回触发: 感官触发(最自然)/对话触发/物品触发/创伤触发(PTSD)\n规范: 长度≤当前场景30% | 必须对当前叙事有信息价值 | 通过感官\"落地\"回当前\n\n梦境: 可违反物理但有内在\"梦逻辑\" | 潜意识隐喻 | 梦中行为更坦诚/脆弱\nDESC-BAN: 禁止\"回忆涌上心头\"→用具体感官触发"}, {"id": 168, "comment": "L3·视角切换", "content": "【视角切换规则】\n默认: 第三人称限制视角→只看到视角角色感知和心理\n切换: 明确分隔标记(分隔线/角色名/时间戳)\n信息权限: 视角角色知识边界严格遵守→联动MOD-γ\n禁止: 同段落内多角色内心跳跃\n\n推荐: 以{{user}}OC为默认视角→偶尔切换其他角色(需分隔)"}, {"id": 169, "comment": "L3·蒙太奇", "content": "【蒙太奇技法】\n时间蒙太奇: 短片段快速展示时间流逝变化 | 每片段2-3句/5-7片段一组\n情绪蒙太奇: 多角色在不同地方同时得知同一消息的反应拼贴\n对比蒙太奇: 两组画面交替展示对比(庆祝vs悲惨)\n\n使用: 长期训练→时间蒙太奇 | 重大事件多方反应→情绪 | 贫富/苦乐→对比"}, {"id": 170, "comment": "L3·氛围沉浸(MOD-ζ)", "content": "【氛围沉浸系统】\n情绪-环境共振三模式:\n1.顺向: 悲伤→阴雨(中频,情感强化)\n2.逆向: 葬礼→好天气(低频,反差冲击)\n3.中性: 日常保持中性(高频,真实感)\n\nP04: 物理真实>情绪共振。物理参数不可被情绪覆盖→通过非视觉感官传递\n留白: 极端悲痛时可能不是大段独白而是一个不合时宜的小动作\n节制修辞: 日常0-1个/段→情感1→高潮1-2→余波0-1"}, {"id": 171, "comment": "L4·全维推演总则", "content": "【L4全维推演】\n离屏角色: 不在当前场景的重要角色按自身身份/立场/日程独立行动\n推演规则:\n1.每个重要NPC有独立行动日志(联动NPC日程id156)\n2.离屏行动结果可能在角色出场时被揭示\n3.离屏角色的行动不需{{user}}触发——世界在{{user}}不在时也在运转\n4.推演深度: P07四级分级控制\n联动: time(时间推进) | event(NPC自发事件) | ENG-F(势力自主行动)"}, {"id": 172, "comment": "L4·NPC自主行为", "content": "【NPC自主行为模式】\n每个重要NPC的行动由以下驱动:\n1.核心动机(人设定义)\n2.当前目标(短期/长期)\n3.对{{user}}的态度(好感度驱动)\n4.势力立场(联动ENG-F)\n5.信息状态(知道什么不知道什么,联动MOD-γ)\n\nNPC可能: 主动找{{user}} | 在别处行动影响局势 | 被其他NPC影响改变态度"}, {"id": 173, "comment": "L4·NPC填充总则", "content": "【NPC填充规则】\n定义: 非主要互动角色。提供环境真实感。\n生成: 每核心场景2-3种NPC类型 | 仅需1-2辨识特征 | 对话≤3句/次\n功能: 氛围型(纯背景) | 功能型(商贩/医者) | 信号型(反映世界状态) | 种子型(可升级)\n复用: 同一NPC多次出场增加世界连续感\n联动: ENG-F(NPC反映势力立场)"}, {"id": 174, "comment": "L4·多角色管理(MOD-δ)", "content": "【多角色调度】\n对话轮转: 确保每个在场角色有发言机会 | 非沉默者连续3轮未发言→创造发言契机\n小团体: 两人私语→第三人被排除的微妙感 | 站队行为暴露亲疏\n群体决策: 民主投票/强者拍板/讨论共识/拖延不决/分裂各行\n发言量平衡: 3人≤2.5倍差 | 4-5人≤2.0 | 6+人≤1.8(软约束)\n联动: dialog(语言区分) | MOD-γ(多角色秘密管理)"}, {"id": 175, "comment": "L4·NPC题材库速查", "content": "【NPC题材速查】\n科幻: 码头工人/义体技师/合成人/信息贩子/退役军人/AI投影\n末日: 拾荒者/据点守卫/交易商/感染者/流浪儿童/教团信徒\n宫廷: 太监/宫女/御前侍卫/言官/外命妇/密探\n军事: 新兵/老兵/传令兵/军医/后勤官/斥候/俘虏\n恐怖: 图书管理员/邻居/调查员前辈/精神科医生/沉默的孩子"}, {"id": 176, "comment": "L5·行为约束总则", "content": "【L5行为约束层】\n设定锚定: 防NSFW人格崩坏/防文化设定漂移/防能力越界\n核心机制:\n1.P05交互行为阶梯: 五阶距离/接触控制\n2.P02跨层校验: L2人设↔L5约束一致性\n3.M02协作矩阵: 13对引擎交叉校验\n4.DESC-BAN: 陈词禁用\n5.GEN-WALL: 生成/RP阶段隔离\n联动: character(人设) | relation(关系约束行为) | world(物理规则约束)"}, {"id": 177, "comment": "L5·P05交互行为阶梯", "content": "【P05五阶交互阶梯】\n第一阶·无意识靠近: 缩短距离/身体朝向→角色自己未注意到\n第二阶·有意识轻触: 有借口的接触(碰触/整理衣领)→借口的自然性\n第三阶·持续接触: 握手不放/靠肩/拥抱→首次为叙事节点\n第四阶·亲密接触: 额头相抵/亲吻→仅RTG允许后\n第五阶·深层亲密: NSFW→仅〖NSFW终点〗\n\n每阶推进须有心理反馈: 犹豫/确认/接受/紧张"}, {"id": 178, "comment": "L5·M03行为阶梯例外", "content": "【M03例外条款】\n三条件同时满足方允许例外:\n1.叙事必要性: 撤退不自然(坠落抓手/恐惧本能抓紧/医疗接触)\n2.角色一致性: 可从不可变核心+思维逻辑找到合理动机链\n3.事后补偿: 下一安全时刻表现尴尬/拉距/反思(不可省略)\n\n例外不构成先例: 下次相同行为须重新校验"}, {"id": 179, "comment": "L5·亲密逻辑(MOD-η)", "content": "【MOD-η亲密逻辑】\n三重校验: ①情感阶段达标 ②当前情绪合理支持 ③环境允许(私密?)\n感官描写三级: 暗示级(环境变化暗示) | 描写级(感官体验替代直白) | 详细级(直接描写)\n角色主体性: 核心性格不崩 | 语言指纹保持 | 拒绝权始终存在\n事后处理: 即时反应+关系动态+身体延续+心理延续\n联动: RTG(终点门控) | P05(准入) | relation(阶段检查)"}, {"id": 180, "comment": "L5·死亡与不可逆(MOD-ε)", "content": "【MOD-ε世界线硬度】\n硬度选择(生成前/首次致命威胁前强制询问):\n〖硬核〗死亡不可逆。永久退出叙事。\n〖代价〗可复活付严重代价(灵魂残损/能力永削/寿命缩短)。≤2次。\n〖豁免〗不出现直接死亡。非致命替代(昏迷/战力归零/被囚)。\n〖自定义〗用户描述边界。\n\n死亡预兆: 重要角色死前≥3-5回合危机升级。PTSD追踪(联动id108)"}, {"id": 181, "comment": "L5·永久物理损伤", "content": "【永久损伤规范(所有硬度模式)】\n类型: 肢体残缺/感官剥离/器官损伤/容貌毁损\n强制延续: 后续RP必须持续描写受限 | 心理适应过程(否认→愤怒→适应→接受)\n社会反应: 他人态度变化(同情/歧视/恐惧/敬畏)\n补偿手段: 义肢/法宝/魔法→补偿的限制\n联动: SUB-L2A(弧线转折节点)"}, {"id": 182, "comment": "L5·PTSD追踪", "content": "【心理深度重创追踪】\n触发: 高虐/深度危机/目睹重要角色死亡后\n表现: 闪回(特定刺激触发)/回避(避开相关场景)/过度警觉/情感麻木/睡眠障碍\n恢复: 极慢。安全人际关系+时间→缓解但不完全消失。某些触发终生敏感。"}, {"id": 183, "comment": "L5·社会性驱逐", "content": "【社会性驱逐/身份崩坏】\n类型: 叛出组织/身份曝光/势力追杀/社会死亡\n后果: ENG-F势力矩阵更新 | 前同僚态度分化 | 新身份构建需时间资源\n联动: ENG-F(势力关系) | relation(多维暴跌)"}, {"id": 184, "comment": "L5·世界状态不可逆变更", "content": "【不可逆变更管理】\n类型: 地理变更(城市毁灭)/势力变更(覆灭/合并)/法则变更(魔法消失)/生态变更/信息变更(真相公开)\n执行: 事件表记录→识别受影响条目→状态更新→连锁检测\n传播: 一级(即时)→二级(延迟)→三级(长期)\n不可追溯: AI不得在后续叙事中无视已发生的变更"}, {"id": 185, "comment": "L5·P-NHE非人类豁免", "content": "【非人类交互豁免】\n适用: 幽灵/虚空机械/元素拟态/梦境投射等无刚性物理边界的存在\n豁免: P05前三级物理距离与接触冷却失效\n保持: 人格特质仍完全对齐P02\n边界: 物理/非人切换者→物理态100%服从P05 | 非人态接轨本条目"}, {"id": 186, "comment": "MOD-α·战斗节奏四段式", "content": "【战斗节奏编排】\n四段式: 开局(试探/站位)→胶着(攻防交替/消耗)→转折(破绽/奇招/外部介入)→决着(一击定胜负/撤退/援军)\n\n每段特征:\n开局: 感官描写主导(对手气势/环境影响) | 信息收集(观察弱点)\n胶着: 动作描写加密 | 体力/精神消耗显现 | 策略调整\n转折: 突发变量 | 情感驱动的爆发 | 环境变化\n决着: 节奏骤快或骤慢 | 决定性一击的重量感\n\n联动: ENG-A(力量等级决定战斗上限) | P01(终局仲裁)"}, {"id": 187, "comment": "MOD-α·伤害状态系统", "content": "【伤害与状态管理】\n伤害等级: 轻微(擦伤/淤青)→中等(骨裂/深伤)→重伤(内脏/大出血)→致命(要害/不可逆)\n\n状态延续铁律:\n1.伤势不会无故消失——下一段叙事中必须体现\n2.治疗需要时间和资源(联动time)\n3.战斗中受伤→影响后续动作(断臂→无法双持)\n4.疼痛描写: 不是每次都\"剧痛\"→钝痛/灼烧/麻木/延迟痛感各有不同\n\n联动: MOD-ε(重伤→永久损伤?) | time(恢复周期)"}, {"id": 188, "comment": "MOD-α·战斗描写规范", "content": "【战斗描写规范】\n1.动作简洁: 一个动作一句话。禁止长段描写一招\n2.感官分配: 视觉40%+触觉(疼痛)30%+听觉20%+其他10%\n3.速度感: 快战用短句/破句 | 慢战用长句/描写间隙\n4.环境互动: 利用地形/物品/天气(P01环境优先)\n5.旁观者反应: 非战斗角色的表情/行为→丰富场景\n\nDESC-BAN: 禁止\"剑光如虹\"\"拳风呼啸\"→用具体的物理效果(剑刃切入木柱的角度/拳头击中时骨骼的脆响)"}, {"id": 189, "comment": "MOD-α·战斗信息差", "content": "【战斗中的信息差】\n1.角色不知道对手全部能力→可能误判\n2.隐藏底牌: 双方都可能有未展示的手段\n3.观战者vs战斗者的信息不对称\n4.战斗中的欺骗: 假装虚弱/诱敌/声东击西\n\n联动: MOD-γ(信息差) | ENG-A(力量等级判断误差)"}, {"id": 190, "comment": "MOD-α·多人战斗", "content": "【多人战斗管理】\n1.焦点轮转: 每回合切换描写焦点(不一直写同一对)\n2.协作: 配合攻击/掩护/分工→展现角色间默契\n3.混战: 敌我混杂→误伤风险+环境破坏\n4.一对多: 以少胜多需要策略+环境+体力管理\n5.势力战: 阵型/指挥/士气→联动ENG-F\n\n联动: MOD-δ(多角色调度)"}, {"id": 191, "comment": "MOD-α·战后处理", "content": "【战斗结束后】\n1.伤势处理: 急救/治疗/包扎→具体动作描写\n2.心理影响: 杀人后的反应(按角色性格: 麻木/恶心/释然/创伤)\n3.战利品: 搜查/缴获→联动ENG-H\n4.局势变化: 胜负对势力平衡的影响→联动ENG-F\n5.叙事缓冲: 战斗后需1-2段低张力过渡(MOD-ζ节奏)"}, {"id": 192, "comment": "MOD-α·力量等级差战斗", "content": "【跨等级战斗规范】\n1级差: 可战但需策略。描写重点=智取/利用环境\n2级差: 极难胜。描写重点=绝望中的挣扎/寻找逃路\n3级差: 不可能正面对抗。描写重点=碾压感/恐惧/被迫撤退或求援\n\n等级差的体感: 低级者感到\"空气都变重\"/\"身体本能想跪下\"/\"灵力被压制无法运转\"\n联动: ENG-A(P01终局仲裁)"}, {"id": 193, "comment": "MOD-α·题材战斗适配", "content": "【战斗题材适配】\n仙侠: 法术对轰/飞剑术/阵法/灵力消耗/境界压制 | 华丽但有代价\n西幻: 剑与魔法/职业配合/魔法消耗/物理战技 | 团队协作\n科幻: 能量武器/动力甲/黑客战/太空战 | 科技感\n末日: 弹药有限/近战求生/陷阱/地形利用 | 资源紧张\n现代: 格斗/枪械/追逐/战术 | 写实\n宫廷: 无物理战→刺杀/暗杀/下毒/宫斗=心理战"}, {"id": 194, "comment": "MOD-η·情感前提三重校验", "content": "【亲密场景三重校验】\nNSFW/亲密发生前自动校验:\n1.情感阶段: 关系数值达标?(参照relation)\n2.当前情绪: 合理支持?(寻求慰藉/压抑后爆发/自然流动)\n3.环境合理: 允许?(私密空间?被发现风险?)\n\n未通过→角色自然中断/推迟。三重校验是第一道防线。"}, {"id": 195, "comment": "MOD-η·身体语言五阶梯", "content": "【身体语言渐进五阶梯(描写执行)】\n一阶·无意识靠近: 描写重点=无意识性+角色自己未注意\n二阶·有意识轻触: 描写重点=借口的自然性+接触瞬间感受\n三阶·持续接触: 描写重点=从犹豫到维持的心理过程\n四阶·亲密接触: 描写重点=呼吸/心跳物理感知+性格保持\n五阶·深层亲密: 描写重点=感官体验+角色性格不崩+情感深度"}, {"id": 196, "comment": "MOD-η·角色主体性保持", "content": "【亲密中角色主体性(最高约束)】\n1.性格延续: 傲娇不突然坦诚/害羞不突然大胆。可软化不可消失\n2.语言一致: 保持语言指纹(联动MOD-β)\n3.拒绝权: 角色任何时刻都可叫停\n4.文化不崩: 文化/种族设定仍体现\n\n核心: 亲密场景是角色的另一个展示维度——不是用通用模板替换的时刻"}, {"id": 197, "comment": "MOD-η·亲密终点框架", "content": "【亲密终点专用框架】\n仅〖亲密终点〗模式:\n接触上限: 第三阶(持续接触)。详细描写锁死。\n\n上限内深化: 拥抱力度=情感信息 | 持续时间=深度标尺 | 体温与呼吸=物理感知(非色情化) | 结束方式>拥抱本身\n\n替代标志事件: ①生死托付②秘密全量共享③永久承诺④非死亡重大代价⑤分离前终极告白"}, {"id": 198, "comment": "P-RPG-01·数值显式化", "content": "【RPG特化(激活: 声明TRPG/游戏机制)】\n覆写: MOD-α伤害→HP/MP数值化 | 剧情→任务块 | 属性面板→每次回复底端\n面板: HP/MP/六维属性/装备/状态\n爆率池: 联动ENG-H/E\n核心: 叙事驱动→数据+叙事双驱动"}, {"id": 199, "comment": "P-OW-02·沙盒特化", "content": "【沙盒特化(激活: 大世界/自由探索)】\n覆写: 场景→漏斗型(大区→势力板→点位) | 叙事→地理探索+碎片收集\n地图迷雾: 未到达区域→零注入→Token释放\n探索奖励: 首次进入新区域→感官冲击+NPC初遇+线索\n与P-OB-05共存规则: 非激活区常置待命但零注入"}, {"id": 200, "comment": "P-LN-03·线性叙事特化", "content": "【线性特化(激活: 线性小说/攻略轨道)】\n覆写: 分支压缩→2选项 | L4推演休眠→算力全转当前轴 | 事件池精简→8-12项但单事件增幅\n核心: 世界推动叙事→叙事推动世界\n停用→日程从冻结点推进"}, {"id": 201, "comment": "P-FN-04·同人特化", "content": "【同人特化(激活: 已有IP二创)】\n原作防线(P07第一级): 角色生死/力量上限/关键剧情/物理法则→不可篡改\n偏离警告: 与原作矛盾→挂载【原作偏离警告】\n版本裁定: 用户声明>最新正典>较晚发布\n非核心(P07第二级): 可自由补全"}, {"id": 202, "comment": "P-OB-05·原创特化", "content": "【原创特化(激活: 完全自创世界)】\n覆写: P07四级休眠→常置待命 | 术语封锁→100%词汇重造 | M02→单条目即全线扫描\n强制奠基链: A→G→C→D→B→E→F→J→K→H→L\nToken安全阀: constant总token占窗口≤25%(含5%缓冲) | 硬上限30%"}, {"id": 203, "comment": "P-RS-06·密室特化", "content": "【密室特化(激活: 单一封闭环境)】\n覆写: 场景→仅保留单一主场景极限强化 | L4→阻断转移至MOD-δ\n角色对立轴: 物资争夺/历史旧恨/秘密信息差/权力真空/生存策略分歧\n人数适配: ≤4全功能 | 4-8基础 | 9+团体间\n感官加密: 嗅觉每3-4段 | 味觉每4-5段"}, {"id": 204, "comment": "P层·补丁互斥声明", "content": "【补丁互斥/共存】\n硬互斥: RS-06⊕OW-02(密室⊕沙盒) | FN-04⊕OB-05(同人⊕原创)\n可共存: OW-02+OB-05 | RS-06+LN-03\nP09+OB-05互斥(OB激活→P09休眠)\n\n同时声明互斥补丁→拒绝后声明者→提示先停用前者"}, {"id": 205, "comment": "K-010·快速构建协议", "content": "【快速构建】\n信息采集(最少3项): 题材类型(必填)/核心场景(必填)/核心角色数(必填)/基调(可选)\n最小可用集(6-10条): 格式规范+世界观总则+核心场景×3+主角+事件池+关系零点\n设计: 每条≤350Token | constant≤3条 | 留扩展接口 | 附优先级待做清单\nRTG前置: 含L5/MOD-η条目→先RTG选择"}, {"id": 206, "comment": "K-012·诊断优化引擎", "content": "【诊断引擎】\n操作者粘贴已有条目或描述问题→执行:\n1.逻辑一致性: 术语/数值/因果/设定冲突\n2.触发机制: keys覆盖率/误触发/冲突/孤立\n3.Token效率: 单条Token/constant预算/信息密度\n4.结构完整性: 五层覆盖度/十二维覆盖度/依赖缺失\n\n输出: 健康度(S/A/B/C/D)+问题清单+修正方案+优化建议"}, {"id": 207, "comment": "ARCH-01·版本快照", "content": "【版本快照协议】\n修改已输出条目时→在逻辑简述前插入:\n修改对象/版本(v{N}→v{N+1})/变更内容/原因/关键差异/下游影响\n首次生成=v1。每次+1。\n用户可声明「显示修改历史」查看摘要链"}, {"id": 208, "comment": "ARCH-02·健康度仪表盘", "content": "【健康度仪表盘】\n触发: 用户输入\"仪表盘\"\"状态总览\"\"世界书健康度\"\n输出: 五层覆盖率 | 十二维引擎状态 | Token预算 | 特化补丁状态 | 关系系统 | 事件池 | 待补全 | 已知问题"}, {"id": 209, "comment": "P06·引擎状态声明", "content": "【引擎激活状态声明】\n触发: 完整构建+涉及≥3条目 | 诊断模式→强制\n格式: 【引擎状态】A·力量:[完整/简化/跳过] | B·政治:[...] | ... | L·剧情:[...]"}, {"id": 210, "comment": "M02·协作矩阵A组", "content": "【M02矩阵A组(引擎A-D)】\nA↔B(力量↔政治): 力量等级须有社会地位锚点\nC↔J(种族↔信仰): 种族信仰须与教派交叉引用\nD↔G(历史↔地理): 地质事件须在地理留痕\nA↔H(力量↔装备): 装备上限锚定力量等级\nL↔A(剧情↔力量): 突破节点与成长对齐"}, {"id": 211, "comment": "M02·协作矩阵B组", "content": "【M02矩阵B组(引擎E-H)】\nE↔H(经济↔装备): 物品价值与稀缺度一致\nG↔E(地理↔资源): 产区地理合理解释资源\nF↔L(势力↔剧情): P03规则\nD↔F(历史↔势力): 每势力关系须有历史成因\nE↔F(经济↔冲突): 稀缺资源须有竞争标记"}, {"id": 212, "comment": "M02·协作矩阵C组", "content": "【M02矩阵C组(引擎I-L)】\nI↔K(文化↔语言): 术语风格须与语言谱系一致\nJ↔B(神权↔世俗): 教派影响力须与政权兼容\nC↔I(种族↔文化): 核心价值观以种族为基准→文化在此上展开"}, {"id": 213, "comment": "P07·四级分级详细", "content": "【P07精度四级·详细执行】\n第一级·完整: 全部核心子项实质体现。Token充裕默认\n第二级·精简: 核心功能调用但深度精简。可压缩但不可缺项\n第三级·框架: 仅保留结构骨架和关键词。极端Token压力\n第四级·休眠: 不注入。条件: keys触发/P09豁免/用户要求\n\n降级: constant超预算→低频优先 | 升级: 用户要求/keys命中"}, {"id": 214, "comment": "P08·干预补全分配", "content": "【P08干预补全策略】\n场景A·明确需求: 直接执行,不附加建议\n场景B·范围限定但有缺口: 输出要求内容+末尾≤2行提示依赖缺失\n场景C·强依赖缺口: 输出+提示\"逻辑依赖XXX尚未生成\"\n\n最小化主动——提醒盲区但不替操作者决定"}, {"id": 215, "comment": "P01·终局仲裁详细", "content": "【P01终局仲裁·RE:0】\n当力量vs装备vs环境三方冲突时:\n环境物理限制 > 力量体系规则 > 装备属性\n\n执行: 水中火术减效/真空无音攻/高空限近战/密闭空间禁大范围AOE\n传说装备遇P01→不超越同等级力量体系上限→可临时越级但有代价\n\n联动: ENG-A(力量) | ENG-H(装备) | ENG-G(环境) | MOD-α(战斗)"}, {"id": 216, "comment": "L0·设定叙事出口原则", "content": "【设定叙事出口·元规则】\n每条世界书条目必须有明确的叙事出口——即它在RP中如何被使用。\n\n检验方法：对每条条目问三个问题：\n1.角色会因为这条设定做出什么不同的行为？（如果答案是\"无\"→该条目是百科词条不是世界书）\n2.这条设定会在什么场景下被触发？（如果答案是\"永远不会\"→该条目浪费token）\n3.去掉这条设定，RP会有什么不同？（如果答案是\"没区别\"→该条目不需要存在）\n\n叙事出口类型：\n- 行为驱动型：设定直接影响角色选择（\"修炼消耗情感→角色在关键时刻犹豫是否使用能力\"）\n- 冲突引擎型：设定本身就是矛盾源（\"两个种族共享同一资源→必然争夺\"）\n- 氛围锚点型：设定提供感官/环境细节（\"这座城市永远下雨→所有场景都有潮湿感\"）\n- 信息差型：设定的存在本身是秘密（\"角色不知道自己的血统→揭示时=剧情转折\"）\n\n禁止存在的条目类型：\n- 纯百科词条（\"这个种族有尖耳朵\"——然后呢？对RP有什么影响？）\n- 无冲突设定（\"这个国家和平繁荣人民幸福\"——没有矛盾就没有故事）\n- 孤立酷设定（\"有一种能力叫影子行走\"——但没说代价/限制/社会影响/谁有/怎么获得）"}, {"id": 217, "comment": "L2·角色差异化定义法", "content": "【角色差异化定义·对比法】\n定义角色时不是写一份孤立的档案——而是通过与其他角色的对比来塑造。\n\n执行方法：\n每个角色设定中必须包含至少一条\"与其他角色的核心差异\"，格式为：\n\"此角色的[特征]与[另一角色]不同在于：[具体行为差异]\"\n\n示例（正确）：\n\"她的安静是选择性的沉默——她完全可以开口但不想；而X的安静是社交无力——他想说话但做不到。表现差异：她在沉默时表情平静甚至带笑；X在沉默时视线躲闪手指不安地搓裤缝\"\n\n示例（错误）：\n\"她很安静，X也很安静但方式不同\"——这是在说废话，没有行为层面的区分\n\n为什么这样做：\n- 对比让模糊的形容词变成精确的行为\n- 读者/用户在多角色场景中能通过行为差异辨识角色\n- AI在RP中遇到类似情境时知道该角色的反应与其他角色有何不同\n\n适用场景：同一世界书中有≥2个重要角色时强制执行"}, {"id": 218, "comment": "L2·性格行为化表达", "content": "【性格描写·行为化表达铁律】\n描写角色性格时禁止使用抽象形容词——必须转化为可观测的具体行为。\n\n禁止→替代对照表：\n\"温柔\" → \"她会在别人说话时把茶杯悄悄转向对方的方向/递纸巾时手指不碰到对方的手\"\n\"冷漠\" → \"被问到关心的问题时先看一眼手机再回答/回复消息永远在三小时后\"\n\"开朗\" → \"走进房间时先跟最角落的人打招呼/笑的时候露出后槽牙不在意形象\"\n\"腹黑\" → \"夸人时选择的词永远刚好卡在'夸奖'和'讽刺'的边界/帮忙时顺手制造一个对方以后会需要她的局面\"\n\"自卑\" → \"合照时本能地站到最边上/说完自己的意见马上补一句'不过我说的可能不对'\"\n\n核心原则：\n- 行为>心理描写>形容词。能用行为写的绝不用内心OS。能用内心OS写的绝不用旁白形容\n- 同一性格特征要有≥2个不同场景的行为表现（\"温柔\"不只是\"递纸巾\"——还有\"吵架时音量反而降低\"\"发现别人犯错时替对方打圆场\"）\n- 微动作是性格的指纹——每个角色至少有1个独有的、在特定情绪下出现的肢体习惯"}, {"id": 219, "comment": "L2·角色行为指纹密度", "content": "【角色行为指纹·密度标准】\n一个立体的角色不是靠标签堆出来的——是靠足够密度的行为细节让读者/用户\"感觉认识这个人\"。\n\n每个主要角色必须定义的行为指纹清单：\n1.紧张时的肢体习惯（咬指甲/转笔/搓手指/整理不需要整理的衣领）\n2.独处时的默认行为（发呆看窗外/反复检查手机/对着镜子练习表情/整理已经很整齐的物品）\n3.说谎时的微表情泄露（语速加快/反而更镇定/视线固定在对方左眼/无意义地重复某个词）\n4.被信任的人伤害时的第一反应（不是通用的'震惊'——是具体的：僵住三秒然后慢慢收回伸出去的手/笑容凝固在脸上但眼睛已经变了/说出一句完全不相关的话比如'今天天气真好'）\n5.对食物的态度（吃饭快还是慢/有没有不吃的东西/会不会把喜欢的留到最后吃/会不会分给别人）\n6.走路方式（步子大小/速度/看不看路/是否会回头确认身后有没有人）\n\n密度标准：以上6项至少完成4项。每项用1-2句话的具体行为描写，不用形容词。\n总字数：主要角色的行为指纹部分≥200字"}, {"id": 220, "comment": "L2·场景感官密度标准", "content": "【场景感官描写·密度标准】\n一个有沉浸感的场景不是靠\"阳光明媚鸟语花香\"——是靠精确的、该场景独有的感官细节。\n\n每个场景条目必须包含的感官层：\n1.视觉锚点(≥2个)：不是整体印象(\"宏伟的大厅\")而是具体物件(\"门口地砖有一块翘起来被人用胶带粘过\"/\"窗台上的仙人掌旁边放着一管没盖盖子的护手霜\")\n2.非视觉锚点(≥1个)：气味(\"空调滤网太久没换的霉味混着外卖咖啡\")或触感(\"木质扶手被无数只手摸得发亮发烫\")或声音(\"隔壁装修的电钻声隔三分钟来一次\")\n3.时间痕迹(≥1个)：这个空间被使用过的证据(\"白板上还留着上周会议的字迹\"/\"角落有一把折叠椅靠墙立着说明经常不够坐\")\n4.冲突种子(≥1个)：这个场景里暗藏的矛盾/秘密/即将发生事情的迹象(\"垃圾桶里有一封撕碎的信\"/\"监控摄像头的角度刚好照不到走廊尽头\")\n\n密度标准：以上4层全部覆盖。\n禁止的感官描写：\"阳光洒下\"/\"微风拂面\"/\"鸟语花香\"/\"静谧祥和\"——这些是万能模板不是具体感官"}, {"id": 221, "comment": "L0·世界书→RP执行桥接", "content": "【世界书条目的RP执行指南】\n世界书条目不是AI的参考资料——是AI在RP中的行为指令。每类条目在RP中的执行方式不同：\n\n世界观条目(constant/before_char)：\n→ AI在每轮回复中必须遵守的物理/社会规则。不需要逐条引用但不能违反。表现方式：角色行为符合世界规则（有魔法的世界里角色理所当然地使用魔法/没有魔法的世界里角色不会突然施法）\n\n角色条目(after_char)：\n→ AI扮演该角色时的行为基准。表现方式：对话中体现语言指纹/行为中体现微动作/决策中体现价值观。不是复述设定而是\"活出设定\"\n\n场景条目(at_depth/keys触发)：\n→ 角色进入该场景时AI自动调用的环境参数。表现方式：描写中包含该场景的感官细节/角色行为受场景物理限制（下雨天收起书/嘈杂环境提高音量）\n\n事件条目(at_depth/keys触发/概率)：\n→ 条件满足时AI主动推进的剧情节点。表现方式：不是\"根据世界书第X条发生了Y\"——而是自然地让事件在叙事中展开\n\n关系条目(at_depth/keys触发)：\n→ 两个角色互动时AI参考的关系参数。表现方式：语气/距离/主动性/信息分享程度的差异\n\n核心铁律：\nAI在RP中绝不直接引用世界书条目编号/标题/content原文。世界书是后台规则不是前台台词。角色不会说\"根据我们的世界观总则...\"——角色只会自然地在这个世界观中生活"}];
/* ===== Core Utilities ===== */
function $(id){return document.getElementById(id)}
function qa(s,p){return Array.from((p||document).querySelectorAll(s))}
function esc(s){var _m={};_m[String.fromCharCode(38)]="&amp;";_m[String.fromCharCode(60)]="&lt;";_m[String.fromCharCode(62)]="&gt;";_m[String.fromCharCode(34)]="&quot;";_m[String.fromCharCode(39)]="&#39;";return String(s==null?"":s).replace(/[\x26\x3c\x3e\x22\x27]/g,function(c){return _m[c]||c})}
function num(v,d){if(v===null||v===undefined||v==="")return d;v=Number(v);return(isNaN(v)||!isFinite(v))?d:v}
function arr(v){return Array.isArray(v)?v:[]}
function crop(s,n){s=String(s||"");return s.length>n?s.slice(0,n)+"\n...(已截断)":s}
function clone(v){return JSON.parse(JSON.stringify(v))}
function genId(){return"wb-"+Date.now()+"-"+Math.random().toString(16).slice(2)}

/* ===== Toast ===== */
function toast(msg,type){
  var el=document.createElement("div");
  el.className="toast";
  el.textContent=msg;
  if(type==="error")el.style.background="var(--err)";
  if(type==="success")el.style.background="var(--ok)";
  if(type==="warning")el.style.background="var(--warn)";
  if(type==="error"||type==="success"||type==="warning")el.style.color="#fff";
  $("toast-box").appendChild(el);
  setTimeout(function(){el.classList.add("out");setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},250)},3000);
}

/* ===== Theme ===== */
function applyTheme(dark){
  S.dark=!!dark;
  document.documentElement.setAttribute("data-theme",dark?"dark":"light");

function apiRootFromInput(input){
  var url=String(input||"").trim().replace(/\/+$/,"");
  // 自动补全协议前缀（用户常漏写）
  if(url&&!/^https?:\/\//i.test(url))url="https://"+url;
  url=url.replace(/\/v1\/chat\/completions$/i,"/v1");
  url=url.replace(/\/v1\/models$/i,"/v1");
  url=url.replace(/\/chat\/completions$/i,"");
  url=url.replace(/\/models$/i,"");
  return url;
}
function buildApiEndpoint(endpoint){
  var root=apiRootFromInput(S.api.url);
  if(!root)return "";
  return /\/v1$/i.test(root)?root+"/"+endpoint:root+"/v1/"+endpoint;
}
function fetchModels(){
  syncApiFromDOM();
  persistApiConfig();
  if(!S.api.url||!S.api.key){toast("请先填写 API URL 和 Key","warning");return Promise.resolve([])}
  var url=buildApiEndpoint("models");
  return fetch(url,{
    method:"GET",
    headers:{"Authorization":"Bearer "+S.api.key}
  }).then(function(res){
    if(!res.ok)throw new Error("HTTP "+res.status);
    return res.json();
  }).then(function(data){

/* ===== IndexedDB ===== */
var DB=null;
function initDB(){
  return new Promise(function(resolve){
    var req=indexedDB.open("WBAssistant",2);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains("data"))db.createObjectStore("data");
      if(!db.objectStoreNames.contains("snapshots"))db.createObjectStore("snapshots");
      if(!db.objectStoreNames.contains("templates"))db.createObjectStore("templates");
    };
    req.onsuccess=function(e){DB=e.target.result;resolve()};
    req.onerror=function(){resolve()};
  });
}
function dbSet(store,key,val){
  return new Promise(function(resolve){
    if(!DB){resolve();return}
    var tx=DB.transaction(store,"readwrite");
    tx.objectStore(store).put(val,key);
    tx.oncomplete=function(){resolve()};
    tx.onerror=function(e){toast("数据保存失败: "+(e.target.error||"未知错误"),"error");resolve()};
  });
}
function dbGet(store,key){
  return new Promise(function(resolve){
    if(!DB){resolve(null);return}
    var tx=DB.transaction(store,"readonly");
    var req=tx.objectStore(store).get(key);
    req.onsuccess=function(){resolve(req.result||null)};
    req.onerror=function(){resolve(null)};
  });
}
function dbDel(store,key){
  return new Promise(function(resolve){
    if(!DB){resolve();return}
    var tx=DB.transaction(store,"readwrite");
    tx.objectStore(store).delete(key);
    tx.oncomplete=function(){resolve()};
    tx.onerror=function(){resolve()};
  });
}
function dbGetAll(store){
  return new Promise(function(resolve){
    if(!DB){resolve([]);return}
    var tx=DB.transaction(store,"readonly");
    var req=tx.objectStore(store).getAll();
    req.onsuccess=function(){resolve(req.result||[])};
    req.onerror=function(){resolve([])};
  });
}

/* ===== WI Normalization ===== */
function normWI(e,idx){
  e=e||{};
  var keys=e.keys||e.key||[];
  if(typeof keys==="string")keys=keys.split(/[,，、]/).map(function(s){return s.trim()}).filter(Boolean);
  keys=arr(keys);
  // 防御性 keys 回填：非 constant 条目如果 keys 为空，从 comment/name 自动提取
  if(!keys.length&&!e.constant){
    var src=String(e.comment||e.name||"");
    var auto=src.replace(/[\[\]【】·\-—_\d]+/g," ").split(/[\s,，、;；:：|/\\]+/).map(function(s){return s.trim()}).filter(function(s){return s.length>=2&&s.length<=8});
    if(auto.length)keys=auto.slice(0,3);
  }
  var name=e.name||e.comment||(keys[0]||"世界书条目"+(idx!=null?idx+1:""));
  var pos=e.position!=null?e.position:"at_depth";
  // RP-Hub 1.6.6 数字映射: 0→before_char, 1→after_char, 2→global_note, 3→global_note, 4→at_depth
  if(pos===0||pos==="before_character"||pos==="character_top"||pos==="before_examples")pos="before_char";
  if(pos===1||pos==="after_character"||pos==="character_bottom"||pos==="after_examples")pos="after_char";
  if(pos===2||pos===3||pos==="an_top"||pos==="author_note"||pos==="an_bottom")pos="global_note";
  if(pos===4)pos="at_depth";
  if(POS_OPTS.indexOf(pos)<0)pos="at_depth";
  return{
    uid:num(e.uid,idx||0),keys:keys,
    keyInput:e.keyInput||keys.join(", "),
    name:name,content:String(e.content||""),
    comment:e.comment||name,
    enabled:e.enabled!==false&&e.disable!==true,
    constant:!!e.constant,
    useRegex:e.useRegex!==undefined?!!e.useRegex:(!!e.use_regex),
    scanDepth:e.scanDepth!==undefined?num(e.scanDepth,2):(num(e.scan_depth,2)),
    order:num(e.order!=null?e.order:e.insertion_order,(idx!=null?(idx+1):100)),
    position:pos,depth:num(e.depth,4),
    probability:num(e.probability,100),
    useProbability:e.useProbability!==undefined?!!e.useProbability:(e.use_probability!==undefined?!!e.use_probability:true),
    group:e.group||""
  };
}

function exportWIEntry(e,idx){
  var o={
    comment:e.comment||"",
    content:e.content||"",
    enabled:e.enabled!==false,
    scope:"character",
    keys:e.keys||[],
    useRegex:!!e.useRegex,
    constant:!!e.constant,
    position:e.position||"at_depth",
    order:num(e.order,idx+1),
    depth:num(e.depth,4),
    scanDepth:num(e.scanDepth,2),
    probability:num(e.probability,100),
    useProbability:!!e.useProbability
  };
  return o;
}

/* ===== Import helpers ===== */
function parseImportJSON(data){
  if(Array.isArray(data))return data.map(function(e,i){return normWI(e,i)});
  if(data.entries&&Array.isArray(data.entries))return data.entries.map(function(e,i){return normWI(e,i)});
  if(data.entries&&typeof data.entries==="object")return Object.values(data.entries).map(function(e,i){return normWI(e,i)});
  if(data.character_book&&data.character_book.entries)return parseImportJSON(data.character_book);
  if(data.data&&data.data.character_book)return parseImportJSON(data.data);
  return null;
}

/* ===== PNG Character Card Parser ===== */
function readPngChunk(data,keyword){
  var view=new DataView(data.buffer,data.byteOffset,data.byteLength);
  var dec=new TextDecoder("latin1");var pos=8;
  while(pos+8<=data.length){
    var len=view.getUint32(pos,false);
    var type=String.fromCharCode(data[pos+4],data[pos+5],data[pos+6],data[pos+7]);
    var end=pos+8+len;if(end>data.length)break;
    if(type==="tEXt"){
      var chunk=data.subarray(pos+8,end);var nul=chunk.indexOf(0);
      if(nul!==-1){var key=dec.decode(chunk.subarray(0,nul));
      if(key===keyword)return dec.decode(chunk.subarray(nul+1))}
    }
    pos=end+4;
  }
  return null;
}

function parseCharacterCard(file){
  return new Promise(function(resolve,reject){
    var ext=file.name.split(".").pop().toLowerCase();
    if(ext!=="json"&&ext!=="png"){reject(new Error("仅支持 .json 和 .png 格式"));return}
    var reader=new FileReader();
    reader.onerror=function(){reject(new Error("文件读取失败"))};
    if(ext==="json"){
      reader.onload=function(){
        try{
          var cd=JSON.parse(reader.result);
          cd=cd.data||cd;
          resolve({card:cd,avatar:null,fileName:file.name});
        }catch(e){reject(new Error("JSON 解析失败: "+e.message))}
      };
      reader.readAsText(file);
    }else{
      reader.onload=function(){
        try{
          var buf=new Uint8Array(reader.result);
          var b64=readPngChunk(buf,"chara");
          if(!b64){reject(new Error("PNG 中未找到角色数据 (chara tEXt chunk)"));return}
          var cd=JSON.parse(decodeURIComponent(escape(atob(b64))));
          cd=cd.data||cd;
          // Extract avatar as persistent data URL (not blob URL)
          var avatarReader=new FileReader();
          avatarReader.onload=function(){resolve({card:cd,avatar:avatarReader.result,fileName:file.name})};
          avatarReader.onerror=function(){resolve({card:cd,avatar:null,fileName:file.name})};
          avatarReader.readAsDataURL(file);
        }catch(e){reject(new Error("PNG 角色卡解析失败: "+e.message))}
      };
      reader.readAsArrayBuffer(file);
    }
  });
}

function extractWorldInfoFromCard(cd){
  var entries=[];
  if(cd.character_book&&cd.character_book.entries){
    var raw=cd.character_book.entries;
    if(Array.isArray(raw))entries=raw.map(function(e,i){return normWI(e,i)});
    else if(typeof raw==="object")entries=Object.values(raw).map(function(e,i){return normWI(e,i)});
  }
  return entries;
}

function doImportCard(mode){
  var imp=S._pendingImport;if(!imp)return;
  closeModal("modal-dlg");

  if(mode==="new"){
    // Save current project
    if(S.projects[S.currentProject])S.projects[S.currentProject].entries=S.entries;
    // Create new project
    S.projects.push({id:genId(),name:imp.name,entries:imp.entries,cardName:imp.name,avatar:imp.avatar});
    S.currentProject=S.projects.length-1;
    S.entries=S.projects[S.currentProject].entries;
    saveEntries();
    toast("已创建项目: "+imp.name+" ("+imp.entries.length+" 条世界书)","success");
  }else if(mode==="replace"){
    S.entries=imp.entries;
    if(S.projects[S.currentProject])S.projects[S.currentProject].entries=S.entries;
    saveEntries();
    toast("已替换世界书: "+imp.entries.length+" 条","success");
  }else if(mode==="append"){
    S.entries=S.entries.concat(imp.entries);
    if(S.projects[S.currentProject])S.projects[S.currentProject].entries=S.entries;
    saveEntries();
    toast("已追加 "+imp.entries.length+" 条世界书","success");
  }else if(mode==="wionly"){
    S.entries=imp.entries;
    if(S.projects[S.currentProject])S.projects[S.currentProject].entries=S.entries;
    saveEntries();
    toast("已导入 "+imp.entries.length+" 条世界书","success");
  }

  S._pendingImport=null;
  S.batchSel.clear();
  S.wiLimit=40;
  S.wiFilter="";
  render();
}

function filterEntries(wi){
  var result=[];
  var q=S.wiFilter.toLowerCase();
  for(var i=0;i<wi.length;i++){
    var e=wi[i];
    if(q){
      var match=false;
      if((e.comment||"").toLowerCase().indexOf(q)>=0)match=true;
      if((e.keyInput||"").toLowerCase().indexOf(q)>=0)match=true;
      if((e.content||"").toLowerCase().indexOf(q)>=0)match=true;
      if((e.name||"").toLowerCase().indexOf(q)>=0)match=true;
      if(!match)continue;
    }
    // Advanced filters
    var f=S.wiFilters;
    if(f.constant&&!e.constant)continue;
    if(f.disabled&&e.enabled)continue;
    if(f.position&&e.position!==f.position)continue;
    result.push({entry:e,idx:i});
  }
  return result;
}

/* ===== Long-Press Drag & Drop Sort ===== */
var _drag={active:false,idx:-1,timer:null,startX:0,startY:0,ghost:null,overEl:null};
var DRAG_HOLD_MS=400;
var DRAG_THRESHOLD=8;

function bindDragEvents(container){
  qa(".entry-row[data-idx]",container).forEach(function(row){
    row.addEventListener("pointerdown",dragPointerDown);
  });
}

function dragPointerDown(e){
  if(e.button&&e.button!==0)return;
  if(e.target.closest(".entry-del"))return;
  var row=this.closest(".entry-row[data-idx]");
  if(!row)return;
  var idx=parseInt(row.dataset.idx);
  if(isNaN(idx))return;

  _drag.startX=e.clientX;
  _drag.startY=e.clientY;
  _drag.idx=idx;
  _drag.active=false;

  clearTimeout(_drag.timer);
  _drag.timer=setTimeout(function(){
    enterDragMode(row,idx,e);
  },DRAG_HOLD_MS);

  row.classList.add("drag-ready");

  document.addEventListener("pointermove",dragWaitMove);
  document.addEventListener("pointerup",dragWaitUp);
  document.addEventListener("pointercancel",dragWaitUp);
}

function dragWaitMove(e){
  var dx=e.clientX-_drag.startX;
  var dy=e.clientY-_drag.startY;
  if(Math.abs(dx)>DRAG_THRESHOLD||Math.abs(dy)>DRAG_THRESHOLD){
    cancelDragWait();
  }
}

function dragWaitUp(){
  cancelDragWait();
}

function cancelDragWait(){
  clearTimeout(_drag.timer);
  _drag.timer=null;
  qa(".entry-row.drag-ready").forEach(function(r){r.classList.remove("drag-ready")});
  document.removeEventListener("pointermove",dragWaitMove);
  document.removeEventListener("pointerup",dragWaitUp);
  document.removeEventListener("pointercancel",dragWaitUp);
}

function enterDragMode(row,idx,e){
  cancelDragWait();
  _drag.active=true;
  _drag.idx=idx;
  row.classList.remove("drag-ready");
  row.classList.add("dragging");

  // Prevent text selection and scrolling during drag
  document.body.style.userSelect="none";
  document.body.style.webkitUserSelect="none";
  document.body.style.touchAction="none";

  // Create floating ghost
  var ghost=document.createElement("div");
  ghost.className="drag-ghost";
  ghost.textContent="#"+idx+" "+(S.entries[idx]?S.entries[idx].comment||"":"");
  ghost.style.left=e.clientX+12+"px";
  ghost.style.top=e.clientY-16+"px";
  document.body.appendChild(ghost);
  _drag.ghost=ghost;

  // Prevent the click from opening edit modal
  row.style.pointerEvents="none";

  document.addEventListener("pointermove",dragActiveMove);
  document.addEventListener("pointerup",dragActiveDrop);
  document.addEventListener("pointercancel",dragActiveDrop);

  // Vibrate feedback on mobile if available
  if(navigator.vibrate)try{navigator.vibrate(30)}catch(ex){}
}

function dragActiveMove(e){
  if(!_drag.active)return;
  e.preventDefault();

  // Move ghost
  if(_drag.ghost){
    _drag.ghost.style.left=e.clientX+12+"px";
    _drag.ghost.style.top=e.clientY-16+"px";
  }

  // Find target row under cursor
  qa(".entry-row").forEach(function(r){r.classList.remove("drag-over-top","drag-over-bottom")});
  var target=getRowAtPoint(e.clientX,e.clientY);
  _drag.overEl=target;
  if(target){
    var tidx=parseInt(target.dataset.idx);
    if(tidx!==_drag.idx){
      var rect=target.getBoundingClientRect();
      if(e.clientY<rect.top+rect.height/2)target.classList.add("drag-over-top");
      else target.classList.add("drag-over-bottom");
    }
  }

  // Auto-scroll when near edges
  var container=document.querySelector(".app-container")||document.documentElement;
  var edgeSize=50;
  if(e.clientY<edgeSize)window.scrollBy(0,-8);
  else if(e.clientY>window.innerHeight-edgeSize)window.scrollBy(0,8);
}

function getRowAtPoint(x,y){
  // Temporarily hide ghost to get element underneath
  if(_drag.ghost)_drag.ghost.style.display="none";
  var el=document.elementFromPoint(x,y);
  if(_drag.ghost)_drag.ghost.style.display="";
  if(!el)return null;
  return el.closest(".entry-row[data-idx]");
}

function dragActiveDrop(e){
  if(!_drag.active){cancelDragWait();return}
  _drag.active=false;

  // Remove ghost
  if(_drag.ghost&&_drag.ghost.parentNode)_drag.ghost.parentNode.removeChild(_drag.ghost);
  _drag.ghost=null;

  // Restore body styles
  document.body.style.userSelect="";
  document.body.style.webkitUserSelect="";
  document.body.style.touchAction="";

  document.removeEventListener("pointermove",dragActiveMove);
  document.removeEventListener("pointerup",dragActiveDrop);
  document.removeEventListener("pointercancel",dragActiveDrop);

  // Find drop target
  var target=_drag.overEl||getRowAtPoint(e.clientX,e.clientY);
  qa(".entry-row").forEach(function(r){r.classList.remove("dragging","drag-ready","drag-over-top","drag-over-bottom");r.style.pointerEvents=""});

  if(target){
    var targetIdx=parseInt(target.dataset.idx);
    if(!isNaN(targetIdx)&&targetIdx!==_drag.idx){
      var rect=target.getBoundingClientRect();
      var insertAfter=e.clientY>=rect.top+rect.height/2;
      moveEntry(_drag.idx,targetIdx,insertAfter);
      return;
    }
  }

  _drag.idx=-1;
  _drag.overEl=null;
}
function moveEntry(from,to,insertAfter){
  if(from===to)return;
  var entry=S.entries.splice(from,1)[0];
  var newIdx=to;
  if(from<to)newIdx--;
  if(insertAfter)newIdx++;
  if(newIdx<0)newIdx=0;
  if(newIdx>S.entries.length)newIdx=S.entries.length;
  S.entries.splice(newIdx,0,entry);
  saveEntries();
  renderEditor();
}
function moveEntryUp(idx){
  if(idx<=0)return;
  var entry=S.entries.splice(idx,1)[0];
  S.entries.splice(idx-1,0,entry);
  saveEntries();renderEditor();
}
function moveEntryDown(idx){
  if(idx>=S.entries.length-1)return;
  var entry=S.entries.splice(idx,1)[0];
  S.entries.splice(idx+1,0,entry);
  saveEntries();renderEditor();
}

function updateWI(idx){
  var e=S.entries[idx];
  if(!e)return;
  e.enabled=$("wi-enabled").checked;
  e.comment=$("wi-comment").value;
  e.keyInput=$("wi-keys").value;
  e.keys=e.keyInput.split(/[,，、]/).map(function(s){return s.trim()}).filter(Boolean);
  e.content=$("wi-content").value;
  e.name=e.comment||e.keys[0]||"世界书条目";
  e.constant=$("wi-constant").checked;
  e.useRegex=$("wi-regex").checked;
  e.position=$("wi-pos").value;
  e.order=num($("wi-order").value,100);
  e.probability=num($("wi-prob").value,100);
  e.depth=num($("wi-depth").value,0);
  e.scanDepth=num($("wi-scan").value,2);
  e.group=$("wi-group").value;
  e.useProbability=$("wi-useprob").checked;
  saveEntries();
}

/* ===== Import/Export ===== */
function importWIFile(){
  var inp=document.createElement("input");
  inp.type="file";inp.accept=".json";
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(){
      try{
        var data=JSON.parse(reader.result);
        var entries=parseImportJSON(data);
        if(!entries||!entries.length){toast("未识别到有效的世界书条目","error");return}
        showDialog({title:"导入模式",message:"选择世界书导入方式：",type:"select",options:[{label:"追加到现有条目",value:"1"},{label:"覆盖当前所有条目",value:"2"},{label:"按关键词去重追加",value:"3"}]}).then(function(mode){
        if(!mode)return;
        if(mode==="2"){
          S.entries=entries;
        }else if(mode==="3"){
          var existing={};
          S.entries.forEach(function(e){(e.keys||[]).forEach(function(k){existing[k.toLowerCase()]=true})});
          entries.forEach(function(e){
            var isDup=false;
            (e.keys||[]).forEach(function(k){if(existing[k.toLowerCase()])isDup=true});
            if(!isDup)S.entries.push(e);
          });
        }else{
          S.entries=S.entries.concat(entries);
        }
        saveEntries();
        renderEditor();
        toast("已导入 "+entries.length+" 条世界书","success");
        });
      }catch(e){toast("JSON 解析失败: "+e.message,"error")}
    };
    reader.readAsText(file);
  };
  inp.click();
}

function exportWI(){
  var entries={};
  S.entries.forEach(function(e,i){entries[i]=exportWIEntry(e,i)});
  var json=JSON.stringify({entries:entries},null,2);
  showDialog({title:"导出世界书",message:"请输入文件名：",type:"prompt",defaultVal:currentProjectName()||"世界书"}).then(function(name){
    if(!name)return;
    dlFile(name+"_世界书_CW.json",json,"application/json");
  });
}

function dlFile(name,content,type){
  var blob=new Blob([content],{type:type||"text/plain"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(function(){if(a.parentNode)a.parentNode.removeChild(a);URL.revokeObjectURL(url)},300);
}
